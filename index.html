      <div class="anexo-info">
        <div class="anexo-nome" title="${esc(a.nome)}">${esc(a.nome)}</div>
        <div class="anexo-meta">${fmtBytes(a.size)} · ${fmtData(a.dataUpload)}</div>
      </div>
      <div class="anexo-actions">
        <a href="${esc(a.webViewLink)}" target="_blank" class="gdrive-btn">Ver</a>
        <button class="btn btn-danger-ghost btn-sm" onclick="apagarAnexo('${key}',${i})">×</button>
      </div>
    </div>`).join('') : '<p class="muted" style="font-size:12.5px;padding:6px 0 0;">Sem anexos ainda.</p>';

  return `
    <div class="anexos-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:var(--text-muted);">Anexos (${anexos.length})</span>
        <label class="gdrive-btn" id="anexo-label-${key}" style="cursor:pointer;">
          📎 Adicionar ficheiro
          <input type="file" multiple style="display:none;" onchange="uploadAnexo(event,'${entidade}','${entidadeId}','${esc(subpasta)}','${key}')">
        </label>
      </div>
      <div id="anexos-lista-${key}">${listaHtml}</div>
      <div id="anexo-status-${key}"></div>
    </div>`;
}

async function uploadAnexo(event, entidade, entidadeId, subpasta, key){
  const files = [...event.target.files];
  if(!files.length) return;
  const label = document.getElementById('anexo-label-'+key);
  const statusEl = document.getElementById('anexo-status-'+key);
  if(label) label.classList.add('uploading');
  // Auth Drive
  const ok = await gdriveAuthIfNeeded();
  if(!ok){ if(label) label.classList.remove('uploading'); return; }
  let erros = 0;
  for(const file of files){
    if(statusEl) statusEl.innerHTML = `<span class="gdrive-status idle">A enviar ${esc(file.name)}…</span>`;
    try{
      const result = await gdriveUploadFile(file, subpasta);
      const anexos = getAnexos(entidade, entidadeId);
      anexos.push({ id:result.id, nome:result.name, size:result.size, mimeType:result.mimeType, webViewLink:result.webViewLink, dataUpload:new Date().toISOString() });
      saveState();
      // Atualiza lista sem fechar modal
      const listaEl = document.getElementById('anexos-lista-'+key);
      if(listaEl) listaEl.innerHTML = getAnexos(entidade, entidadeId).map((a,i)=>`
        <div class="anexo-item">
          <div class="anexo-icon">${fileIcon(a.mimeType)}</div>
          <div class="anexo-info">
            <div class="anexo-nome">${esc(a.nome)}</div>
            <div class="anexo-meta">${fmtBytes(a.size)} · ${fmtData(a.dataUpload)}</div>
          </div>
          <div class="anexo-actions">
            <a href="${esc(a.webViewLink)}" target="_blank" class="gdrive-btn">Ver</a>
            <button class="btn btn-danger-ghost btn-sm" onclick="apagarAnexo('${key}',${i})">×</button>
          </div>
        </div>`).join('');
    }catch(e){ erros++; console.error(e); }
  }
  if(label){ label.classList.remove('uploading'); label.querySelector('input').value=''; }
  if(statusEl) statusEl.innerHTML = erros===0
    ? `<span class="gdrive-status ok">✓ ${files.length} ficheiro(s) enviado(s)</span>`
    : `<span class="gdrive-status err">⚠ ${erros} erro(s) ao enviar</span>`;
  setTimeout(()=>{ if(statusEl) statusEl.innerHTML=''; },3000);
}

async function apagarAnexo(key, index){
  const [entidade, ...restId] = key.split('_');
  const entidadeId = restId.join('_');
  const anexos = getAnexos(entidade, entidadeId);
  const a = anexos[index];
  if(!a) return;
  if(!confirm(`Apagar "${a.nome}" do Google Drive?`)) return;
  // Tenta apagar do Drive
  if(a.id){
    const ok = await gdriveAuthIfNeeded();
    if(ok){ try{ await gdriveDeleteFile(a.id); }catch(e){ console.warn('Erro ao apagar do Drive:',e); } }
  }
  anexos.splice(index,1);
  saveState();
  renderContent();
  showToast('Anexo apagado.','success');
}

async function audit(tipo, entidade, entidadeId, descricao, detalhe){
  try{
    const utilizador = currentPerfil ? (currentPerfil.nome || currentUser?.email || '?') : (currentUser?.email || '?');
    const utilizadorId = currentUser ? currentUser.id : null;
    await sbRestFetch('POST','frota_auditoria','',{
      tipo, entidade,
      entidade_id: entidadeId || null,
      descricao,
      detalhe: detalhe || null,
      utilizador, utilizador_id: utilizadorId,
      criado_em: new Date().toISOString(),
    });
  }catch(e){ console.warn('[auditoria] falha ao registar:', e.message); }
}

function elapsedAudit(iso){
  if(!iso) return '—';
  const ms = Date.now() - new Date(iso).getTime();
  const sec = Math.floor(ms/1000);
  if(sec < 60) return 'há menos de 1 min';
  const min = Math.floor(sec/60);
  if(min < 60) return `há ${min} min`;
  const h = Math.floor(min/60);
  if(h < 24) return `há ${h}h ${min%60}min`;
  const d = Math.floor(h/24);
  if(d < 2) return 'há 1 dia';
  if(d < 30) return `há ${d} dias`;
  const m = Math.floor(d/30);
  if(m < 12) return `há ${m} ${m===1?'mês':'meses'}`;
  return `há ${Math.floor(m/12)} ano(s)`;
}

async function viewAuditoria(filtroEntidade, filtroTipo, filtroBusca){
  filtroEntidade = filtroEntidade || '';
  filtroTipo = filtroTipo || '';
  filtroBusca = (filtroBusca || '').toLowerCase().trim();

  let registos = [];
  let erroMsg = '';
  try{
    let query = '?order=criado_em.desc&limit=300';
    if(filtroEntidade) query += `&entidade=eq.${filtroEntidade}`;
    if(filtroTipo) query += `&tipo=eq.${filtroTipo}`;
    registos = await sbRestFetch('GET','frota_auditoria', query);
    if(!Array.isArray(registos)) registos = [];
  }catch(e){ erroMsg = e.message || 'Erro.'; }

  if(filtroBusca){
    registos = registos.filter(r=>
      (r.descricao||'').toLowerCase().includes(filtroBusca) ||
      (r.utilizador||'').toLowerCase().includes(filtroBusca) ||
      (r.detalhe||'').toLowerCase().includes(filtroBusca));

  const tipoLabel = {create:'Criação',update:'Edição',delete:'Eliminação',action:'Ação'};

        onkeydown="if(event.key==='Enter') viewAuditoria('${filtroEntidade}','${filtroTipo}',this.value).then(h=>{document.getElementById('content').innerHTML=h;})">

    </div>`;

      <p class="section-title" style="color:var(--navy-800);">Configuração no Supabase (apenas 1 vez)</p>
      <p style="font-size:13px;color:var(--navy-800);margin:0 0 8px;">Execute este SQL no Supabase SQL Editor:</p>
      <pre style="background:var(--navy-900);color:#7EE787;padding:12px;border-radius:6px;font-size:12px;overflow-x:auto;white-space:pre-wrap;">CREATE TABLE IF NOT EXISTS frota_auditoria (

  utilizador TEXT,
  utilizador_id UUID,
  criado_em TIMESTAMPTZ DEFAULT now()
);

CREATE INDEX ON frota_auditoria (entidade);
CREATE INDEX ON frota_auditoria (utilizador_id);
ALTER TABLE frota_auditoria ENABLE ROW LEVEL SECURITY;
CREATE POLICY "audit_insert" ON frota_auditoria FOR INSERT TO authenticated WITH CHECK (true);
CREATE POLICY "audit_select" ON frota_auditoria FOR SELECT TO authenticated USING (true);</pre>
    </div>`;

  if(erroMsg){
    const isNotFound = erroMsg.includes('42P01')||erroMsg.includes('does not exist')||erroMsg.includes('relation')||erroMsg.includes('undefined');

  return filtersHtml + `<div class="card"><div class="flex-between" style="margin-bottom:12px;"><p class="section-title" style="margin:0;">${registos.length} registo(s)${filtroBusca||filtroEntidade||filtroTipo?' (filtrado)':''}</p></div>${linhas}</div>${sqlCard}`;
}

function gerarSenhaTemporaria(){
  // Senha aleatória de uso único — nunca é mostrada nem guardada; a pessoa define a sua própria ao aceitar o convite.
  const arr = new Uint8Array(24);
  (window.crypto||window.msCrypto).getRandomValues(arr);
  return Array.from(arr).map(b=>b.toString(36)).join('').slice(0,32)+'Aa1!';
}

async function convidarUtilizador(){
  const nome     = document.getElementById('nu-nome').value.trim();
  const email    = document.getElementById('nu-email').value.trim();
  const telefone = document.getElementById('nu-telefone').value.trim();
  const funcao   = document.getElementById('nu-funcao').value.trim();
  const role     = document.getElementById('nu-role').value;
  const confirmado = document.getElementById('nu-confirmado').checked;
  const errEl    = document.getElementById('nu-err');
  if(!nome)     { errEl.textContent='Introduza o nome.'; return; }
  if(!email)    { errEl.textContent='Introduza o email.'; return; }
  if(!telefone) { errEl.textContent='Introduza o telefone/WhatsApp usado para confirmar a identidade.'; return; }
  if(!confirmado){ errEl.textContent='Tem de confirmar a identidade da pessoa antes de enviar o convite.'; return; }
  errEl.textContent='A enviar convite...';
  try{
    const { data: { session: adminSession } } = await _sb.auth.getSession();
    const adminToken = adminSession?.access_token || SUPABASE_KEY;
    const adminNome = currentPerfil?.nome || currentUser?.email || 'Administrador';

    // Cria a conta no Supabase Auth com uma senha temporária aleatória (ninguém a vê nem a usa)
    const signUpRes = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: gerarSenhaTemporaria() })
    });
    const signUpData = await signUpRes.json();
    const uid = signUpData?.id || signUpData?.user?.id;
    if(!uid){
      errEl.textContent = signUpData?.msg || signUpData?.error_description || 'Erro ao criar conta. O email pode já estar em uso.';
      return;
    }

    // Inserir perfil com token do admin
    const res = await fetch(`${SUPABASE_URL}/rest/v1/frota_perfis`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + adminToken,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify({ id: uid, email, nome, funcao, role, telefone, confirmado_por: adminNome, confirmado_em: new Date().toISOString() })
    });
    if(!res.ok){ const e=await res.text(); throw new Error(e); }

    // Envia o email para a pessoa definir a própria senha (reaproveita o fluxo de recuperação de senha)
    await _sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.href.split('?')[0].split('#')[0]
    });

    closeModal();
    audit('create','utilizador',uid,`Utilizador convidado: ${nome}`,`Email: ${email} · Telefone: ${telefone} · Nível: ${role} · Identidade confirmada por: ${adminNome}`);
    showToast(`Convite enviado para ${email}. A pessoa vai receber um email para definir a própria senha.`,'success');
    goTab('utilizadores');
  } catch(e){ errEl.textContent='Erro: '+e.message; }
}

  const errEl = document.getElementById('ms-err');
  if(nova.length < 8){ errEl.textContent='A senha deve ter pelo menos 8 caracteres.'; return; }

/* ============================== LOGIN ============================== */
async function fazerLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if(!email){ errEl.textContent='Introduza o email.'; document.getElementById('login-email').focus(); return; }
  if(!pass){  errEl.textContent='Introduza a senha.'; document.getElementById('login-pass').focus(); return; }
  btn.disabled=true; btn.textContent='A verificar...';
  try{
    const { data, error } = await _sb.auth.signInWithPassword({ email, password: pass });
    if(error){
      errEl.textContent = traduzirErroAuth(error.message);
      document.getElementById('login-pass').value='';
      document.getElementById('login-pass').focus();
    } else {
      currentUser = data.user;
      await carregarPerfil();
      audit('action','utilizador',data.user.id,`Entrada no sistema`,`Email: ${data.user.email}`);
      abrirApp();
    }
  } catch(e){ errEl.textContent='Erro de ligação. Verifique a internet.'; }
  btn.disabled=false; btn.textContent='Entrar';
}

  const email = document.getElementById('recuperar-email').value.trim();
  const btn   = document.getElementById('recuperar-btn');
  const msgEl = document.getElementById('recuperar-msg');

    }
  } catch(e){ msgEl.textContent='Erro de ligação. Tente mais tarde.'; }
  btn.disabled=false; btn.textContent='Enviar link de recuperação';
}

function traduzirErroAuth(msg){
  if(!msg) return 'Erro desconhecido.';
  if(msg.includes('Invalid login')) return 'Email ou senha incorrectos.';
  if(msg.includes('Email not confirmed')) return 'Email não confirmado. Verifique a sua caixa de entrada.';
  if(msg.includes('Too many requests')) return 'Demasiadas tentativas. Aguarde alguns minutos.';
  if(msg.includes('User not found')) return 'Utilizador não encontrado.';
  if(msg.includes('Password should be')) return 'A senha deve ter pelo menos 6 caracteres.';
  return msg;
}

/* ============================== PERFIL DO UTILIZADOR ============================== */
async function carregarPerfil(){
  if(!currentUser) return;
  try{
    let rows = await sbRestFetch('GET','frota_perfis',`?id=eq.${currentUser.id}&select=id,nome,funcao,role`);
    if(!rows || rows.length===0){
      rows = await sbRestFetch('GET','frota_perfis',`?email=eq.${encodeURIComponent(currentUser.email)}&select=id,nome,funcao,role`);
      if(rows && rows.length>0){
        await sbRestFetch('PATCH','frota_perfis',`?email=eq.${encodeURIComponent(currentUser.email)}`,{ id: currentUser.id });
      }
    }
    currentPerfil = (rows && rows.length>0) ? rows[0] : { nome: currentUser.email, funcao: '', role: 'operador' };
  } catch(e){
    currentPerfil = { nome: currentUser.email, funcao: '', role: 'operador' };
  }
  const nome = currentPerfil.nome || currentUser.email || '?';
  const iniciais = nome.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase();
  const funcaoLabel = currentPerfil.funcao || (currentPerfil.role==='admin' ? 'Administrador' : currentPerfil.role==='leitor' ? 'Leitor' : 'Operador');
  const avatarEl = document.getElementById('user-avatar');
  const nomeEl   = document.getElementById('user-nome');
  const funcaoEl = document.getElementById('user-funcao');
  if(avatarEl) avatarEl.textContent = iniciais || '?';
  if(nomeEl)   nomeEl.textContent   = nome;
  if(funcaoEl) funcaoEl.textContent = funcaoLabel;
  // Banner de modo leitura
  const bannerExist = document.getElementById('leitor-banner');
  if(isLeitor() && !bannerExist){
    const banner = document.createElement('div');
    banner.id = 'leitor-banner';
    banner.style.cssText = 'background:#DCFCE7;color:#166534;font-size:11.5px;font-weight:700;text-align:center;padding:6px 10px;border-bottom:1px solid #BBF7D0;letter-spacing:0.2px;';
    banner.textContent = '👁 MODO LEITURA — sem permissão para editar';
    document.getElementById('sidebar')?.prepend(banner);
  }
}

function isAdmin(){ return currentPerfil && currentPerfil.role === 'admin'; }
function isLeitor(){ return currentPerfil && currentPerfil.role === 'leitor'; }
function podeEditar(){ return !isLeitor(); }

/* ============================== MEIOS FINANCEIROS ============================== */
let meiosSubTab = 'dashboard';

const MF = ()=> state.meiosFinanceiros;

// ── helpers ──
function mfSaldo(lista){ return lista.reduce((s,m)=>s+(Number(m.saldo)||0),0); }

function mfTotalEntradas(lista, dataRef){
  return lista.flatMap(m=>m.movimentos||[]).filter(m=>m.tipo==='entrada'&&(!dataRef||m.data>=dataRef)).reduce((s,m)=>s+(Number(m.valor)||0),0);
}
function mfTotalSaidas(lista, dataRef){
  return lista.flatMap(m=>m.movimentos||[]).filter(m=>m.tipo==='saida'&&(!dataRef||m.data>=dataRef)).reduce((s,m)=>s+(Number(m.valor)||0),0);
}

function totalDespesasGerais(dataRef){
  return (MF().despesasGerais||[]).filter(d=>!dataRef||d.data>=dataRef).reduce((s,d)=>s+(Number(d.valor)||0),0);
}

function totalEntregueAoCaixa(){
  return state.viagens.filter(v=>v.status==='concluida').reduce((s,v)=>s+(Number(v.valorEntregueAoCaixa)||0),0);
}

function saldoCaixaEsperado(){
  // Entregue ao caixa pelas viagens - despesas gerais pagas pelo caixa - depósitos bancários feitos do caixa
  const entregue = totalEntregueAoCaixa();
  const despCaixa = (MF().despesasGerais||[]).filter(d=>d.origem==='caixa').reduce((s,d)=>s+(Number(d.valor)||0),0);
  const depositadoFromCaixa = (MF().banco||[]).flatMap(b=>b.movimentos||[]).filter(m=>m.tipo==='entrada'&&m.origem==='caixa').reduce((s,m)=>s+(Number(m.valor)||0),0);
  return entregue - despCaixa - depositadoFromCaixa;
}

function guardarDeposito(depId){
  const valor=Number(document.getElementById('dep-valor').value)||0;
  const bancoId=document.getElementById('dep-banco').value;
  const data=document.getElementById('dep-data').value;
  if(!valor||!data||!bancoId){ showToast('Preencha todos os campos obrigatórios.','error'); return; }
  const banco = MF().banco.find(b=>b.id===bancoId);
  if(!banco.movimentos) banco.movimentos=[];
  banco.movimentos.push({
    id:depId||uid('mov'), tipo:'entrada', origem:'caixa', valor, data,
    referencia:document.getElementById('dep-ref').value.trim(),
    notas:document.getElementById('dep-notas').value.trim(),
    criadoEm:new Date().toISOString()
  });
  banco.saldo=(Number(banco.saldo)||0)+valor;
  saveState(); closeModal(); renderContent();
  showToast('Depósito registado.','success');
}

function verDeposito(bancoId, movId){
  const banco=MF().banco.find(b=>b.id===bancoId); if(!banco) return;

  openModal(`

function salvarContaBancaria(id){
  const nome=document.getElementById('cb-nome').value.trim();
  if(!nome){ showToast('Indique o nome do banco.','error'); return; }
  const dados={nome,tipo:document.getElementById('cb-tipo').value,numero:document.getElementById('cb-num').value.trim(),saldo:Number(document.getElementById('cb-saldo').value)||0};
  if(id){ Object.assign(MF().banco.find(b=>b.id===id),dados); }
  else{ MF().banco.push(Object.assign({id:uid('bk'),movimentos:[]},dados)); }
  saveState(); closeModal(); renderContent();
  showToast('Conta bancária guardada.','success');
}

function apagarContaBancaria(id){

function guardarMovimentoCarteira(carteiraId, movId){
  const carteira=MF().carteiras.find(c=>c.id===carteiraId); if(!carteira) return;
  const tipo=document.getElementById('mc-tipo').value;
  const valor=Number(document.getElementById('mc-valor').value)||0;
  const data=document.getElementById('mc-data').value;
  if(!valor||!data){ showToast('Preencha o valor e a data.','error'); return; }
  if(!carteira.movimentos) carteira.movimentos=[];
  carteira.movimentos.push({id:movId||uid('mc'),tipo,valor,data,descricao:document.getElementById('mc-desc').value.trim(),criadoEm:new Date().toISOString()});
  carteira.saldo=(Number(carteira.saldo)||0)+(tipo==='entrada'?valor:-valor);
  saveState(); closeModal(); renderContent();
  showToast('Movimento registado.','success');
}

function verMovimentoCarteira(carteiraId, movId){
  const carteira=MF().carteiras.find(c=>c.id===carteiraId); if(!carteira) return;

}

function salvarNotasMovimentoCarteira(carteiraId, movId){
  const carteira=MF().carteiras.find(c=>c.id===carteiraId); if(!carteira) return;

  saveState(); closeModal(); renderContent();
  showToast('Notas atualizadas.','success');
}

function salvarDespesaGeral(despId){
  const data=document.getElementById('dg-data').value;
  const valor=Number(document.getElementById('dg-valor').value)||0;
  const descricao=document.getElementById('dg-desc').value.trim();
  if(!data||!valor||!descricao){ showToast('Preencha data, valor e descrição.','error'); return; }
  const origemRaw=document.getElementById('dg-origem').value;
  let origem=origemRaw, origemNome='';
  if(origemRaw.startsWith('banco_')){ const b=MF().banco.find(x=>x.id===origemRaw.replace('banco_','')); origem='banco'; origemNome=b?b.nome:''; if(b){ b.saldo=(Number(b.saldo)||0)-valor; } }
  if(origemRaw.startsWith('carteira_')){ const c=MF().carteiras.find(x=>x.id===origemRaw.replace('carteira_','')); origem='carteira'; origemNome=c?c.tipo+' '+c.numero:''; if(c){ c.saldo=(Number(c.saldo)||0)-valor; } }
  MF().despesasGerais.push({
    id:despId||uid('dg'), data, valor, descricao, origem, origemNome,
    categoria:document.getElementById('dg-cat').value,
    viaturaId:document.getElementById('dg-viatura').value||null,
    notas:document.getElementById('dg-notas').value.trim(),
    criadoEm:new Date().toISOString()
  });
  saveState(); closeModal(); renderContent();
  showToast('Despesa geral registada.','success');
}

function apagarDespesaGeral(id){
  confirmAction('Apagar esta despesa geral?',()=>{
    MF().despesasGerais=MF().despesasGerais.filter(d=>d.id!==id);
    saveState(); renderContent(); showToast('Apagada.','success');
  });
}

      </label>
    </div>
    <div id="scan-preview" style="display:none;margin-bottom:12px;text-align:center;">
      <img id="scan-img" style="max-width:100%;max-height:200px;border-radius:8px;border:1px solid var(--border);">
      <p id="scan-filename" class="muted" style="font-size:12px;margin-top:4px;"></p>
    </div>
    <div id="scan-resultado" style="display:none;"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="scan-btn" onclick="executarScan()" disabled>Analisar com IA</button>
    </div>`);
}

let scanFileData=null, scanFileMime=null;

function previewScan(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    scanFileData=e.target.result.split(',')[1];
    scanFileMime=file.type;
    const prev=document.getElementById('scan-preview');
    const img=document.getElementById('scan-img');
    const fname=document.getElementById('scan-filename');
    if(file.type.startsWith('image/')){
      img.src=e.target.result; prev.style.display='block';
    } else {
      img.style.display='none'; prev.style.display='block';
    }
    fname.textContent=file.name;
    document.getElementById('scan-btn').disabled=false;
    document.getElementById('scan-resultado').style.display='none';
  };
  reader.readAsDataURL(file);
}

async function executarScan(){
  const btn=document.getElementById('scan-btn');
  const resultDiv=document.getElementById('scan-resultado');
  btn.disabled=true; btn.textContent='A analisar…';
  resultDiv.style.display='none';
  try{
    const dataAtual=new Date().toISOString().slice(0,10);
    const viaturaLista=state.viaturas.map(v=>v.matricula).join(', ');
    const prompt=`Analisa este relatório de gestão de frota da empresa Ndolene Transportes e Logística.
Extrai TODAS as receitas e despesas mencionadas no documento.
Viaturas conhecidas: ${viaturaLista||'não especificadas'}.
Data de referência: ${dataAtual}.

Responde APENAS em JSON válido, sem texto antes ou depois, com esta estrutura:
{
  "viatura": "matrícula se mencionada ou null",
  "data": "YYYY-MM-DD se encontrada ou data de hoje",
  "receitas": [
    {"descricao": "...", "valor": 0, "tipo": "bilhetes|bagagem|outros"}
  ],
  "despesas": [
    {"descricao": "...", "valor": 0, "categoria": "Combustível (outro carro)|Reparação / Manutenção|Alimentação da tripulação|Taxas / Portagens|Comissões|Acomodação|Material / Peças|Outro"}
  ],
  "totalReceitas": 0,
  "totalDespesas": 0,
  "saldoFinal": 0,
  "notas": "observações gerais se existirem"
}`;

    const content=[{type:'text',text:prompt}];
    if(scanFileMime&&scanFileMime.startsWith('image/')){
      content.unshift({type:'image',source:{type:'base64',media_type:scanFileMime,data:scanFileData}});
    } else if(scanFileMime==='application/pdf'){
      content.unshift({type:'document',source:{type:'base64',media_type:'application/pdf',data:scanFileData}});
    }

    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,messages:[{role:'user',content}]})
    });
    const data=await resp.json();
    const texto=data.content.map(c=>c.text||'').join('');
    const clean=texto.replace(/```json|```/g,'').trim();
    const resultado=JSON.parse(clean);
    mostrarResultadoScan(resultado);
  }catch(e){
    console.error(e);
    resultDiv.innerHTML=`<div class="card" style="background:var(--danger-bg);border-color:#EAC0BB;"><strong style="color:var(--danger);">Erro ao analisar.</strong> Verifique a imagem e tente novamente.</div>`;
    resultDiv.style.display='block';
  }
  btn.disabled=false; btn.textContent='Analisar com IA';
}

function mostrarResultadoScan(r){
  const resultDiv=document.getElementById('scan-resultado');
  const vt=state.viaturas.find(v=>r.viatura&&v.matricula.toLowerCase().includes(r.viatura.toLowerCase()));
  resultDiv.innerHTML=`
    <div class="section-divider">Resultado da análise</div>
    ${r.viatura?`<p style="font-size:13px;margin-bottom:8px;">🚌 Viatura identificada: <strong>${esc(r.viatura)}</strong>${vt?` <span class="badge success">Encontrada</span>`:` <span class="badge warning">Não encontrada no sistema</span>`}</p>`:''}
    ${r.data?`<p style="font-size:13px;margin-bottom:12px;">📅 Data: <strong>${fmtData(r.data+'T12:00:00')}</strong></p>`:''}
    ${(r.receitas||[]).length?`
      <p style="font-size:12px;font-weight:700;text-transform:uppercase;color:var(--success);margin-bottom:6px;">Receitas identificadas</p>
      ${r.receitas.map(rc=>`<div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;">
        <span>${esc(rc.descricao)}</span><strong class="num" style="color:var(--success);">+${fmtMT(rc.valor)}</strong>
      </div>`).join('')}
      <div class="flex-between" style="padding:6px 0;margin-bottom:12px;"><strong>Total receitas</strong><strong class="num" style="color:var(--success);">${fmtMT(r.totalReceitas)}</strong></div>
    `:''}
    ${(r.despesas||[]).length?`
      <p style="font-size:12px;font-weight:700;text-transform:uppercase;color:var(--danger);margin-bottom:6px;">Despesas identificadas — selecione as que quer registar</p>
      ${r.despesas.map((d,i)=>`<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;">
        <input type="checkbox" id="sc-chk-${i}" checked style="flex-shrink:0;">
        <div style="flex:1;font-size:13px;">${esc(d.descricao)} <span class="badge neutral" style="font-size:10px;">${esc(d.categoria)}</span></div>
        <strong class="num" style="color:var(--danger);flex-shrink:0;">−${fmtMT(d.valor)}</strong>
      </div>`).join('')}
      <div class="flex-between" style="padding:8px 0;"><strong>Total despesas</strong><strong class="num" style="color:var(--danger);">${fmtMT(r.totalDespesas)}</strong></div>
    `:''}
    ${r.saldoFinal?`<div class="flex-between" style="padding:8px;background:var(--bg);border-radius:6px;margin-bottom:10px;"><strong>Saldo final</strong><strong class="num" style="color:${r.saldoFinal>=0?'var(--success)':'var(--danger)'};">${fmtMT(r.saldoFinal)}</strong></div>`:''}
    ${r.notas?`<p class="muted" style="font-size:12px;">📝 ${esc(r.notas)}</p>`:''}
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick='importarDespesasScan(${JSON.stringify(r).replace(/'/g,"&#39;")})'>✓ Importar despesas selecionadas</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    </div>`;
  resultDiv.style.display='block';
}

function importarDespesasScan(r){
  const despesas=r.despesas||[];
  let importadas=0;
  despesas.forEach((d,i)=>{
    const chk=document.getElementById('sc-chk-'+i);
    if(!chk||!chk.checked) return;
    const vt=state.viaturas.find(v=>r.viatura&&v.matricula.toLowerCase().includes((r.viatura||'').toLowerCase()));
    MF().despesasGerais.push({
      id:uid('dg'), data:r.data||new Date().toISOString().slice(0,10),
      valor:Number(d.valor)||0, descricao:d.descricao,
      categoria:d.categoria||'Outro', origem:'caixa',
      viaturaId:vt?vt.id:null, notas:'Importado via scan',
      criadoEm:new Date().toISOString()
    });
    importadas++;
  });
  saveState(); closeModal(); meiosSubTab='despesas'; renderContent();
  showToast(`${importadas} despesa(s) importada(s) com sucesso.`,'success');
}

let relatoriosSubTab = 'viagens';

function rvLinhaRowHtml(item){
  item=item||{};
  return `<div class="dyn-row">
    <input type="number" min="0" step="0.01" placeholder="Valor (MT)" value="${item.valor??''}" data-rv-valor>
    <input placeholder="Nota (opcional)" value="${esc(item.nota||'')}" data-rv-nota>
    <button class="dyn-row-del" onclick="this.parentElement.remove()">×</button>
  </div>`;
}
function rvAddLinha(grupo){ document.getElementById('rv-'+grupo+'-container').insertAdjacentHTML('beforeend', rvLinhaRowHtml({})); }

function rvGrupoHtml(grupo, titulo, dica, itens){
  return `
    <div class="section-divider">${titulo}</div>
    ${dica?`<p style="font-size:12px;color:var(--text-muted);margin:-4px 0 8px;">${dica}</p>`:''}
    <div id="rv-${grupo}-container">${(itens||[]).length?itens.map(i=>rvLinhaRowHtml(i)).join(''):rvLinhaRowHtml({})}</div>
    <button class="btn btn-ghost btn-sm" onclick="rvAddLinha('${grupo}')">+ Adicionar valor</button>`;
}

function rvColetarGrupo(grupo){
  const vals=[...document.querySelectorAll(`#rv-${grupo}-container [data-rv-valor]`)].map(e=>e.value);
  const notas=[...document.querySelectorAll(`#rv-${grupo}-container [data-rv-nota]`)].map(e=>e.value.trim());
  return vals.map((v,i)=>({valor:v!==''?Number(v):null, nota:notas[i]})).filter(x=>x.valor!=null||x.nota);
}
function rvSomaGrupo(itens){ return (itens||[]).reduce((s,i)=>s+(Number(i.valor)||0),0); }

    <div class="card" style="margin-bottom:16px;">
      <p class="section-title">Relatório de Viagens

function formRelatorioViagem(){
  const rvId = uid('rv');
  const cobradores = state.tripulacao.filter(p=>p.funcao==='cobrador'&&!p.afastado);
  openModal(`
    <p class="modal-title">Novo relatório de viagem</p>
    <p class="modal-sub">Preenchido pelo cobrador. Só para consulta — não afeta viagens, caixa nem meios financeiros.</p>
    <div class="form-cols2">
      <div class="form-row"><label>Data</label><input id="rv-data" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="form-row"><label>Cobrador</label>
        <select id="rv-cobrador">
          <option value="">— Selecionar —</option>
          ${cobradores.map(p=>`<option value="${p.id}">${esc(p.nome)}</option>`).join('')}

        </select>
      </div>
    </div>
    <div class="form-row" id="rv-cobrador-outro-wrap" style="display:none;"><label>Nome do cobrador</label><input id="rv-cobrador-outro" placeholder="Nome"></div>
    <div class="form-cols2">
      <div class="form-row"><label>Viatura (opcional)</label>
        <select id="rv-viatura"><option value="">— Nenhuma —</option>${state.viaturas.map(v=>`<option value="${v.id}">${esc(v.matricula)}</option>`).join('')}</select>
      </div>

        <select id="rv-rota"><option value="">— Nenhuma —</option>${state.rotas.map(r=>`<option value="${r.id}">${esc(r.nome)}</option>`).join('')}</select>

    ${rvGrupoHtml('saidas','Saídas','Valores pagos/gastos durante a viagem.')}
    ${rvGrupoHtml('saldofinal','Saldo Final','Dinheiro com que o cobrador terminou a viagem.')}

    <div class="form-row" style="margin-top:10px;"><label>Notas gerais (opcional)</label><textarea id="rv-notas-gerais" rows="2"></textarea></div>
    ${renderAnexosSection('relatorioViagem', rvId, 'Relatórios de Viagens')}

    document.getElementById('rv-cobrador-outro-wrap').style.display = this.value==='__outro__'?'':'none';

function salvarRelatorioViagem(rvId){
  const data=document.getElementById('rv-data').value;
  if(!data){ showToast('Preencha a data.','error'); return; }
  const cobradorSel=document.getElementById('rv-cobrador').value;
  let cobradorId=null, cobradorNome='';
  if(cobradorSel==='__outro__'){ cobradorNome=document.getElementById('rv-cobrador-outro').value.trim(); }
  else if(cobradorSel){ cobradorId=cobradorSel; const p=getPessoa(cobradorSel); cobradorNome=p?p.nome:''; }
  state.relatoriosViagens.push({
    id:rvId||uid('rv'), data, cobradorId, cobradorNome,
    viaturaId:document.getElementById('rv-viatura').value||null,
    rotaId:document.getElementById('rv-rota').value||null,
    saldoInicial:rvColetarGrupo('saldoinicial'),
    entradas:rvColetarGrupo('entradas'),
    saidas:rvColetarGrupo('saidas'),
    saldoFinal:rvColetarGrupo('saldofinal'),
    notasGerais:document.getElementById('rv-notas-gerais').value.trim(),
    criadoEm:new Date().toISOString()
  });
  saveState(); closeModal(); renderContent();
  showToast('Relatório guardado.','success');
}

function verRelatorioViagem(id){
  const r=(state.relatoriosViagens||[]).find(x=>x.id===id); if(!r) return;
  const vt=getViatura(r.viaturaId), rt=getRota(r.rotaId);
  const linhaHtml=(itens)=>(itens&&itens.length)?itens.map(i=>`<div class="flex-between"><span class="muted">${esc(i.nota||'—')}</span><span class="num">${fmtMT(i.valor||0)}</span></div>`).join(''):`<div class="muted" style="font-size:12.5px;">Sem valores.</div>`;
  openModal(`
    <p class="modal-title">Relatório de Viagem</p>
    <p class="modal-sub">${fmtData(r.data)} · ${esc(r.cobradorNome||'—')}${vt?' · '+esc(vt.matricula):''}${rt?' · '+esc(rt.nome):''}</p>

    <div class="section-divider">Saldo Inicial <span class="num" style="float:right;">${fmtMT(rvSomaGrupo(r.saldoInicial))}</span></div>
    ${linhaHtml(r.saldoInicial)}
    <div class="section-divider">Entradas <span class="num" style="float:right;">${fmtMT(rvSomaGrupo(r.entradas))}</span></div>
    ${linhaHtml(r.entradas)}
    <div class="section-divider">Saídas <span class="num" style="float:right;">${fmtMT(rvSomaGrupo(r.saidas))}</span></div>
    ${linhaHtml(r.saidas)}
    <div class="section-divider">Saldo Final <span class="num" style="float:right;">${fmtMT(rvSomaGrupo(r.saldoFinal))}</span></div>
    ${linhaHtml(r.saldoFinal)}

    ${r.notasGerais?`<div class="section-divider">Notas gerais</div><p style="font-size:13px;white-space:pre-wrap;">${esc(r.notasGerais)}</p>`:''}
    ${renderAnexosSection('relatorioViagem', r.id, 'Relatórios de Viagens')}

    <div class="modal-actions">
      <button class="btn btn-danger-ghost" onclick="apagarRelatorioViagem('${r.id}')">Apagar</button>
      <div style="flex:1;"></div>
      <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
    </div>`,true);
}

function apagarRelatorioViagem(id){
  confirmAction('Apagar este relatório? Ação irreversível.',()=>{
    state.relatoriosViagens=state.relatoriosViagens.filter(r=>r.id!==id);
    saveState(); closeModal(); renderContent();
    showToast('Relatório apagado.','success');
  });
}

(async function init(){
  // Restaura token do Google Drive se voltou de redirect OAuth
  const driveRestored = gdriveRestoreToken();

  // Detecta evento de recuperação de senha (Supabase envia #access_token=...&type=recovery)
  const hashParams = new URLSearchParams(window.location.hash.replace('#',''));
  if(hashParams.get('type') === 'recovery'){
    // O SDK do Supabase detecta automaticamente o token do URL e cria a sessão
    // Aguardamos que o onAuthStateChange resolva antes de continuar
    document.getElementById('login-screen').style.display='flex';
    mostrarPainelNovaSenha();
    return; // onAuthStateChange tratará do resto
  }

  // Verifica se já existe sessão activa (token armazenado pelo SDK)
  const { data: { session } } = await _sb.auth.getSession();
  if(session){
    currentUser = session.user;
    abrirApp();
    if(driveRestored){
      setTimeout(()=>{ showToast('Google Drive ligado com sucesso! ✓','success'); },800);
      if(sessionStorage.getItem('gdrive_pending_upload')){
        sessionStorage.removeItem('gdrive_pending_upload');
        setTimeout(()=>{ showToast('Pode agora adicionar o anexo novamente.',''); },2000);
      }
    }
  } else {
    document.getElementById('login-email').focus();
    if(driveRestored && sessionStorage.getItem('gdrive_pending_upload')){
      showToast('Drive autorizado. Faça login para continuar.','success');
    }
  }

  // Listener para mudanças de estado de auth (inclui recuperação de senha, tokens expirados, etc.)
  _sb.auth.onAuthStateChange((event, session) => {
    if(event === 'PASSWORD_RECOVERY'){
      mostrarPainelNovaSenha();
      return;
    }
    if(event === 'SIGNED_IN' && session){
      currentUser = session.user;
      // Se o app ainda não está visível (ex: voltou de link de email)
      if(document.getElementById('app').style.display === 'none'){
        abrirApp();
      }
      return;
    }
    if(event === 'SIGNED_OUT'){
      currentUser = null; currentPerfil = null;
      document.getElementById('app').style.display='none';
      document.getElementById('login-screen').style.display='flex';
      mostrarPainelLogin();
    }
    if(event === 'TOKEN_REFRESHED' && session){
      currentUser = session.user;
    }
  });
})();
</script>
