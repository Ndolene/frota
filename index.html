<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Frota · Ndolene</title>
<style>
:root{
  --navy-900:#0F3A66;--navy-800:#1D5495;--navy-700:#2568B0;
  --amber-500:#C73027;--amber-600:#A3271F;--amber-100:#FBE3E1;
  --bg:#EEF2F9;--surface:#FFFFFF;--border:#E2E8F2;
  --text:#16212E;--text-muted:#5B6B7C;
  --success:#1F9D6B;--success-bg:#E1F5EC;
  --warning:#C73027;--warning-bg:#FBE3E1;
  --danger:#C73027;--danger-bg:#FBE3E1;
  --terminal:#1D5495;--terminal-bg:#E8F0FB;
  --shadow:0 10px 30px rgba(15,58,102,0.08);
  --shadow-sm:0 2px 8px rgba(15,58,102,0.06);
  --font-display:'Archivo Narrow','Oswald','Arial Narrow',sans-serif;
  --font-body:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}

#app{display:flex;min-height:100vh;gap:16px;padding:16px;align-items:flex-start;}

/* SIDEBAR */
#sidebar{width:230px;flex-shrink:0;background:linear-gradient(180deg,var(--navy-800),var(--navy-900));color:#fff;display:flex;flex-direction:column;padding:22px 0;border-radius:20px;box-shadow:var(--shadow);position:sticky;top:16px;min-height:calc(100vh - 32px);}
.brand{padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,0.14);margin-bottom:14px;}
.brand-title{font-family:var(--font-display);font-weight:700;font-size:21px;letter-spacing:0.5px;text-transform:uppercase;color:#fff;margin:0;}
.brand-sub{font-family:var(--font-mono);font-size:11px;color:#FF9B8C;letter-spacing:1px;margin-top:2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 16px;margin:2px 12px;border-radius:12px;color:rgba(255,255,255,0.78);cursor:pointer;border:none;background:none;width:calc(100% - 24px);text-align:left;font-size:13.5px;font-weight:600;letter-spacing:0.3px;transition:background .12s,color .12s;}
.nav-item:hover{background:rgba(255,255,255,0.1);color:#fff;}
.nav-item.active{background:#fff;color:var(--navy-800);box-shadow:0 4px 14px rgba(0,0,0,0.18);}
.nav-dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.55;flex-shrink:0;}
.nav-item.active .nav-dot{background:var(--amber-500);opacity:1;}
.nav-group-head{display:flex;align-items:center;justify-content:space-between;width:100%;padding:11px 20px;background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;transition:color .12s;}
.nav-group-head:hover{color:rgba(255,255,255,0.85);}
.nav-group-chevron{transition:transform .15s;font-size:10px;display:inline-block;}
.nav-group-head.collapsed .nav-group-chevron{transform:rotate(-90deg);}
.nav-group-items{display:flex;flex-direction:column;}
.nav-group-items.collapsed{display:none;}
.nav-group-items .nav-item{padding-left:28px;}
.sidebar-footer{margin-top:auto;padding:14px 20px 0;border-top:1px solid rgba(255,255,255,0.14);}
.sidebar-footer-text{font-size:11px;color:rgba(255,255,255,0.5);line-height:1.4;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--surface);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
#topbar h1{font-family:var(--font-display);font-size:19px;text-transform:uppercase;letter-spacing:0.5px;margin:0;font-weight:700;}
.topbar-date{font-family:var(--font-mono);color:var(--text-muted);font-size:12.5px;}
.sync-status{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px;cursor:pointer;user-select:none;transition:background .15s;white-space:nowrap;}
.sync-status:hover{background:var(--bg);}
.sync-status .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sync-status.sync-ok .dot{background:var(--success,#1b8a4a);}
.sync-status.sync-ok{color:var(--success,#1b8a4a);}
.sync-status.sync-pending .dot{background:var(--amber-500,#c78a1f);animation:syncPulse 1.1s infinite;}
.sync-status.sync-pending{color:var(--amber-700,#8a6212);}
.sync-status.sync-offline .dot{background:var(--danger,#c0392b);}
.sync-status.sync-offline{color:var(--danger,#c0392b);}
@keyframes syncPulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.draft-banner{display:flex;align-items:center;gap:10px;background:#fff8e6;border:1px solid #f0d68a;border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12.5px;color:#6b4e00;}
.draft-banner button{flex-shrink:0;}
#content{padding:24px 28px 60px;flex:1;overflow-x:hidden;overflow-y:auto;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:var(--shadow-sm);}
.card+.card{margin-top:16px;}
.section-title{font-family:var(--font-display);text-transform:uppercase;letter-spacing:0.4px;font-size:14px;font-weight:700;color:var(--navy-800);margin:0 0 12px;display:flex;align-items:center;justify-content:space-between;}
.grid{display:grid;gap:14px;}
.grid-stats{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));}
.grid-2{grid-template-columns:1fr 1fr;}

.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;border-top:3px solid var(--navy-800);box-shadow:var(--shadow-sm);}
.stat-card.alert{border-top-color:var(--danger);}
.stat-card.warn{border-top-color:var(--warning);}
.stat-card.ok{border-top-color:var(--success);}
.stat-card.terminal{border-top-color:var(--terminal);}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);font-weight:700;}
.stat-value{font-family:var(--font-mono);font-size:28px;font-weight:600;margin-top:4px;color:var(--navy-900);}
.stat-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}

/* DEPARTURE BOARD */
.board{background:linear-gradient(180deg,var(--navy-800),var(--navy-900));border-radius:16px;overflow:hidden;box-shadow:var(--shadow-sm);}
.board-head{padding:12px 18px;font-family:var(--font-display);text-transform:uppercase;letter-spacing:1px;font-size:12.5px;color:#FF9B8C;border-bottom:1px solid rgba(255,255,255,0.14);font-weight:700;}
.board-row{display:grid;grid-template-columns:74px 1fr auto;gap:14px;align-items:center;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,0.08);color:#fff;}
.board-row:last-child{border-bottom:none;}
.board-badge{font-family:var(--font-mono);font-weight:700;font-size:12px;background:var(--amber-500);color:#fff;border-radius:6px;padding:5px 4px;text-align:center;letter-spacing:0.3px;}
.board-badge.terminal-badge{background:var(--terminal-bg);color:var(--terminal);}
.board-main{min-width:0;}
.board-route{font-weight:700;font-size:13.5px;}
.board-meta{font-family:var(--font-mono);font-size:11.5px;color:rgba(255,255,255,0.6);margin-top:2px;}
.board-status{font-family:var(--font-mono);font-size:12px;text-align:right;white-space:nowrap;}
.board-status.late{color:#FF9B85;}
.board-status.ontime{color:#7FE3B4;}
.board-status.terminal-st{color:#9CC4EF;}
.board-empty{padding:24px 18px;color:rgba(255,255,255,0.55);font-size:13px;text-align:center;}

/* TABLE */
.table-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:480px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);border-bottom:2px solid var(--border);padding:8px 10px;font-weight:700;white-space:nowrap;}
td{padding:10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.num{font-family:var(--font-mono);}
.tbl-actions{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;}
.badge.success{background:var(--success-bg);color:var(--success);}
.badge.warning{background:var(--warning-bg);color:var(--warning);}
.badge.danger{background:var(--danger-bg);color:var(--danger);}
.badge.info{background:#E5EBF3;color:var(--navy-800);}
.badge.neutral{background:#EEF1F4;color:var(--text-muted);}
.badge.terminal{background:var(--terminal-bg);color:var(--terminal);}

/* BUTTONS */
.btn{border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;border:1px solid transparent;display:inline-flex;align-items:center;gap:6px;transition:background .12s,box-shadow .12s;}
.btn-primary{background:var(--navy-800);color:#fff;}
.btn-primary:hover{background:var(--navy-900);}
.btn-amber{background:var(--amber-500);color:#fff;}
.btn-amber:hover{background:var(--amber-600);}
.btn-ghost{background:transparent;color:var(--navy-800);border-color:var(--border);}
.btn-ghost:hover{background:var(--bg);}
.btn-danger-ghost{background:transparent;color:var(--danger);border-color:var(--danger-bg);}
.btn-danger-ghost:hover{background:var(--danger-bg);}
.btn-terminal{background:var(--terminal-bg);color:var(--terminal);border-color:var(--terminal-bg);}
.btn-terminal:hover{background:#d6e6f8;}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-block{width:100%;justify-content:center;}

/* FORMS */
.form-row{margin-bottom:13px;}
.form-row label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.3px;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--text);}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:2px solid var(--amber-500);outline-offset:1px;border-color:var(--amber-500);}
.form-cols2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-cols3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.form-hint{font-size:11.5px;color:var(--text-muted);margin-top:4px;}
.dyn-row{display:grid;grid-template-columns:1fr 110px 36px;gap:8px;margin-bottom:8px;align-items:center;}
.dyn-row-cat{display:grid;grid-template-columns:1fr 100px minmax(150px,1.3fr) 36px;gap:8px;margin-bottom:8px;align-items:center;}
.dyn-row-cat select{padding:9px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);font-size:12.5px;width:100%;min-width:0;}
.dyn-row-sub{display:grid;grid-template-columns:150px 1fr 110px 36px;gap:8px;margin-bottom:8px;align-items:center;}
.rc-row-fixo{display:grid;grid-template-columns:150px 120px 1fr;gap:8px;margin-bottom:8px;align-items:center;}
.rc-row-fixo .rc-row-label{font-size:13px;font-weight:600;color:var(--text);}
.rc-row-din{display:grid;grid-template-columns:1fr 120px 1fr 36px;gap:8px;margin-bottom:8px;align-items:center;}
.rc-row-din-meio{display:grid;grid-template-columns:1fr 140px 120px 1fr 36px;gap:8px;margin-bottom:8px;align-items:center;}
.rc-row-din-meio select{padding:7px 8px;border:1px solid var(--border);border-radius:6px;font-size:12.5px;background:#fff;width:100%;}
.dyn-row-avaria{display:grid;grid-template-columns:150px 1fr 100px 36px;gap:8px;margin-bottom:8px;align-items:center;}
.dyn-row-avaria-cat{display:grid;grid-template-columns:150px 1fr 90px minmax(150px,1.2fr) 36px;gap:8px;margin-bottom:8px;align-items:center;}
.dyn-row-avaria-cat select{padding:9px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);font-size:12.5px;width:100%;min-width:0;}
.dyn-row-del{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--danger);display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;}
.dyn-row-bilheteria{display:grid;grid-template-columns:1.3fr 70px 100px 100px 1fr 36px;gap:6px;margin-bottom:6px;align-items:center;}
.dyn-row-bilheteria input{padding:8px;font-size:12.5px;}
.dyn-row-central{display:grid;grid-template-columns:150px 130px 110px 1fr 36px;gap:8px;margin-bottom:8px;align-items:center;}
.dyn-row-central select{padding:9px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);font-size:12.5px;width:100%;min-width:0;}
.dyn-row-abastec{display:grid;grid-template-columns:150px 100px 110px 1fr 36px;gap:8px;margin-bottom:8px;align-items:center;}
.dyn-row-si{display:grid;grid-template-columns:1fr 110px 1fr 36px;gap:8px;margin-bottom:8px;align-items:center;}
.rv-sub-total{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;font-weight:700;color:var(--navy-800);padding:6px 0;border-top:1px dashed var(--border);margin-top:2px;}
.section-divider{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-muted);border-bottom:1px solid var(--border);padding-bottom:6px;margin:18px 0 12px;}

/* COLLAPSIBLE */
.collapsible-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:0;}
.collapsible-header:hover{color:var(--navy-700);}
.collapsible-toggle{font-size:18px;font-weight:400;color:var(--text-muted);line-height:1;user-select:none;}
.collapsible-body{padding-top:10px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(20,40,65,0.55);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;overflow-x:hidden;z-index:1000;}
.modal{background:#fff;border-radius:18px;max-width:640px;width:100%;padding:24px;box-shadow:0 20px 50px rgba(15,58,102,0.25);overflow-wrap:break-word;word-break:break-word;}
.modal.wide{max-width:860px;}
.modal-title{font-family:var(--font-display);text-transform:uppercase;font-size:18px;font-weight:700;color:var(--navy-900);margin:0 0 4px;}
.modal-sub{color:var(--text-muted);font-size:12.5px;margin-bottom:18px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;border-top:1px solid var(--border);padding-top:16px;flex-wrap:wrap;}

/* TOAST */
#toast-root{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--navy-900);color:#fff;padding:11px 16px;border-radius:7px;font-size:13px;font-weight:600;box-shadow:0 6px 18px rgba(0,0,0,0.25);border-left:4px solid var(--amber-500);min-width:220px;}
.toast.error{border-left-color:var(--danger);}
.toast.warning{border-left-color:var(--warning);}
.toast.success{border-left-color:var(--success);}

/* EMPTY */
.empty{text-align:center;padding:36px 20px;color:var(--text-muted);}
.empty-title{font-weight:700;color:var(--navy-800);margin-bottom:4px;}

/* SEGMENT ROW */
.seg-row{display:grid;grid-template-columns:1fr 1fr 1fr 90px;gap:10px;align-items:end;padding:10px 0;border-bottom:1px solid var(--border);}
.seg-row:last-child{border-bottom:none;}
.seg-name{font-weight:700;font-size:13px;align-self:center;}

/* TABS */
.tabs-pill{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.tabs-pill button{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:12.5px;font-weight:700;color:var(--text-muted);}
.tabs-pill button.active{background:var(--navy-900);color:#fff;border-color:var(--navy-900);}

/* UTILS */
.flex-between{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.flex-between>span{min-width:0;overflow-wrap:break-word;word-break:break-word;}
.muted{color:var(--text-muted);}
.mono{font-family:var(--font-mono);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.info-item label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:var(--text-muted);}
.info-item span{font-size:14px;color:var(--text);}

/* FINANCEIRO STATUS */
.fin-status-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.fin-status-row:last-child{border-bottom:none;}

/* PROFILE PAGE */
.profile-header{background:linear-gradient(135deg,var(--navy-800),var(--navy-900));border-radius:16px;padding:20px 24px;color:#fff;display:flex;align-items:center;gap:16px;margin-bottom:18px;}
.profile-avatar{width:52px;height:52px;border-radius:50%;background:var(--amber-500);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--navy-900);flex-shrink:0;}
.profile-name{font-family:var(--font-display);font-size:20px;font-weight:700;text-transform:uppercase;}
.profile-sub{font-size:12.5px;color:rgba(255,255,255,0.65);margin-top:2px;}

/* TERMINAL */
.terminal-card{background:var(--terminal-bg);border:1px solid #BBD3EE;border-radius:16px;padding:14px 18px;margin-bottom:16px;}
.terminal-title{font-family:var(--font-display);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--terminal);margin:0 0 8px;}
.terminal-timer{font-family:var(--font-mono);font-size:26px;font-weight:700;color:var(--terminal);}

/* VIAGEM TIPO */

/* MOBILE */
@media(max-width:880px){
  #app{flex-direction:column;padding:10px;gap:10px;align-items:stretch;}
  #main{width:100%;min-width:0;}
  #sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:10px;align-items:center;border-radius:16px;position:static;min-height:auto;}
  .brand{display:none;}
  .nav-item{flex-shrink:0;margin:0 4px;border-radius:10px;padding:8px 12px;font-size:12.5px;}
  .nav-item.active{background:#fff;color:var(--navy-800);}
  .sidebar-footer{display:none;}
  #main{border-radius:16px;}
  #content{padding:14px 12px 60px;}
  #topbar{padding:12px 14px;}
  .form-cols2{grid-template-columns:1fr;}
  .form-cols3{grid-template-columns:1fr 1fr;}
  .grid-2{grid-template-columns:1fr;}
  .seg-row{grid-template-columns:1fr 1fr;row-gap:8px;}
  .seg-name{grid-column:1/-1;}
  .dyn-row{grid-template-columns:1fr 90px 36px;}
  .dyn-row-cat{grid-template-columns:1fr;}
  .dyn-row-sub{grid-template-columns:1fr;}
  .rc-row-fixo{grid-template-columns:1fr;}
  .rc-row-din{grid-template-columns:1fr;}
  .rc-row-din-meio{grid-template-columns:1fr;}
  .dyn-row-avaria{grid-template-columns:1fr;}
  .dyn-row-avaria-cat{grid-template-columns:1fr;}
  .dyn-row-bilheteria{grid-template-columns:1fr 1fr;}
  .dyn-row-central{grid-template-columns:1fr;}
  .dyn-row-abastec{grid-template-columns:1fr;}
  .dyn-row-si{grid-template-columns:1fr;}
  .board-row{grid-template-columns:60px 1fr;row-gap:4px;}
  .board-status{grid-column:1/-1;text-align:left;}
  .modal{padding:16px;}
  .info-grid{grid-template-columns:1fr;}
}
@media(max-width:480px){
  .form-cols3{grid-template-columns:1fr;}
  table{min-width:380px;}
}

/* ANEXOS */
.anexos-section{margin-top:14px;border-top:1px solid var(--border);padding-top:12px;}
.anexo-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);}
.anexo-item:last-child{border-bottom:none;}
.anexo-icon{width:32px;height:32px;border-radius:6px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.anexo-info{flex:1;min-width:0;}
.anexo-nome{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.anexo-meta{font-size:11px;color:var(--text-muted);}
.anexo-actions{display:flex;gap:6px;flex-shrink:0;}
.gdrive-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:var(--navy-800);}
.gdrive-btn:hover{background:var(--bg);}
.gdrive-btn.uploading{opacity:0.6;cursor:not-allowed;}
.gdrive-status{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:20px;}

(function(){
  try{
    function checarModoDesktop(){
      var largura = document.documentElement.clientWidth;
      var ecra = window.screen && window.screen.width ? window.screen.width : largura;
      // Se o navegador estiver a "pedir o site para computador", a largura de layout
      // fica muito maior do que a largura real do ecrã do telemóvel.
      if(ecra > 0 && ecra < 600 && largura > ecra * 1.4){
        var b = document.createElement('div');
        b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#C73027;color:#fff;padding:10px 14px;font-family:-apple-system,Roboto,Arial,sans-serif;font-size:13px;line-height:1.4;display:flex;align-items:center;gap:10px;';
        b.innerHTML = '<span style="flex:1;">O ecrã não está a ajustar-se ao telemóvel. No menu do navegador (⋮), desative a opção "Site para computador" / "Ver versão para computador" para esta página.</span>'
          + '<button style="background:#fff;color:#C73027;border:none;border-radius:6px;padding:6px 10px;font-weight:700;flex-shrink:0;" onclick="this.parentNode.remove()">OK</button>';
        document.body.insertBefore(b, document.body.firstChild);
      }
    }
    window.addEventListener('load', checarModoDesktop);
  }catch(e){}
})();
</script>

/* ============================== SUPABASE AUTH ============================== */
const SUPABASE_URL = 'https://helwcbcsrxhqvqadgxhk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IjlUVSjZdMUdMJ8s3KsyIA_9tWwjSCz';

// Supabase client com Auth nativo
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const SUPABASE_ANEXOS_BUCKET = 'anexos'; // bucket privado, ver Sistema > Anexos

async function sbFetch(method, body){
  // Usa o token JWT da sessão activa para autenticar pedidos REST
  const { data: { session } } = await _sb.auth.getSession();
  const token = session ? session.access_token : SUPABASE_KEY;
  const ctrl = new AbortController();
  const to = setTimeout(()=>ctrl.abort(), 15000); // nunca fica pendurado indefinidamente numa rede instável
  let res;
  try{
    res = await fetch(`${SUPABASE_URL}/rest/v1/frota_state?id=eq.main`, {
      method,
      headers:{
        'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token,
        'Content-Type':'application/json',
        'Prefer': method==='POST'?'resolution=merge-duplicates':'return=minimal'
      },
      body: body ? JSON.stringify(body) : undefined,
      signal: ctrl.signal
    });
  } finally { clearTimeout(to); }
  if(!res.ok){ const e=await res.text(); throw new Error(e); }
  return method==='GET' ? res.json() : res;
}

async function sbRestFetch(method, table, query, body){
  const { data: { session } } = await _sb.auth.getSession();
  const token = session ? session.access_token : SUPABASE_KEY;
  const ctrl = new AbortController();
  const to = setTimeout(()=>ctrl.abort(), 15000);
  let res;
  try{
    res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query||''}`, {
      method,
      headers:{
        'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token,
        'Content-Type':'application/json',
        'Prefer': (method==='POST'?'resolution=merge-duplicates':'') + (method==='GET'?'':'return=minimal')
      },
      body: body ? JSON.stringify(body) : undefined,
      signal: ctrl.signal
    });
  } finally { clearTimeout(to); }
  if(!res.ok){ const e=await res.text(); throw new Error(e); }
  return method==='GET' ? res.json() : res;
}

/* ============================== NÍVEIS DE ACESSO (perfis de permissões configuráveis) ==============================
   Substitui os antigos 6 níveis fixos, gravados directamente no código. Agora os níveis de acesso

function permissoesModuloVazias(){

  MODULOS_ACESSO.forEach(m=>{ p[m.id]={ver:false,criar:false,editar:false,apagar:false}; });
  p.viagens.apenasProprios=false;

  p.relatorios={ver:false,criar:false,editar:false,apagar:false,sub};
  return p;
}

  p.relatorios={ver:true,criar:true,editar:true,apagar:true,sub};
  return p;
}

// administrador configurar em Níveis de Acesso fica gravado e nunca é substituído por esta função.
function niveisAcessoPadrao(){
  const relatoViagens = permissoesModuloVazias();
  relatoViagens.relatorios = {ver:true,criar:true,editar:true,apagar:true,sub:{
    viagens:{ver:true,apenasProprios:true}, caixa:{ver:false,apenasProprios:false}, caixaPeriodo:{ver:false,apenasProprios:false}
  }};
  const caixa = permissoesModuloVazias();
  caixa.relatorios = {ver:true,criar:true,editar:true,apagar:true,sub:{
    viagens:{ver:false,apenasProprios:false}, caixa:{ver:true,apenasProprios:true}, caixaPeriodo:{ver:true,apenasProprios:true}
  }};
  const atendente = permissoesModuloVazias();
  atendente.atendimento = {ver:true,criar:true,editar:true,apagar:true};

  return [
    {id:'admin', nome:'Administrador', fixo:true, superAdmin:true, somenteLeituraGlobal:false, permissoes:permissoesModuloTotais()},
    {id:'operador', nome:'Operador', fixo:false, superAdmin:false, somenteLeituraGlobal:false, permissoes:permissoesModuloTotais()},
    {id:'leitor', nome:'Leitor', fixo:false, superAdmin:false, somenteLeituraGlobal:true, permissoes:permissoesModuloTotais()},
    {id:'relato_viagens', nome:'Relato Viagens', fixo:false, superAdmin:false, somenteLeituraGlobal:false, permissoes:relatoViagens},
    {id:'caixa', nome:'Caixa', fixo:false, superAdmin:false, somenteLeituraGlobal:false, permissoes:caixa},
    {id:'atendente', nome:'Atendente', fixo:false, superAdmin:false, somenteLeituraGlobal:false, permissoes:atendente},
  ];
}
// Migração: converte níveis gravados no formato antigo ({ver,somenteLeitura}) para o novo
// formato granular ({ver,criar,editar,apagar}), sem alterar o comportamento de ninguém —
// somenteLeitura:false vira criar/editar/apagar:true (tinha tudo), somenteLeitura:true vira
// criar/editar/apagar:false (não tinha nada, só via). Idempotente: níveis já no formato novo
// (detectados pela presença da chave "criar") não são tocados.
function migrarPermissoesModuloAntigas(obj){
  if(!obj.niveisAcesso || !Array.isArray(obj.niveisAcesso)) return obj;
  obj.niveisAcesso.forEach(nivel=>{
    if(!nivel.permissoes) return;
    Object.keys(nivel.permissoes).forEach(chave=>{
      const pm = nivel.permissoes[chave];
      if(!pm || typeof pm !== 'object') return;
      if('criar' in pm) return; // já está no formato novo
      const tinhaTudo = !pm.somenteLeitura;
      pm.criar = tinhaTudo; pm.editar = tinhaTudo; pm.apagar = tinhaTudo;
      delete pm.somenteLeitura;
    });
  });
  return obj;
}
// Migração: as viagens deixaram de ter conceito de "ida/volta" — cada viagem passa a ser
// só um trajeto (partida → destino). Remove os campos de volta e o tipo de viagem que
// ainda existam em registos antigos. O histórico financeiro da volta não é preservado
// (decisão tomada ao remover a funcionalidade). Idempotente: em registos já migrados não
// há nada para apagar.
function migrarViagensRemoverVolta(obj){
  if(!obj.viagens || !Array.isArray(obj.viagens)) return obj;
  const camposVolta=['tipoViagem','voltaKmInicio','voltaKmFim','voltaLitros','voltaCustoCombustivel',
    'voltaBilheteria','voltaBagagemItens','voltaReceitaBilhetes','voltaReceitaBagagem','voltaReceitaOutros',
    'voltaOutrasEntradas','voltaCustosOutros','voltaOutrasSaidas'];
  obj.viagens.forEach(v=>{ camposVolta.forEach(c=>{ delete v[c]; }); });
  return obj;
}
// Garante que existe sempre pelo menos um nível de acesso (chamado sempre que o estado é carregado/recebido)
function garantirNiveisAcesso(obj){
  if(!obj.niveisAcesso || !Array.isArray(obj.niveisAcesso) || obj.niveisAcesso.length===0){
    obj.niveisAcesso = niveisAcessoPadrao();
  }
  migrarPermissoesModuloAntigas(obj);
  migrarViagensRemoverVolta(obj);
  return obj;
}

function getPerfilAcesso(){
  const perfis = state.niveisAcesso || [];
  const roleId = currentPerfil ? currentPerfil.role : null;
  return perfis.find(p=>p.id===roleId) || perfis.find(p=>p.id==='operador') || perfis[0] ||
    {id:'operador',nome:'Operador',fixo:false,superAdmin:false,somenteLeituraGlobal:false,permissoes:permissoesModuloTotais()};
}
function permModulo(moduloId){
  const p = getPerfilAcesso();
  return (p.permissoes && p.permissoes[moduloId]) || {ver:false,criar:false,editar:false,apagar:false};
}
function podeVer(moduloId){
  const p = getPerfilAcesso();
  if(p.superAdmin) return true;
  return !!permModulo(moduloId).ver;
}
// Devolve a chave do módulo de permissões correspondente ao separador actualmente aberto
// (o separador 'relatorios' cobre Relatório de Viagem e Relatório de Caixa)
function chaveModuloAtual(){
  return (currentTab==='relatorios') ? 'relatorios' : currentTab;
}
// Verifica se o nível de acesso actual pode executar 'criar'|'editar'|'apagar' no módulo indicado.
// superAdmin e somenteLeituraGlobal continuam a mandar por cima de tudo, como antes.
function podeNoModulo(moduloId, acao){
  const p = getPerfilAcesso();
  if(p.superAdmin) return true;
  if(p.somenteLeituraGlobal) return false;
  return !!permModulo(moduloId)[acao];
}
function naoPodeCriar(moduloId){ return !podeNoModulo(moduloId||chaveModuloAtual(), 'criar'); }
function naoPodeEditar(moduloId){ return !podeNoModulo(moduloId||chaveModuloAtual(), 'editar'); }
function naoPodeApagar(moduloId){ return !podeNoModulo(moduloId||chaveModuloAtual(), 'apagar'); }
function permSubRelatorio(subId){
  const rel = permModulo('relatorios');
  return (rel.sub && rel.sub[subId]) || {ver:false,apenasProprios:false};
}
function podeVerSubRelatorio(subId){
  const p = getPerfilAcesso();
  if(p.superAdmin) return true;
  return !!permSubRelatorio(subId).ver;
}
function relatorioApenasProprios(subId){
  const p = getPerfilAcesso();
  if(p.superAdmin) return false;
  return !!permSubRelatorio(subId).apenasProprios;
}

/* ── Persistência local-first + fila de sincronização ──
   Motivo desta arquitectura: o telemóvel no terreno perde rede muitas vezes a meio de uma
   operação (ex: durante uma chamada, a ligação de dados é suspensa em muitos aparelhos
   Android/iOS enquanto a chamada de voz está activa, e só volta no fim da chamada). Antes,
   o "Guardar" só existia em memória + no Supabase: se o pedido de rede falhasse depois de já
   termos mostrado "Guardado com sucesso", o registo desaparecia sem aviso ao actualizar a
   página, porque não havia nenhuma cópia local a que voltar. Agora:
   1. Cada alteração é gravada IMEDIATAMENTE no localStorage deste aparelho (isto nunca falha
      por falta de rede — é local). É essa cópia local que garante que nada se perde.
   2. Um envio para o Supabase é tentado em segundo plano. Se falhar (offline, chamada em
      curso, timeout), fica marcado como "por sincronizar" e volta a tentar sozinho — quando a
      rede voltar (evento 'online'), periodicamente enquanto houver pendências, e sempre que
      se volta a gravar algo.
   3. O utilizador nunca fica bloqueado: todos os módulos leem e escrevem em `state`, que está
      sempre disponível localmente, com ou sem rede. Só se mostra "sincronizado com a nuvem"
      quando isso for verdade — ver o indicador no topo da página. */
const LS_STATE_KEY = 'frota_state_local_v1';
const LS_PENDING_KEY = 'frota_state_pending_v1';
let syncPendente = false;
let syncEmCurso = false;
let syncRetryTimer = null;

function lsSalvarLocal(){
  try{
    localStorage.setItem(LS_STATE_KEY, JSON.stringify({ data: state, savedAt: new Date().toISOString() }));
  }catch(e){ /* localStorage indisponível ou cheio — a app continua a funcionar só em memória */ }
}
function lsCarregarLocal(){
  try{
    const raw = localStorage.getItem(LS_STATE_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function lsMarcarPendente(v){
  syncPendente = v;
  try{ localStorage.setItem(LS_PENDING_KEY, v?'1':'0'); }catch(e){}
  atualizarIndicadorSync();
}
function lsHaviaPendenteAoAbrir(){
  try{ return localStorage.getItem(LS_PENDING_KEY)==='1'; }catch(e){ return false; }
}

function atualizarIndicadorSync(){
  const el = document.getElementById('sync-status');
  if(!el) return;
  if(!navigator.onLine){
    el.className = 'sync-status sync-offline';
    el.innerHTML = `<span class="dot"></span>Sem internet${syncPendente?' · dados guardados no aparelho':''}`;
  } else if(syncEmCurso){
    el.className = 'sync-status sync-pending';
    el.innerHTML = `<span class="dot"></span>A sincronizar...`;
  } else if(syncPendente){
    el.className = 'sync-status sync-pending';
    el.innerHTML = `<span class="dot"></span>Por sincronizar`;
  } else {
    el.className = 'sync-status sync-ok';
    el.innerHTML = `<span class="dot"></span>Sincronizado`;
  }
}
function mostrarDetalheSync(){
  if(!navigator.onLine){
    showToast('Sem ligação à internet. Os dados estão guardados neste aparelho e serão enviados automaticamente quando a rede voltar.','');
  } else if(syncPendente){
    showToast('Há alterações por enviar para a nuvem. A tentar novamente...','');
    tentarSincronizar();
  } else {
    showToast('Tudo sincronizado com a nuvem.','success');
  }
}

async function tentarSincronizar(){
  if(syncEmCurso || !syncPendente || !navigator.onLine) return;
  syncEmCurso = true; atualizarIndicadorSync();
  try{
    const agora = new Date().toISOString();
    await sbFetch('POST',{id:'main',data:state,updated_at:agora});
    ultimoUpdatedAtConhecido = agora; // esta alteração é nossa — não precisamos de a "receber" de volta
    lsMarcarPendente(false);
    clearTimeout(syncRetryTimer);
  }catch(e){
    // Continua pendente; tenta de novo mais tarde (rede instável, chamada em curso, etc.)
    clearTimeout(syncRetryTimer);
    syncRetryTimer = setTimeout(tentarSincronizar, 20000);
  } finally {
    syncEmCurso = false; atualizarIndicadorSync();
  }
}

window.addEventListener('online', ()=>{ atualizarIndicadorSync(); tentarSincronizar(); verificarAtualizacoesRemotas(true); });
window.addEventListener('offline', atualizarIndicadorSync);

/* ── Actualização automática entre dispositivos ──
   Motivo de existir: com vários cobradores/caixas a usar o sistema ao mesmo tempo em
   aparelhos diferentes, cada um só via as alterações dos outros ao actualizar manualmente a
   página — o que não é natural de fazer a meio do trabalho, e dava a falsa impressão de que
   "ainda não tinha sido registado" quando na verdade já tinha, só não tinha chegado ao ecrã.
   Isto resolve isso com duas camadas, para funcionar mesmo que uma delas não esteja
   disponível no projecto Supabase:
   1. "Tempo real" (instantâneo, se a funcionalidade Realtime estiver activada no Supabase):
      subscreve directamente a alterações na tabela, e assim que outro aparelho grava algo,
      este recebe o aviso e busca os dados novos na hora.
   2. Verificação periódica (rede de segurança, funciona sempre): a cada poucos segundos,
      pergunta ao servidor "há algo mais recente?" — um pedido muito leve — e só busca tudo se
      a resposta for sim. Isto garante que, mesmo sem Realtime, ninguém fica mais do que
      alguns segundos "atrasado" em relação aos outros aparelhos.
   Em ambos os casos, os dados só são substituídos quando: (a) não há alterações locais deste
   aparelho por sincronizar (para nunca apagar algo que esta pessoa acabou de escrever), e
   (b) não há nenhum formulário aberto neste momento (para não desfazer/baralhar o que a
   pessoa está a preencher agora) — nesse caso a actualização fica em espera e aplica-se
   assim que o formulário for fechado. O separador e o registo/perfil abertos mantêm-se: só o
   conteúdo é actualizado, a pessoa não é "ejectada" do que estava a ver. */
let ultimoUpdatedAtConhecido = null;
let pollingTimer = null;
let _remoteMergePendente = null;
const POLL_INTERVALO_MS = 8000;

function estaModalAberto(){
  const root = document.getElementById('modal-root');
  return !!(root && root.children.length);
}

async function verificarAtualizacoesRemotas(forcar){
  if(!navigator.onLine) return;
  if(syncPendente || syncEmCurso) return; // há alterações locais por enviar — não sobrepor ainda
  try{
    const rows = await sbRestFetch('GET','frota_state','?id=eq.main&select=updated_at');
    const remoto = rows && rows[0] ? rows[0].updated_at : null;
    if(!remoto) return;
    if(!forcar && ultimoUpdatedAtConhecido && remoto===ultimoUpdatedAtConhecido) return;
    const full = await sbFetch('GET');
    if(!(full && full.length && full[0].data)) return;
    if(syncPendente || syncEmCurso) return; // uma gravação local aconteceu durante este pedido — não a sobrepor
    const chegouAlgoNovo = ultimoUpdatedAtConhecido!=null;
    ultimoUpdatedAtConhecido = full[0].updated_at || remoto;
    aplicarEstadoRemoto(full[0].data, chegouAlgoNovo);
  }catch(e){ /* silencioso — tenta de novo no próximo ciclo */ }
}

function aplicarEstadoRemoto(dadosNovos, avisar){
  const defaults = {viaturas:[],tripulacao:[],rotas:[],viagens:[],documentos:[],atendimentos:[],anexos:{},relatoriosViagens:[],relatoriosCaixa:[],lixeira:[],planoContas:[],lancamentos:[]};
  const novo = Object.assign({}, defaults, dadosNovos);
  if(!novo.relatoriosViagens) novo.relatoriosViagens=[];
  if(!novo.relatoriosCaixa) novo.relatoriosCaixa=[];
  if(!novo.lixeira) novo.lixeira=[];
  if(!novo.planoContas) novo.planoContas=[];
  if(!novo.lancamentos) novo.lancamentos=[];
  if(!novo.registosContabilidadePendentes) novo.registosContabilidadePendentes=[];
  if(!novo.atendimentos) novo.atendimentos=[];
  if(!novo.configContabilidade) novo.configContabilidade={contaCaixa:'',contaVendas:'',contaCombustivel:'',contaSaldoCobrador:'',contaCredoresAvarias:''};
  garantirNiveisAcesso(novo);

  if(estaModalAberto()){
    // Não interrompe quem está a preencher um formulário agora — aplica-se assim que fechar.
    _remoteMergePendente = { dados:novo, avisar };
    return;
  }
  state = novo;
  lsSalvarLocal();
  atualizarIndicadorSync();
  try{ renderNav(); renderContent(); }catch(e){}
  if(avisar) showToast('Dados actualizados — outro aparelho fez uma alteração.','');
}

function iniciarPollingAtualizacoes(){
  clearInterval(pollingTimer);
  pollingTimer = setInterval(()=>{
    if(document.hidden) return;
    verificarAtualizacoesRemotas(false);
  }, POLL_INTERVALO_MS);
}

document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden) verificarAtualizacoesRemotas(false);
});

function iniciarRealtimeAtualizacoes(){
  // Camada opcional/instantânea. Se a tabela frota_state não tiver o Realtime activado no
  // Supabase, esta subscrição simplesmente nunca dispara e o sistema segue-se só pelo
  // polling acima — por isso está envolvida em try/catch e nunca bloqueia o arranque da app.
  try{
    _sb.channel('frota_state_changes')
      .on('postgres_changes', { event:'*', schema:'public', table:'frota_state', filter:'id=eq.main' }, ()=>{
        verificarAtualizacoesRemotas(true);
      })
      .subscribe();
  }catch(e){ /* Realtime indisponível — segue-se só por polling */ }
}

async function loadState(){
  // 1) Carrega primeiro a cópia local — a app fica utilizável de imediato, mesmo sem rede.
  const local = lsCarregarLocal();
  const defaults = {viaturas:[],tripulacao:[],rotas:[],viagens:[],documentos:[],atendimentos:[],anexos:{},relatoriosViagens:[],relatoriosCaixa:[],lixeira:[],planoContas:[],lancamentos:[]};
  const haviaPendente = lsHaviaPendenteAoAbrir();
  if(local && local.data){
    state = Object.assign({}, defaults, local.data);
  }
  if(!state.relatoriosViagens) state.relatoriosViagens=[];
  if(!state.relatoriosCaixa) state.relatoriosCaixa=[];
  if(!state.lixeira) state.lixeira=[];
  if(!state.planoContas) state.planoContas=[];
  if(!state.lancamentos) state.lancamentos=[];
  if(!state.registosContabilidadePendentes) state.registosContabilidadePendentes=[];
  if(!state.atendimentos) state.atendimentos=[];
  if(!state.configContabilidade) state.configContabilidade={contaCaixa:'',contaVendas:'',contaCombustivel:'',contaSaldoCobrador:'',contaCredoresAvarias:''};
  garantirNiveisAcesso(state);

  if(haviaPendente){
    // Havia alterações feitas neste aparelho que ainda não tinham chegado à nuvem da última
    // vez (ex: a app foi fechada a meio de uma falha de rede). Nunca as descartamos a favor
    // dos dados do servidor — primeiro tentamos enviá-las; só depois de sincronizado é que
    // voltamos a confiar cegamente no servidor.
    syncPendente = true; atualizarIndicadorSync();
    if(navigator.onLine){ await tentarSincronizar(); }
    return;
  }

  // 2) Sem pendências locais: o servidor é a fonte de verdade — tenta trazer o mais recente.
  if(navigator.onLine){
    try{
      const rows = await sbFetch('GET');
      if(rows && rows.length>0 && rows[0].data){
        state = Object.assign({}, defaults, rows[0].data);
        ultimoUpdatedAtConhecido = rows[0].updated_at || null;
        if(!state.relatoriosViagens) state.relatoriosViagens=[];
        if(!state.relatoriosCaixa) state.relatoriosCaixa=[];
        if(!state.lixeira) state.lixeira=[];
        if(!state.planoContas) state.planoContas=[];
        if(!state.lancamentos) state.lancamentos=[];
        if(!state.registosContabilidadePendentes) state.registosContabilidadePendentes=[];
        if(!state.configContabilidade) state.configContabilidade={contaCaixa:'',contaVendas:'',contaCombustivel:'',contaSaldoCobrador:'',contaCredoresAvarias:''};
        garantirNiveisAcesso(state);
        lsSalvarLocal();
      }
    }catch(e){
      // Sem rede/erro ao buscar: fica com a cópia local (ou os valores por omissão), sem bloquear a app.
      if(local && local.data) showToast('Sem ligação à nuvem — a mostrar a última cópia guardada neste aparelho.','');
    }
  }
  atualizarIndicadorSync();
}

function saveState(){
  // Grava sempre, de imediato, uma cópia local — isto é o que garante que nada se perde,
  // mesmo que a rede caia no instante seguinte (ex: a meio de uma chamada).
  lsSalvarLocal();
  lsMarcarPendente(true);
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{ tentarSincronizar(); }, 500);
}

/* ============================== HELPERS ============================== */
function fmtData(iso){ if(!iso) return '—'; const d=new Date(iso); if(isNaN(d)) return '—'; return d.toLocaleDateString('pt-PT'); }
function fmtDataHora(iso){ if(!iso) return '—'; const d=new Date(iso); if(isNaN(d)) return '—'; return d.toLocaleDateString('pt-PT')+' '+d.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}); }
function fmtMT(v){ return (Number(v)||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2})+' MT'; }
function fmtNum(v,d){ return (Number(v)||0).toLocaleString('pt-PT',{minimumFractionDigits:d||0,maximumFractionDigits:d||1}); }
function esc(s){ return (s==null)?'':String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toDatetimeLocal(iso){ if(!iso) return ''; const d=new Date(iso); if(isNaN(d)) return ''; const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; }
function nowLocalInput(){ return toDatetimeLocal(new Date().toISOString()); }

function fmtDuracao(minutos){
  if(minutos==null || isNaN(minutos)) return '—';
  const m = Math.abs(Math.round(minutos));
  const dias = Math.floor(m / 1440);
  const horas = Math.floor((m % 1440) / 60);
  const mins = m % 60;
  let parts = [];
  if(dias>0) parts.push(dias+' dia'+(dias>1?'s':''));
  if(horas>0) parts.push(horas+' h');
  if(mins>0 || parts.length===0) parts.push(mins+' min');
  return (minutos<0?'-':'')+parts.join(' ');
}

function showToast(msg, type){
  const root=document.getElementById('toast-root');
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  el.textContent=msg;
  root.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); },2600);
}

function closeModal(){
  clearTimeout(_modalDraftTimer);
  if(_modalDraftKey){ try{ localStorage.removeItem(_modalDraftKey); }catch(e){} }
  _modalDraftKey = null; window._rascunhoModalPendente = null;
  document.getElementById('modal-root').innerHTML='';
  if(_remoteMergePendente){
    const pendente = _remoteMergePendente; _remoteMergePendente = null;
    if(syncPendente || syncEmCurso){
      // Há alterações locais por sincronizar — possivelmente foram gravadas mesmo agora,
      // ao fechar este formulário (ex: "Guardar" de um lançamento). Os dados remotos em
      // cache eram de ANTES dessa gravação: aplicá-los agora apagaria o que a pessoa acabou
      // de guardar (e pareceria "não gravou" / "outro aparelho alterou algo", quando na
      // verdade foi este ecrã a sobrepor-se a si próprio). Descartamos este pendente
      // desactualizado; a verificação periódica normal volta a comparar com o servidor em
      // segurança assim que esta gravação local tiver sido enviada.
    } else {
      aplicarEstadoRemoto(pendente.dados, pendente.avisar);
    }
  }
}
function openModal(html, wide){
  // Se havia outro modal/rascunho aberto (ex: um passo de um fluxo em várias etapas),
  // limpa o rascunho anterior antes de abrir o novo.
  clearTimeout(_modalDraftTimer);
  if(_modalDraftKey){ try{ localStorage.removeItem(_modalDraftKey); }catch(e){} }
  _modalDraftKey = null; window._rascunhoModalPendente = null;
  document.getElementById('modal-root').innerHTML=
    `<div class="modal-overlay" onmousedown="if(event.target===this) closeModal()">
       <div class="modal${wide?' wide':''}" id="modal-inner">${html}</div>
     </div>`;
  configurarRascunhoModal();
  aplicarBloqueioPermissoes(document.getElementById('modal-root'));
}
function confirmAction(msg, fn){
  openModal(`<p class="modal-title">Confirmar</p><p class="modal-sub">${esc(msg)}</p>
    <div class="modal-actions">

      <button class="btn btn-primary" id="cya">Confirmar</button>
    </div>`);
  document.getElementById('cya').onclick=()=>{ closeModal(); fn(); };
}

/* ── Recuperação de rascunhos de formulários interrompidos ──
   Motivo: se alguém está a preencher um formulário (ex: um relatório de viagem) e é
   interrompido — sai para atender outra coisa, a página actualiza sozinha (ex: o telemóvel
   recarregou a aba), ou a ligação cai — tudo o que ainda não tinha sido "Guardado"
   desaparecia sem aviso. Este mecanismo funciona para qualquer formulário da aplicação sem
   ser preciso alterá-lo um a um: enquanto um modal está aberto, vai guardando o que está
   escrito nos seus campos (com um pequeno atraso, para não sobrecarregar) no localStorage
   deste aparelho. Ao reabrir o mesmo formulário mais tarde, se houver um rascunho por
   terminar, a app pergunta se quer continuar de onde ficou. Assim que o formulário é
   guardado com sucesso (ou cancelado de propósito), o rascunho é apagado. */
let _modalDraftKey = null;
let _modalDraftTimer = null;

function _modalDraftHash(str){ let h=0; for(let i=0;i<str.length;i++){ h=((h<<5)-h+str.charCodeAt(i))|0; } return h; }

function configurarRascunhoModal(){
  const root = document.getElementById('modal-inner');
  if(!root) return;
  const ids = [...root.querySelectorAll('[id]')].map(e=>e.id).filter(Boolean).sort();
  if(ids.length < 2) return; // modais simples (confirmações, etc.) não têm campos que valha a pena recuperar
  _modalDraftKey = 'rascunho_modal_'+_modalDraftHash(ids.join('|'));

  let draft=null;
  try{ const raw=localStorage.getItem(_modalDraftKey); draft = raw?JSON.parse(raw):null; }catch(e){}
  if(draft && _modalDraftTemConteudo(draft)){
    window._rascunhoModalPendente = draft;
    const banner = document.createElement('div');
    banner.className='draft-banner';
    banner.innerHTML = `<span style="flex:1;">📝 Há dados de um preenchimento anterior que não chegou a ser guardado (ex: a ligação caiu ou a página foi actualizada a meio). Continuar de onde ficou?</span>
      <button type="button" class="btn btn-ghost btn-sm" onclick="descartarRascunhoModal()">Descartar</button>
      <button type="button" class="btn btn-primary btn-sm" onclick="restaurarRascunhoModal()">Restaurar</button>`;
    root.insertBefore(banner, root.firstChild);
  }
  root.addEventListener('input', _agendarGuardarRascunhoModal);
  root.addEventListener('change', _agendarGuardarRascunhoModal);
}

function _agendarGuardarRascunhoModal(){
  if(!_modalDraftKey) return;
  clearTimeout(_modalDraftTimer);
  _modalDraftTimer = setTimeout(()=>{
    const data = _capturarEstadoModal();
    try{
      if(_modalDraftTemConteudo(data)) localStorage.setItem(_modalDraftKey, JSON.stringify(data));
      else localStorage.removeItem(_modalDraftKey);
    }catch(e){}
  }, 600);
}

function _capturarEstadoModal(){
  const root = document.getElementById('modal-inner');
  const data = { fields:{}, containers:{} };
  if(!root) return data;
  root.querySelectorAll('input,textarea,select').forEach(el=>{
    if(!el.id || el.closest('[id$="-container"]')) return;
    if(el.type==='password' || el.type==='file') return;
    data.fields[el.id] = (el.type==='checkbox'||el.type==='radio') ? el.checked : el.value;
  });
  root.querySelectorAll('[id$="-container"]').forEach(cont=>{
    const rows = [...cont.children].map(rowEl=>{
      const rowData={};
      rowEl.querySelectorAll('input,textarea,select').forEach(inp=>{
        if(inp.type==='password'||inp.type==='file') return;
        [...inp.attributes].forEach(a=>{
          if(a.name.startsWith('data-')) rowData[a.name] = (inp.type==='checkbox'||inp.type==='radio') ? inp.checked : inp.value;
        });
      });
      return rowData;
    });
    data.containers[cont.id] = { rowTemplate: cont.children[0] ? cont.children[0].outerHTML : null, rows };
  });
  return data;
}

function _modalDraftTemConteudo(d){
  if(!d) return false;
  const algumCampo = Object.values(d.fields||{}).some(v=>v!==''&&v!==false&&v!=null);
  if(algumCampo) return true;
  return Object.values(d.containers||{}).some(c=>(c.rows||[]).some(r=>Object.values(r).some(v=>v!==''&&v!==false&&v!=null)));
}

function restaurarRascunhoModal(){
  const draft = window._rascunhoModalPendente;
  if(draft){
    Object.keys(draft.fields||{}).forEach(id=>{
      const el = document.getElementById(id); if(!el) return;
      if(el.type==='checkbox'||el.type==='radio') el.checked = draft.fields[id]; else el.value = draft.fields[id];
      el.dispatchEvent(new Event('change',{bubbles:true}));
      el.dispatchEvent(new Event('input',{bubbles:true}));
    });
    Object.keys(draft.containers||{}).forEach(contId=>{
      const cont = document.getElementById(contId); if(!cont) return;
      const info = draft.containers[contId]; const rows = info.rows||[];
      if(!rows.length) return;
      while(cont.children.length < rows.length && info.rowTemplate){ cont.insertAdjacentHTML('beforeend', info.rowTemplate); }
      [...cont.children].forEach((rowEl,i)=>{
        const rowData = rows[i]; if(!rowData) return;
        Object.keys(rowData).forEach(attr=>{
          const inp = rowEl.matches(`[${attr}]`) ? rowEl : rowEl.querySelector(`[${attr}]`);
          if(!inp) return;
          if(inp.type==='checkbox'||inp.type==='radio') inp.checked = rowData[attr]; else inp.value = rowData[attr];
        });
      });
    });
  }
  window._rascunhoModalPendente = null;
  const banner = document.querySelector('#modal-inner .draft-banner');
  if(banner) banner.remove();
  showToast('Dados restaurados.','success');
}
function descartarRascunhoModal(){
  if(_modalDraftKey){ try{ localStorage.removeItem(_modalDraftKey); }catch(e){} }
  window._rascunhoModalPendente = null;
  const banner = document.querySelector('#modal-inner .draft-banner');
  if(banner) banner.remove();
}

/* ── Categorias de "outras saídas" (dinheiro gasto pela tripulação em mão) ──
   Espelham o modelo de papel usado pelos cobradores em campo (Portagens, Taxas
   policiais, Acomodação, Alimentação), para agrupar e imprimir o relatório da
   viagem da mesma forma que o cobrador preenche no terreno. */
const CATEGORIAS_SAIDA_VIAGEM = ['Abastecimento (extra)','Portagens','Taxas policiais','Acomodação','Alimentação','Outros'];
const MEIOS_ENTREGA_CENTRAL = ['Central Caixa','E-Mola','M-Pesa','M-Kesh','Ponto 24','Outro'];

/* Agrupa itens (entradas/saídas) pela sua "categoria" fixa, preservando a ordem
   da primeira ocorrência — usado no resumo financeiro e na impressão da viagem. */
function agruparPorCategoria(itens){
  const blocks=[]; const idx={};
  (itens||[]).forEach(item=>{
    const cat=(item.categoria||'').trim();
    if(!cat){ blocks.push({tipo:'item',item}); return; }
    if(idx[cat]==null){ idx[cat]=blocks.length; blocks.push({tipo:'grupo',nome:cat,itens:[item]}); }
    else blocks[idx[cat]].itens.push(item);
  });
  return blocks;
}

/* ── Autorização de edição de viagens ──
   Regra (igual à Folha de Caixa): enquanto a viagem NÃO estiver concluída, quem a regista
   pode continuar a abrir o formulário e registar coisas novas. Depois de concluída, só o
   administrador edita directamente — qualquer outra pessoa tem de pedir autorização antes
   de poder alterar algo.
   Mas, tal como no Relatório de Caixa, ISSO NÃO SIGNIFICA que os dados já gravados possam
   ser alterados livremente enquanto a viagem está em curso: cada valor/linha, assim que é
   gravado ("Guardar"), fica cravado — só é possível ACRESCENTAR novos registos (nova
   entrada, nova saída, nova avaria, etc.), que por sua vez também ficam cravados ao serem
   gravados. Para corrigir algo já gravado é preciso autorização do administrador (ver
   podeEditarCamposCravados/pedidoEdicao), mesmo com a viagem ainda em curso. */
function podeEditarViagemDireto(v){ return isAdmin() || v.status!=='concluida'; }
/* Indica se, DENTRO do formulário aberto, os campos já gravados podem ser alterados
   directamente (não apenas acrescentados). Verdadeiro só para o administrador, ou para
   quem tenha um pedido de edição aprovado ainda por usar. */
function podeEditarCamposCravados(v){ return isAdmin() || (v.pedidoEdicao && v.pedidoEdicao.status==='aprovado'); }
/* Um campo/valor considera-se "cravado" quando já tem algo gravado (mesmo que seja 0). */
function temValorCravado(x){ return x!==null && x!==undefined && x!==''; }

/* ============================== CÁLCULOS ============================== */
function statusDocumento(validade){
  if(!validade) return {label:'Sem data',cls:'neutral',dias:null};
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const val=new Date(validade+'T00:00:00');
  const diff=Math.round((val-hoje)/86400000);
  if(diff<0) return {label:'Vencido',cls:'danger',dias:diff};
  if(diff<=30) return {label:'A vencer',cls:'warning',dias:diff};
  return {label:'Válido',cls:'success',dias:diff};
}

function segmentosCalculados(viagem){
  return (viagem.trocos||[]).map(t=>{
    let realMin=null, atraso=null;
    if(t.horaInicioReal && t.horaFimReal){
      realMin=Math.round((new Date(t.horaFimReal)-new Date(t.horaInicioReal))/60000);
      atraso=realMin-Number(t.duracaoEsperadaMin||0);
    }
    return Object.assign({},t,{realMin,atraso});
  });
}

function combustivelCalculado(viagem){
  const vt=getViatura(viagem.viaturaId);
  if(viagem.kmInicio==null||viagem.kmFim==null||!vt||!vt.consumoEsperado) return null;
  const dist=Number(viagem.kmFim)-Number(viagem.kmInicio);
  if(dist<=0) return null;
  const esp=dist/Number(vt.consumoEsperado);
  const reais=Number(viagem.litrosAbastecidos)||0;
  const pct=esp>0?((reais-esp)/esp*100):0;
  return {distancia:dist,litrosEsperados:esp,litrosReais:reais,diffPct:pct,desvio:pct>15};
}

function financeiroViagem(viagem){
  // Receitas
  const recPass = (Number(viagem.receitaBilhetes)||0)+(Number(viagem.receitaBagagem)||0)+(Number(viagem.receitaOutrosPassageiros)||0);
  const entOutras = (viagem.outrasEntradas||[]).reduce((s,e)=>s+(Number(e.valor)||0),0);
  const receitas= recPass+entOutras;

  // Custos
  const custComb    = Number(viagem.custoCombustivel)||0;
  const custOutros  = (viagem.custosOutros||[]).reduce((s,c)=>s+(Number(c.valor)||0),0);
  const saidasOutras= (viagem.outrasSaidas||[]).reduce((s,c)=>s+(Number(c.valor)||0),0);
  const custAvarias = (viagem.avarias||[]).reduce((s,a)=>s+(Number(a.custo)||0),0);
  const custos      = custComb+custOutros+saidasOutras+custAvarias;

  // Situação financeira
  // O cobrador paga do próprio dinheiro (receita em mãos) apenas combustível e outras saídas.
  // Avarias/reparações são liquidadas depois, separadamente (ex: fatura à garagem), por isso
  // NÃO reduzem o valor que o cobrador deve entregar ao caixa.
  const custosPagosPeloCobrador = custComb+custOutros+saidasOutras;
  const fundoRecebido = Number(viagem.fundoAuxilioRecebido)||0;
  const lucroEsperadoCobrador = receitas + fundoRecebido - custosPagosPeloCobrador;
  const recebidoCaixa = Number(viagem.valorEntregueAoCaixa)||0;
  const saldoCobrador = lucroEsperadoCobrador - recebidoCaixa;

  return {
    receitas, custos, lucro: receitas-custos,
    custAvarias, fundoRecebido, custosPagosPeloCobrador,
    saldoCobrador, recebidoCaixa,
    estadoCaixa: viagem.estadoCaixa||'cobrador',
    // Sub-totais espelhando o relatório em papel do cobrador (A a H):
    A: fundoRecebido, B: receitas, C: custosPagosPeloCobrador,
    D: fundoRecebido+receitas, E: custosPagosPeloCobrador,
    F: lucroEsperadoCobrador, G: recebidoCaixa, H: saldoCobrador,
  };
}

function elapsedLabel(iso){
  const ms=new Date()-new Date(iso);
  const h=Math.floor(ms/3600000);
  if(h<1) return Math.floor(ms/60000)+' min';
  if(h<24) return h+' h';
  const d=Math.floor(h/24);
  return d+' dia'+(d>1?'s':'')+' '+(h%24)+'h';
}

}

// Bloqueia botões marcados com data-acao="criar|editar|apagar" consoante a permissão real do
// nível de acesso actual no módulo do separador aberto. Chamada tanto em renderContent() (área
// #content) como em openModal() (formulários que vivem no #modal-root, fora do #content).
function aplicarBloqueioPermissoes(container){
  if(!container) return;
  const chave = chaveModuloAtual();
  container.querySelectorAll('[data-acao]').forEach(btn=>{
    const acao = btn.getAttribute('data-acao');
    if(acao!=='criar' && acao!=='editar' && acao!=='apagar') return;
    if(podeNoModulo(chave, acao)) return;
    btn.disabled=true;
    btn.title='Sem permissão para esta acção';
    btn.style.opacity='0.4';
    btn.style.cursor='not-allowed';
    btn.onclick=function(e){ e.stopPropagation(); showToast('Não tem permissão para esta acção. Contacte o administrador.',''); return false; };
  });
  // Se não tem NENHUMA das três acções no módulo, também desactiva os campos do formulário
  if(isLeitor()){
    container.querySelectorAll('input,textarea,select').forEach(el=>{ el.disabled=true; });
  }
}

function openProfile(tipo, id){
  currentProfile={tipo,id};
  renderNav();
  renderContent();
}

function viewDashboard(){
  const emCurso=viagensEmCurso();
  const agendadas=viagensAgendadas();
  const adiadas=viagensAdiadas();
  const agendadasAtrasadas=[...agendadas,...adiadas].filter(v=>new Date(v.dataPlaneada)<new Date());
  const alertasDoc=alertasDocumentos();
  const desvios=desviosCombustivel();
  const acompanharAtendimento=atendimentosPorAcompanhar();
  const hojeStr=new Date().toISOString().slice(0,10);
  const lucroMes=state.viagens.filter(v=>v.status==='concluida'&&(v.dataFim||'').slice(0,7)===hojeStr.slice(0,7)).reduce((s,v)=>s+financeiroViagem(v).lucro,0);
  const emTerminal=state.viagens.filter(v=>v.status==='terminal');

  const boardRows=emCurso.length ? emCurso.map(v=>{
    const vt=getViatura(v.viaturaId), rota=getRota(v.rotaId);
    const isTerminal=v.status==='terminal';
    const maior=!isTerminal?viagemMaiorAtraso(v):null;
    let statusHtml=`<span class="board-status ontime">No horário</span>`;
    if(isTerminal){
      const mins=Math.round((new Date()-new Date(v.terminalInicio))/60000);
      statusHtml=`<span class="board-status terminal-st">Terminal · ${fmtDuracao(mins)}</span>`;
    } else if(maior && maior.atraso>5){
      statusHtml=`<span class="board-status late">+${maior.atraso} min em "${esc(maior.nome)}"</span>`;
    }
    const avariaBadge=(v.avarias&&v.avarias.length)?` <span class="badge danger" style="font-size:10px;vertical-align:middle;">⚠ Avaria</span>`:'';
    return `<div class="board-row" style="cursor:pointer" onclick="verViagem('${v.id}')">
      <div class="board-badge${isTerminal?' terminal-badge':''}">${esc(vt?vt.matricula:'—')}</div>
      <div class="board-main">
        <div class="board-route">${isTerminal?'Na Terminal':esc(rota?rota.nome:'Rota não definida')}${avariaBadge}</div>
        <div class="board-meta">${isTerminal?`Na junta há ${elapsedLabel(v.terminalInicio)}`:`Há ${elapsedLabel(v.dataInicio)} · ${fmtDataHora(v.dataInicio)}`}</div>
      </div>
      ${statusHtml}
    </div>`;
  }).join('') : `<div class="board-empty">Nenhuma viagem em curso.</div>`;

  return `
    <div class="grid grid-stats" style="margin-bottom:18px;">
      <div class="stat-card${agendadasAtrasadas.length?' alert':''}">
        <div class="stat-label">Agendadas</div>
        <div class="stat-value">${agendadas.length+adiadas.length}</div>
        <div class="stat-sub">${agendadasAtrasadas.length ? agendadasAtrasadas.length+' já deviam ter iniciado' : (adiadas.length ? adiadas.length+' adiada(s)' : 'próximas partidas')}</div>
      </div>
      <div class="stat-card${emCurso.filter(v=>v.status==='em_curso').length?' warn':''}">
        <div class="stat-label">Viagens em curso</div>
        <div class="stat-value">${emCurso.filter(v=>v.status==='em_curso').length}</div>
        <div class="stat-sub">veículos fora da garagem</div>
      </div>
      <div class="stat-card${emTerminal.length?' terminal':''}">
        <div class="stat-label">Na terminal</div>
        <div class="stat-value">${emTerminal.length}</div>
        <div class="stat-sub">a carregar passageiros</div>
      </div>
      <div class="stat-card${alertasDoc.length?' alert':''}">
        <div class="stat-label">Alertas de documentos</div>
        <div class="stat-value">${alertasDoc.length}</div>
        <div class="stat-sub">vencidos ou a vencer</div>
      </div>
      <div class="stat-card${acompanharAtendimento.length?' alert':''}">
        <div class="stat-label">Atendimentos por acompanhar</div>
        <div class="stat-value">${acompanharAtendimento.length}</div>
        <div class="stat-sub">contactos combinados para hoje ou em atraso</div>
      </div>
      <div class="stat-card${lucroMes>=0?' ok':' alert'}">
        <div class="stat-label">Lucro do mês</div>
        <div class="stat-value" style="font-size:18px;">${fmtMT(lucroMes)}</div>
        <div class="stat-sub">viagens concluídas este mês</div>
      </div>
    </div>
    <div class="board" style="margin-bottom:18px;">
      <div class="board-head">Painel de viagens em curso</div>
      ${boardRows}
    </div>
    ${acompanharAtendimento.length ? `<div class="card" style="margin-bottom:18px;border-top:3px solid var(--danger);">
      <p class="section-title" style="color:var(--danger);">Contactos a fazer hoje / em atraso
        <button class="btn btn-ghost btn-sm" onclick="goTab('atendimento')">Ver todos</button>
      </p>
      <div class="table-wrap"><table><tbody>${acompanharAtendimento.slice(0,6).map(a=>`
        <tr style="cursor:pointer" onclick="goTab('atendimento');setTimeout(()=>formAtendimento('${a.id}'),0);">
          <td>${esc(a.nome)}<div class="muted" style="font-size:11.5px;">${esc(a.assunto||'—')}</div></td>
          <td style="text-align:right;"><span class="badge ${a.st.cls}">${a.st.label}</span></td>
        </tr>`).join('')}</tbody></table></div>
    </div>` : ''}
    <div class="grid grid-2">
      <div class="card">
        <p class="section-title">Documentos a vencer
          <button class="btn btn-ghost btn-sm" onclick="goTab('documentos')">Ver todos</button>
        </p>
        ${alertasDoc.length ? `<div class="table-wrap"><table><tbody>${alertasDoc.slice(0,6).map(d=>{
          const ent=d.entidadeTipo==='viatura'?getViatura(d.entidadeId):getPessoa(d.entidadeId);
          const nm=ent?(d.entidadeTipo==='viatura'?ent.matricula:ent.nome):'—';
          return `<tr><td>${esc(d.tipo)}<div class="muted" style="font-size:11.5px;">${esc(nm)}</div></td>
            <td style="text-align:right;"><span class="badge ${d.st.cls}">${d.st.label}</span></td></tr>`;

        : `<div class="empty"><div class="empty-title">Tudo em dia</div></div>`}
      </div>
      <div class="card">
        <p class="section-title">Desvios de combustível
          <button class="btn btn-ghost btn-sm" onclick="goTab('combustivel')">Ver todos</button>
        </p>
        ${desvios.length ? `<div class="table-wrap"><table><tbody>${desvios.slice(0,6).map(x=>{
          const vt=getViatura(x.viagem.viaturaId);
          return `<tr><td>${esc(vt?vt.matricula:'—')}<div class="muted" style="font-size:11.5px;">${fmtData(x.viagem.dataInicio)}</div></td>
            <td style="text-align:right;" class="num">+${fmtNum(x.c.diffPct,0)}%</td></tr>`;
        }).join('')}</tbody></table></div>`
        : `<div class="empty"><div class="empty-title">Sem alertas</div></div>`}
      </div>
    </div>`;
}

function statusViaturaAtual(vt){
  const viagem=state.viagens.find(v=>v.viaturaId===vt.id&&(v.status==='em_curso'||v.status==='terminal'));
  if(viagem){
    if(viagem.status==='terminal') return {label:'Na terminal',cls:'terminal'};
    const rota=getRota(viagem.rotaId);
    return {label:`Em viagem · ${rota?rota.nome:'rota'}`,cls:'warning'};
  }
  if(vt.estadoManual==='manutencao') return {label:'Em manutenção',cls:'danger'};
  if(vt.estadoManual==='parado') return {label:'Parado',cls:'neutral'};
  return {label:'Disponível',cls:'success'};
}

function salvarViatura(id){
  if(id ? naoPodeEditar('viaturas') : naoPodeCriar('viaturas')){ showToast('Sem permissão.','error'); return; }
  const matricula=document.getElementById('f-matricula').value.trim();
  if(!matricula){ showToast('Indique a matrícula.','error'); return; }
  const dados={
    matricula, modelo:document.getElementById('f-modelo').value.trim(),
    capacidade:Number(document.getElementById('f-capacidade').value)||0,
    consumoEsperado:Number(document.getElementById('f-consumo').value)||0,
    ano:document.getElementById('f-ano').value.trim(),
    chassis:document.getElementById('f-chassis').value.trim(),
    cor:document.getElementById('f-cor').value.trim(),
    obs:document.getElementById('f-obs').value.trim(),
    estadoManual:document.getElementById('f-estado').value,
  };
  let savedId;
  if(id){ Object.assign(getViatura(id),dados); savedId=id; audit('update','viatura',id,`Viatura ${dados.matricula} editada`,`Modelo: ${dados.modelo||'—'} · Estado: ${dados.estadoManual}`); }
  else{ const vt=Object.assign({id:uid('vt')},dados); state.viaturas.push(vt); savedId=vt.id; audit('create','viatura',savedId,`Nova viatura registada: ${dados.matricula}`,`Modelo: ${dados.modelo||'—'} · Lugares: ${dados.capacidade}`); }
  saveState(); closeModal(); renderContent();
  showToast('Viatura guardada.','success');
}

function apagarViatura(id){
  if(naoPodeApagar('viaturas')){ showToast('Sem permissão.','error'); return; }
  const vt=getViatura(id);
  confirmAction('Apagar esta viatura?',()=>{
    moverParaLixeira('viatura', vt, `Viatura eliminada: ${vt?vt.matricula:'—'}`);
    state.viaturas=state.viaturas.filter(v=>v.id!==id);
    saveState(); renderContent();
    showToast('Viatura movida para a lata de lixo.','success');
  });
}

function formRota(id){
  const r=id?getRota(id):null;

  openModal(`

function salvarRota(id){
  if(id ? naoPodeEditar('rotas') : naoPodeCriar('rotas')){ showToast('Sem permissão.','error'); return; }
  const nome=document.getElementById('f-rota-nome').value.trim();
  if(!nome){ showToast('Indique o nome da rota.','error'); return; }
  const nomes=[...document.querySelectorAll('[data-troco-nome]')].map(e=>e.value.trim());
  const mins=[...document.querySelectorAll('[data-troco-min]')].map(e=>Number(e.value)||0);
  const trocos=nomes.map((n,i)=>({nome:n||('Troço '+(i+1)),duracaoEsperadaMin:mins[i]})).filter(t=>t.nome);
  let savedRId;
  if(id){ const r=getRota(id); r.nome=nome; r.trocos=trocos; savedRId=id; audit('update','rota',id,`Rota "${nome}" editada`,`${trocos.length} troço(s)`); }
  else{ const rt={id:uid('rt'),nome,trocos}; state.rotas.push(rt); savedRId=rt.id; audit('create','rota',savedRId,`Nova rota criada: "${nome}"`,`${trocos.length} troço(s)`); }
  saveState(); closeModal(); renderContent();
  showToast('Rota guardada.','success');
}

function apagarRota(id){
  if(naoPodeApagar('rotas')){ showToast('Sem permissão.','error'); return; }
  const r=getRota(id);
  confirmAction('Apagar esta rota?',()=>{
    moverParaLixeira('rota', r, `Rota eliminada: "${r?r.nome:'—'}"`);
    state.rotas=state.rotas.filter(r=>r.id!==id);
    saveState(); renderContent();
    showToast('Rota movida para a lata de lixo.','success');
  });
}

function opcoesEntidade(tipo, sel){

  return lista.map(o=>`<option value="${o.id}" ${o.id===sel?'selected':''}>${esc(o.label)}</option>`).join('');

let financeiroFiltro='mes';

function viagensNoPeriodo(filtro){
  const hoje=new Date();
  return state.viagens.filter(v=>{
    if(v.status!=='concluida'||!v.dataFim) return false;
    const d=new Date(v.dataFim);
    if(filtro==='hoje') return d.toDateString()===hoje.toDateString();
    if(filtro==='semana'){ const df=(hoje-d)/86400000; return df>=0&&df<=7; }
    if(filtro==='mes') return d.getFullYear()===hoje.getFullYear()&&d.getMonth()===hoje.getMonth();
    return true;
  });
}

function estadoCaixaLabel(v){
  const ec=v.estadoCaixa||'cobrador';
  if(ec==='cobrador') return {label:'Com o cobrador',cls:'warning'};
  if(ec==='parcial') return {label:'Entrega parcial',cls:'info'};
  return {label:'No caixa',cls:'success'};
}

  {n:1, label:'Classe 1 · Meios Financeiros'},
  {n:2, label:'Classe 2 · Existências e Activos Biológicos'},
  {n:3, label:'Classe 3 · Activos Tangíveis, Intangíveis e Investimentos'},

  {n:6, label:'Classe 6 · Gastos e Perdas'},
  {n:7, label:'Classe 7 · Rendimentos e Ganhos'},

];
function classeLabelPorNumero(n){ const c=PLANO_CONTAS_CLASSES.find(x=>x.n===Number(n)); return c?c.label:'—'; }
function naturezaSugerida(classe){ return [1,2,3,6].includes(Number(classe))?'devedora':'credora'; }
function getConta(id){ return (state.planoContas||[]).find(c=>c.id===id); }

// Uma "conta mãe" é uma conta que tem sub-contas (outra conta cujo código começa por "<código>.").
// Só se pode lançar movimentos em contas de último grau (contas-folha, sem sub-contas).
function contaTemSubcontas(contaId){
  const conta = getConta(contaId);
  if(!conta) return false;
  const prefixo = conta.codigo+'.';
  return (state.planoContas||[]).some(c=>c.id!==conta.id && String(c.codigo).startsWith(prefixo));
}
function contaEhMovimentavel(contaId){ return !!getConta(contaId) && !contaTemSubcontas(contaId); }
// Contas de último grau (folha) disponíveis para lançamento no Diário
function contasMovimentaveis(){ return contasOrdenadas().filter(c=>!contaTemSubcontas(c.id)); }

const CLASSE_TITULOS = {
  1:'Meios financeiros',
  2:'Inventários e activos biológicos',
  3:'Investimentos de capital',
  4:'Contas a receber, contas a pagar, acréscimos e diferimentos',
  5:'Capital Próprio',
  6:'Gastos e perdas',
  7:'Rendimentos e ganhos',
  8:'Resultados',
};
function classeTitulo(n){ return CLASSE_TITULOS[Number(n)] || 'Sem classe'; }

// Compara códigos hierarquicamente por segmento numérico (ex: 2.1 < 2.1.1 < 2.2 < 2.10),
// em vez de comparação de texto simples, para que a árvore de contas fique correctamente ordenada.
function compareCodigos(a,b){
  const pa = String(a).split('.').map(Number);
  const pb = String(b).split('.').map(Number);
  const len = Math.max(pa.length, pb.length);
  for(let i=0;i<len;i++){
    const va = (pa[i]===undefined||isNaN(pa[i])) ? -1 : pa[i];
    const vb = (pb[i]===undefined||isNaN(pb[i])) ? -1 : pb[i];
    if(va!==vb) return va-vb;
  }
  return 0;
}
function grauDaConta(codigo){ return String(codigo).split('.').length; }
function contasOrdenadas(){ return [...(state.planoContas||[])].sort((a,b)=>compareCodigos(a.codigo,b.codigo)); }
function contasAgrupadasPorClasse(){
  const porClasse = {};
  (state.planoContas||[]).forEach(c=>{
    const cl = Number(c.classe)||0;
    if(!porClasse[cl]) porClasse[cl]=[];
    porClasse[cl].push(c);
  });
  return Object.keys(porClasse).map(Number).sort((a,b)=>a-b).map(cl=>({
    classe: cl,
    contas: porClasse[cl].sort((a,b)=>compareCodigos(a.codigo,b.codigo)),
  }));
}

function carregarPlanoContasOficial(){
  if(naoPodeCriar('financeiro')){ showToast('Sem permissão.','error'); return; }
  const existentes = new Set((state.planoContas||[]).map(c=>c.codigo));
  const novas = PGC_PE_PLANO_CONTAS.filter(c=>!existentes.has(c.codigo));
  if(!novas.length){ showToast('O plano de contas oficial (PGC-PE) já está todo carregado.',''); return; }
  confirmAction(`Carregar ${novas.length} conta(s) do plano oficial (PGC-PE) que ainda não existem no sistema? Contas já existentes com o mesmo código não serão alteradas.`, ()=>{
    if(!state.planoContas) state.planoContas=[];
    novas.forEach(c=>{ state.planoContas.push(Object.assign({id:uid('pc'),ativa:true}, c)); });
    audit('action','planoConta',null,`Plano de contas oficial (PGC-PE) carregado`,`${novas.length} conta(s) adicionada(s)`);
    saveState(); renderContent();
    showToast(`${novas.length} conta(s) adicionada(s) a partir do plano oficial.`,'success');
  });
}

function salvarConta(id){
  if(id ? naoPodeEditar('financeiro') : naoPodeCriar('financeiro')){ showToast('Sem permissão.','error'); return; }
  const codigo=document.getElementById('f-conta-codigo').value.trim();
  const designacao=document.getElementById('f-conta-designacao').value.trim();
  const classe=Number(document.getElementById('f-conta-classe').value);
  const natureza=document.getElementById('f-conta-natureza').value;
  const ativa=document.getElementById('f-conta-ativa').value==='1';
  if(!codigo){ showToast('Indique o código da conta.','error'); return; }
  if(!designacao){ showToast('Indique a designação da conta.','error'); return; }
  const duplicada=(state.planoContas||[]).find(x=>x.codigo===codigo && x.id!==id);
  if(duplicada){ showToast('Já existe uma conta com este código.','error'); return; }
  if(!state.planoContas) state.planoContas=[];
  if(id){
    const c=getConta(id); c.codigo=codigo; c.designacao=designacao; c.classe=classe; c.natureza=natureza; c.ativa=ativa;
    audit('update','planoConta',id,`Conta "${codigo} - ${designacao}" editada`);
  } else {
    const c={id:uid('pc'),codigo,designacao,classe,natureza,ativa};
    state.planoContas.push(c);
    audit('create','planoConta',c.id,`Nova conta criada: "${codigo} - ${designacao}"`);
  }
  saveState(); closeModal(); renderContent();
  showToast('Conta guardada.','success');
}

function apagarConta(id){
  if(naoPodeApagar('financeiro')){ showToast('Sem permissão.','error'); return; }
  const c=getConta(id);
  const emUso=(state.lancamentos||[]).some(l=>(l.linhas||[]).some(li=>li.contaId===id));
  if(emUso){ showToast('Esta conta tem lançamentos no Diário e não pode ser apagada. Pode marcá-la como inactiva.','error'); return; }
  confirmAction('Apagar esta conta?',()=>{
    moverParaLixeira('planoConta', c, `Conta eliminada: "${c?c.codigo+' - '+c.designacao:'—'}"`);
    state.planoContas=state.planoContas.filter(x=>x.id!==id);
    saveState(); renderContent();
    showToast('Conta movida para a lata de lixo.','success');
  });
}

function totaisLancamento(l){ const linhas=l.linhas||[]; return {debito:linhas.reduce((s,x)=>s+Number(x.debito||0),0), credito:linhas.reduce((s,x)=>s+Number(x.credito||0),0)}; }

function formLancamento(id, pendingId){
  const l=id?getLancamento(id):null;
  const registo=pendingId?getRegistoPendente(pendingId):null;
  let linhas=l&&l.linhas&&l.linhas.length?l.linhas:[{},{}];
  let dataInicial=l?l.data:new Date().toISOString().slice(0,10);
  let descricaoInicial=l?l.descricao:'';
  if(registo){
    dataInicial = (registo.dataViagem||new Date().toISOString()).slice(0,10);
    descricaoInicial = registo.descricaoSugerida;
    const lucro=registo.lucro;
    const custosRestantes = registo.custosSemConta!=null?registo.custosSemConta:registo.custos;
    const receitasRestantes = registo.receitasSemConta!=null?registo.receitasSemConta:registo.receitas;
    linhas=[
      ...(registo.itensCusto||[]).map(i=>({contaId:i.contaId, debito:i.valor, credito:0})),
      ...(custosRestantes>0.004?[{contaId:'', debito:custosRestantes, credito:0}]:[]),
      {contaId:'', debito: lucro>0?lucro:0, credito: lucro<0?-lucro:0},
      ...(registo.itensReceita||[]).map(i=>({contaId:i.contaId, debito:0, credito:i.valor})),
      ...(receitasRestantes>0.004?[{contaId:'', debito:0, credito:receitasRestantes}]:[]),
    ];
  }
  const numeroSugerido=l?l.numero:('JD-'+String(((state.lancamentos||[]).length)+1).padStart(4,'0'));
  openModal(`
    <p class="modal-title">${l?'Editar lançamento':'Novo lançamento'}</p>

      <div class="form-row"><label>Data</label><input id="f-lanc-data" type="date" value="${dataInicial}"></div>
      <div class="form-row"><label>Número</label><input id="f-lanc-numero" value="${esc(numeroSugerido)}"></div>

    <button class="btn btn-ghost btn-sm" onclick="addLinhaLancamento()">+ Adicionar linha</button>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" data-acao="${l?'editar':'criar'}" onclick="salvarLancamento('${l?l.id:''}','${pendingId||''}')">Guardar</button>
