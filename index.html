<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Frota · Ndolene</title>
<style>
:root{
  --navy-900:#142841;--navy-800:#1B3454;--navy-700:#234266;
  --amber-500:#E8A33D;--amber-600:#C8821E;--amber-100:#FBE8C9;
  --bg:#F1F4F7;--surface:#FFFFFF;--border:#DCE3EA;
  --text:#16212E;--text-muted:#5B6B7C;
  --success:#2F8F6B;--success-bg:#E3F3EC;
  --warning:#D98C1F;--warning-bg:#FBEDD8;
  --danger:#C0392B;--danger-bg:#FAE3E0;
  --terminal:#7B3FA0;--terminal-bg:#F3EBF9;
  --font-display:'Archivo Narrow','Oswald','Arial Narrow',sans-serif;
  --font-body:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}

#app{display:flex;min-height:100vh;}

/* SIDEBAR */
#sidebar{width:220px;flex-shrink:0;background:var(--navy-900);color:#fff;display:flex;flex-direction:column;padding:20px 0;}
.brand{padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,0.12);margin-bottom:14px;}
.brand-title{font-family:var(--font-display);font-weight:700;font-size:21px;letter-spacing:0.5px;text-transform:uppercase;color:#fff;margin:0;}
.brand-sub{font-family:var(--font-mono);font-size:11px;color:var(--amber-500);letter-spacing:1px;margin-top:2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:rgba(255,255,255,0.72);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:13.5px;font-weight:600;letter-spacing:0.3px;border-left:3px solid transparent;transition:background .12s;}
.nav-item:hover{background:rgba(255,255,255,0.06);color:#fff;}
.nav-item.active{background:rgba(255,255,255,0.1);color:#fff;border-left-color:var(--amber-500);}
.nav-dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.55;flex-shrink:0;}
.nav-item.active .nav-dot{background:var(--amber-500);opacity:1;}
.sidebar-footer{margin-top:auto;padding:14px 20px 0;border-top:1px solid rgba(255,255,255,0.12);}
.sidebar-footer-text{font-size:11px;color:rgba(255,255,255,0.45);line-height:1.4;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
#topbar h1{font-family:var(--font-display);font-size:19px;text-transform:uppercase;letter-spacing:0.5px;margin:0;font-weight:700;}
.topbar-date{font-family:var(--font-mono);color:var(--text-muted);font-size:12.5px;}
#content{padding:24px 28px 60px;flex:1;overflow-x:hidden;overflow-y:auto;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;}
.card+.card{margin-top:16px;}
.section-title{font-family:var(--font-display);text-transform:uppercase;letter-spacing:0.4px;font-size:14px;font-weight:700;color:var(--navy-800);margin:0 0 12px;display:flex;align-items:center;justify-content:space-between;}
.grid{display:grid;gap:14px;}
.grid-stats{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));}
.grid-2{grid-template-columns:1fr 1fr;}

.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;border-top:3px solid var(--navy-800);}
.stat-card.alert{border-top-color:var(--danger);}
.stat-card.warn{border-top-color:var(--warning);}
.stat-card.ok{border-top-color:var(--success);}
.stat-card.terminal{border-top-color:var(--terminal);}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);font-weight:700;}
.stat-value{font-family:var(--font-mono);font-size:28px;font-weight:600;margin-top:4px;color:var(--navy-900);}
.stat-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}

/* DEPARTURE BOARD */
.board{background:var(--navy-900);border-radius:8px;overflow:hidden;}
.board-head{padding:12px 18px;font-family:var(--font-display);text-transform:uppercase;letter-spacing:1px;font-size:12.5px;color:var(--amber-500);border-bottom:1px solid rgba(255,255,255,0.12);font-weight:700;}
.board-row{display:grid;grid-template-columns:74px 1fr auto;gap:14px;align-items:center;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,0.08);color:#fff;}
.board-row:last-child{border-bottom:none;}
.board-badge{font-family:var(--font-mono);font-weight:700;font-size:12px;background:var(--amber-500);color:var(--navy-900);border-radius:5px;padding:5px 4px;text-align:center;letter-spacing:0.3px;}
.board-badge.terminal-badge{background:var(--terminal-bg);color:var(--terminal);}
.board-main{min-width:0;}
.board-route{font-weight:700;font-size:13.5px;}
.board-meta{font-family:var(--font-mono);font-size:11.5px;color:rgba(255,255,255,0.6);margin-top:2px;}
.board-status{font-family:var(--font-mono);font-size:12px;text-align:right;white-space:nowrap;}
.board-status.late{color:#FF9B85;}
.board-status.ontime{color:#7FE3B4;}
.board-status.terminal-st{color:#D4AAFF;}
.board-empty{padding:24px 18px;color:rgba(255,255,255,0.55);font-size:13px;text-align:center;}

/* TABLE */
.table-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:480px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);border-bottom:2px solid var(--border);padding:8px 10px;font-weight:700;white-space:nowrap;}
td{padding:10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.num{font-family:var(--font-mono);}
.tbl-actions{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;}
.badge.success{background:var(--success-bg);color:var(--success);}
.badge.warning{background:var(--warning-bg);color:var(--warning);}
.badge.danger{background:var(--danger-bg);color:var(--danger);}
.badge.info{background:#E5EBF3;color:var(--navy-800);}
.badge.neutral{background:#EEF1F4;color:var(--text-muted);}
.badge.terminal{background:var(--terminal-bg);color:var(--terminal);}

/* BUTTONS */
.btn{border-radius:6px;padding:8px 14px;font-size:13px;font-weight:700;border:1px solid transparent;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--navy-900);color:#fff;}
.btn-primary:hover{background:var(--navy-800);}
.btn-amber{background:var(--amber-500);color:var(--navy-900);}
.btn-amber:hover{background:var(--amber-600);color:#fff;}
.btn-ghost{background:transparent;color:var(--navy-800);border-color:var(--border);}
.btn-ghost:hover{background:#EEF1F4;}
.btn-danger-ghost{background:transparent;color:var(--danger);border-color:var(--danger-bg);}
.btn-danger-ghost:hover{background:var(--danger-bg);}
.btn-terminal{background:var(--terminal-bg);color:var(--terminal);border-color:var(--terminal-bg);}
.btn-terminal:hover{background:#e0cfee;}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-block{width:100%;justify-content:center;}

/* FORMS */
.form-row{margin-bottom:13px;}
.form-row label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.3px;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:2px solid var(--amber-500);outline-offset:1px;border-color:var(--amber-500);}
.form-cols2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-cols3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.form-hint{font-size:11.5px;color:var(--text-muted);margin-top:4px;}
.dyn-row{display:grid;grid-template-columns:1fr 110px 36px;gap:8px;margin-bottom:8px;align-items:center;}
.dyn-row-avaria{display:grid;grid-template-columns:150px 1fr 100px 36px;gap:8px;margin-bottom:8px;align-items:center;}
.dyn-row-del{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--danger);display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;}
.section-divider{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-muted);border-bottom:1px solid var(--border);padding-bottom:6px;margin:18px 0 12px;}

/* COLLAPSIBLE */
.collapsible-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:0;}
.collapsible-header:hover{color:var(--navy-700);}
.collapsible-toggle{font-size:18px;font-weight:400;color:var(--text-muted);line-height:1;user-select:none;}
.collapsible-body{padding-top:10px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(20,40,65,0.55);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;z-index:1000;}
.modal{background:#fff;border-radius:10px;max-width:640px;width:100%;padding:24px;box-shadow:0 12px 40px rgba(0,0,0,0.25);}
.modal.wide{max-width:860px;}
.modal-title{font-family:var(--font-display);text-transform:uppercase;font-size:18px;font-weight:700;color:var(--navy-900);margin:0 0 4px;}
.modal-sub{color:var(--text-muted);font-size:12.5px;margin-bottom:18px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;border-top:1px solid var(--border);padding-top:16px;flex-wrap:wrap;}

/* TOAST */
#toast-root{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--navy-900);color:#fff;padding:11px 16px;border-radius:7px;font-size:13px;font-weight:600;box-shadow:0 6px 18px rgba(0,0,0,0.25);border-left:4px solid var(--amber-500);min-width:220px;}
.toast.error{border-left-color:var(--danger);}
.toast.success{border-left-color:var(--success);}

/* EMPTY */
.empty{text-align:center;padding:36px 20px;color:var(--text-muted);}
.empty-title{font-weight:700;color:var(--navy-800);margin-bottom:4px;}

/* SEGMENT ROW */
.seg-row{display:grid;grid-template-columns:1fr 1fr 1fr 90px;gap:10px;align-items:end;padding:10px 0;border-bottom:1px solid var(--border);}
.seg-row:last-child{border-bottom:none;}
.seg-name{font-weight:700;font-size:13px;align-self:center;}

/* TABS */
.tabs-pill{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.tabs-pill button{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:12.5px;font-weight:700;color:var(--text-muted);}
.tabs-pill button.active{background:var(--navy-900);color:#fff;border-color:var(--navy-900);}

/* UTILS */
.flex-between{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.muted{color:var(--text-muted);}
.mono{font-family:var(--font-mono);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.info-item label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:var(--text-muted);}
.info-item span{font-size:14px;color:var(--text);}

/* FINANCEIRO STATUS */
.fin-status-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.fin-status-row:last-child{border-bottom:none;}

/* PROFILE PAGE */
.profile-header{background:var(--navy-900);border-radius:8px;padding:20px 24px;color:#fff;display:flex;align-items:center;gap:16px;margin-bottom:18px;}
.profile-avatar{width:52px;height:52px;border-radius:50%;background:var(--amber-500);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--navy-900);flex-shrink:0;}
.profile-name{font-family:var(--font-display);font-size:20px;font-weight:700;text-transform:uppercase;}
.profile-sub{font-size:12.5px;color:rgba(255,255,255,0.65);margin-top:2px;}

/* TERMINAL */
.terminal-card{background:var(--terminal-bg);border:1px solid #D4C0E8;border-radius:8px;padding:14px 18px;margin-bottom:16px;}
.terminal-title{font-family:var(--font-display);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--terminal);margin:0 0 8px;}
.terminal-timer{font-family:var(--font-mono);font-size:26px;font-weight:700;color:var(--terminal);}

/* VIAGEM TIPO */
.viagem-tipo-tabs{display:flex;gap:0;margin-bottom:14px;border:1px solid var(--border);border-radius:7px;overflow:hidden;}
.viagem-tipo-tabs button{flex:1;padding:9px;border:none;background:#fff;font-size:12.5px;font-weight:700;color:var(--text-muted);border-right:1px solid var(--border);}
.viagem-tipo-tabs button:last-child{border-right:none;}
.viagem-tipo-tabs button.active{background:var(--navy-900);color:#fff;}

/* MOBILE */
@media(max-width:880px){
  #app{flex-direction:column;}
  #sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:10px 0;align-items:center;}
  .brand{display:none;}
  .nav-item{flex-shrink:0;border-left:none;border-bottom:3px solid transparent;padding:8px 12px;font-size:12.5px;}
  .nav-item.active{border-left-color:transparent;border-bottom-color:var(--amber-500);}
  .sidebar-footer{display:none;}
  #content{padding:14px 12px 60px;}
  #topbar{padding:12px 14px;}
  .form-cols2{grid-template-columns:1fr;}
  .form-cols3{grid-template-columns:1fr 1fr;}
  .grid-2{grid-template-columns:1fr;}
  .seg-row{grid-template-columns:1fr 1fr;row-gap:8px;}
  .seg-name{grid-column:1/-1;}
  .dyn-row{grid-template-columns:1fr 90px 36px;}
  .dyn-row-avaria{grid-template-columns:1fr;}
  .board-row{grid-template-columns:60px 1fr;row-gap:4px;}
  .board-status{grid-column:1/-1;text-align:left;}
  .modal{padding:16px;}
  .info-grid{grid-template-columns:1fr;}
}
@media(max-width:480px){
  .form-cols3{grid-template-columns:1fr;}
  table{min-width:380px;}
}

/* ANEXOS */
.anexos-section{margin-top:14px;border-top:1px solid var(--border);padding-top:12px;}
.anexo-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);}
.anexo-item:last-child{border-bottom:none;}
.anexo-icon{width:32px;height:32px;border-radius:6px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.anexo-info{flex:1;min-width:0;}
.anexo-nome{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.anexo-meta{font-size:11px;color:var(--text-muted);}
.anexo-actions{display:flex;gap:6px;flex-shrink:0;}
.gdrive-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:var(--navy-800);}
.gdrive-btn:hover{background:var(--bg);}
.gdrive-btn.uploading{opacity:0.6;cursor:not-allowed;}
.gdrive-status{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:20px;}
.gdrive-status.ok{background:var(--success-bg);color:var(--success);}
.gdrive-status.err{background:var(--danger-bg);color:var(--danger);}
.gdrive-status.idle{background:#EEF1F4;color:var(--text-muted);}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--navy-900);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:#fff;border-radius:12px;padding:36px 32px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
.login-logo{font-family:var(--font-display);font-size:22px;font-weight:700;text-transform:uppercase;color:var(--navy-900);margin:0 0 4px;}
.login-sub{font-family:var(--font-mono);font-size:11px;color:var(--amber-600);letter-spacing:1px;margin-bottom:28px;}
.login-label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.3px;}
.login-input{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:7px;font-size:15px;color:var(--text);margin-bottom:16px;}
.login-input:focus{outline:2px solid var(--amber-500);border-color:var(--amber-500);}
.login-btn{width:100%;padding:12px;background:var(--navy-900);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.3px;}
.login-btn:hover{background:var(--navy-800);}
.login-btn:disabled{opacity:0.6;cursor:not-allowed;}
.login-error{color:var(--danger);font-size:12.5px;margin-top:10px;text-align:center;min-height:18px;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <p class="login-logo">Gestão de Frota</p>
    <p class="login-sub">Ndolene Transportes e Logística</p>
    <label class="login-label">Senha de acesso</label>
    <input class="login-input" id="login-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') fazerLogin()">
    <button class="login-btn" id="login-btn" onclick="fazerLogin()">Entrar</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="brand">
      <p class="brand-title">Gestão de Frota</p>
      <p class="brand-sub">Ndolene Transportes</p>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-footer">
      <p class="sidebar-footer-text">Dados guardados na nuvem via Supabase · Ndolene Transportes e Logística</p>
    </div>
  </aside>
  <div id="main">
    <header id="topbar">
      <h1 id="page-title">Painel</h1>
      <div class="topbar-date" id="topbar-date"></div>
    </header>
    <main id="content"></main>
  </div>
</div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
/* ============================== SUPABASE ============================== */
const SUPABASE_URL = 'https://helwcbcsrxhqvqadgxhk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IjlUVSjZdMUdMJ8s3KsyIA_9tWwjSCz';

async function sbFetch(method, body){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/frota_state?id=eq.main`, {
    method,
    headers:{
      'apikey': SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,
      'Content-Type':'application/json',
      'Prefer': method==='POST'?'resolution=merge-duplicates':'return=minimal'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if(!res.ok){ const e=await res.text(); throw new Error(e); }
  return method==='GET' ? res.json() : res;
}

/* ============================== ESTADO ============================== */
let state = { viaturas:[], tripulacao:[], rotas:[], viagens:[], documentos:[], anexos:{} };
let currentTab = 'dashboard';
let currentProfile = null; // {tipo:'viatura'|'pessoa'|'rota', id}
let saveTimer = null;

function uid(p){ return p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

async function loadState(){
  try{
    const rows = await sbFetch('GET');
    if(rows && rows.length>0 && rows[0].data)
      state = Object.assign({viaturas:[],tripulacao:[],rotas:[],viagens:[],documentos:[],anexos:{}}, rows[0].data);
  }catch(e){ showToast('Erro ao carregar dados da nuvem.','error'); }
}

function saveState(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async()=>{
    try{ await sbFetch('POST',{id:'main',data:state,updated_at:new Date().toISOString()}); }
    catch(e){ showToast('Erro ao guardar dados na nuvem.','error'); }
  },500);
}

/* ============================== HELPERS ============================== */
function fmtData(iso){ if(!iso) return '—'; const d=new Date(iso); if(isNaN(d)) return '—'; return d.toLocaleDateString('pt-PT'); }
function fmtDataHora(iso){ if(!iso) return '—'; const d=new Date(iso); if(isNaN(d)) return '—'; return d.toLocaleDateString('pt-PT')+' '+d.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}); }
function fmtMT(v){ return (Number(v)||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2})+' MT'; }
function fmtNum(v,d){ return (Number(v)||0).toLocaleString('pt-PT',{minimumFractionDigits:d||0,maximumFractionDigits:d||1}); }
function esc(s){ return (s==null)?'':String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toDatetimeLocal(iso){ if(!iso) return ''; const d=new Date(iso); if(isNaN(d)) return ''; const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; }
function nowLocalInput(){ return toDatetimeLocal(new Date().toISOString()); }

function fmtDuracao(minutos){
  if(minutos==null || isNaN(minutos)) return '—';
  const m = Math.abs(Math.round(minutos));
  const dias = Math.floor(m / 1440);
  const horas = Math.floor((m % 1440) / 60);
  const mins = m % 60;
  let parts = [];
  if(dias>0) parts.push(dias+' dia'+(dias>1?'s':''));
  if(horas>0) parts.push(horas+' h');
  if(mins>0 || parts.length===0) parts.push(mins+' min');
  return (minutos<0?'-':'')+parts.join(' ');
}

function showToast(msg, type){
  const root=document.getElementById('toast-root');
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  el.textContent=msg;
  root.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); },2600);
}

function getPessoa(id){ return state.tripulacao.find(p=>p.id===id); }
function getRota(id){ return state.rotas.find(r=>r.id===id); }
function motoristaIdsOf(v){ return (v.motoristaIds&&v.motoristaIds.length)?v.motoristaIds:(v.motoristaId?[v.motoristaId]:[]); }
function cobradorIdsOf(v){ return (v.cobradorIds&&v.cobradorIds.length)?v.cobradorIds:(v.cobradorId?[v.cobradorId]:[]); }
function getMotoristas(v){ return motoristaIdsOf(v).map(getPessoa).filter(Boolean); }
function getCobradores(v){ return cobradorIdsOf(v).map(getPessoa).filter(Boolean); }
function nomesEquipa(pessoas){ return pessoas.length?pessoas.map(p=>esc(p.nome)).join(', '):null; }
function equipaInViagem(v,pessoaId){ return motoristaIdsOf(v).includes(pessoaId)||cobradorIdsOf(v).includes(pessoaId); }
function getViagem(id){ return state.viagens.find(v=>v.id===id); }

/* ============================== CÁLCULOS ============================== */
function statusDocumento(validade){
  if(!validade) return {label:'Sem data',cls:'neutral',dias:null};
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const val=new Date(validade+'T00:00:00');
  const diff=Math.round((val-hoje)/86400000);
  if(diff<0) return {label:'Vencido',cls:'danger',dias:diff};
  if(diff<=30) return {label:'A vencer',cls:'warning',dias:diff};
  return {label:'Válido',cls:'success',dias:diff};
}

function segmentosCalculados(viagem){
  return (viagem.trocos||[]).map(t=>{
    let realMin=null, atraso=null;
    if(t.horaInicioReal && t.horaFimReal){
      realMin=Math.round((new Date(t.horaFimReal)-new Date(t.horaInicioReal))/60000);
      atraso=realMin-Number(t.duracaoEsperadaMin||0);
    }
    return Object.assign({},t,{realMin,atraso});
  });
}

function combustivelCalculado(viagem){
  const vt=getViatura(viagem.viaturaId);
  if(viagem.kmInicio==null||viagem.kmFim==null||!vt||!vt.consumoEsperado) return null;
  const dist=Number(viagem.kmFim)-Number(viagem.kmInicio);
  if(dist<=0) return null;
  const esp=dist/Number(vt.consumoEsperado);
  const reais=Number(viagem.litrosAbastecidos)||0;
  const pct=esp>0?((reais-esp)/esp*100):0;
  return {distancia:dist,litrosEsperados:esp,litrosReais:reais,diffPct:pct,desvio:pct>15};
}

function financeiroViagem(viagem){
  // Receitas
  const recIda  = (Number(viagem.receitaBilhetes)||0)+(Number(viagem.receitaBagagem)||0)+(Number(viagem.receitaOutrosPassageiros)||0);
  const entOIda = (viagem.outrasEntradas||[]).reduce((s,e)=>s+(Number(e.valor)||0),0);
  const recVolta= (Number(viagem.voltaReceitaBilhetes)||0)+(Number(viagem.voltaReceitaBagagem)||0)+(Number(viagem.voltaReceitaOutros)||0);
  const entOVol = (viagem.voltaOutrasEntradas||[]).reduce((s,e)=>s+(Number(e.valor)||0),0);
  const receitas= recIda+entOIda+recVolta+entOVol;

  // Custos
  const custCombIda  = Number(viagem.custoCombustivel)||0;
  const custCombVol  = Number(viagem.voltaCustoCombustivel)||0;
  const custOutrosIda= (viagem.custosOutros||[]).reduce((s,c)=>s+(Number(c.valor)||0),0);
  const saidasOIda   = (viagem.outrasSaidas||[]).reduce((s,c)=>s+(Number(c.valor)||0),0);
  const custOutrosVol= (viagem.voltaCustosOutros||[]).reduce((s,c)=>s+(Number(c.valor)||0),0);
  const saidasOVol   = (viagem.voltaOutrasSaidas||[]).reduce((s,c)=>s+(Number(c.valor)||0),0);
  const custAvarias  = (viagem.avarias||[]).reduce((s,a)=>s+(Number(a.custo)||0),0);
  const custos       = custCombIda+custCombVol+custOutrosIda+saidasOIda+custOutrosVol+saidasOVol+custAvarias;

  // Situação financeira
  const totalBruto = recIda+entOIda+recVolta+entOVol;
  const recebidoCaixa = Number(viagem.valorEntregueAoCaixa)||0;
  const saldoCobrador = totalBruto - recebidoCaixa;

  return {
    receitas, custos, lucro: receitas-custos,
    receitasIda: recIda+entOIda, receitasVolta: recVolta+entOVol,
    custosIda: custCombIda+custOutrosIda+saidasOIda,
    custosVolta: custCombVol+custOutrosVol+saidasOVol,
    custAvarias,
    saldoCobrador, recebidoCaixa,
    estadoCaixa: viagem.estadoCaixa||'cobrador'
  };
}

function elapsedLabel(iso){
  const ms=new Date()-new Date(iso);
  const h=Math.floor(ms/3600000);
  if(h<1) return Math.floor(ms/60000)+' min';
  if(h<24) return h+' h';
  const d=Math.floor(h/24);
  return d+' dia'+(d>1?'s':'')+' '+(h%24)+'h';
}

function viagemMaiorAtraso(viagem){
  const segs=segmentosCalculados(viagem).filter(s=>s.atraso!=null);
  if(!segs.length) return null;
  return segs.reduce((a,b)=>b.atraso>a.atraso?b:a);
}

function alertasDocumentos(){
  return state.documentos
    .map(d=>Object.assign({},d,{st:statusDocumento(d.dataValidade)}))
    .filter(d=>d.st.cls==='danger'||d.st.cls==='warning')
    .sort((a,b)=>(a.st.dias??0)-(b.st.dias??0));
}
function viagensEmCurso(){
  return state.viagens.filter(v=>v.status==='em_curso'||v.status==='terminal').sort((a,b)=>new Date(a.dataInicio)-new Date(b.dataInicio));
}
function viagensAgendadas(){
  return state.viagens.filter(v=>v.status==='agendada').sort((a,b)=>new Date(a.dataPlaneada)-new Date(b.dataPlaneada));
}
function viagensAdiadas(){
  return state.viagens.filter(v=>v.status==='adiada').sort((a,b)=>new Date(a.dataPlaneada)-new Date(b.dataPlaneada));
}
function viagensCanceladas(){
  return state.viagens.filter(v=>v.status==='cancelada').sort((a,b)=>new Date(b.dataCancelamento||0)-new Date(a.dataCancelamento||0));
}
function statusViagemInfo(v){
  if(v.status==='concluida') return {label:'Concluída', cls:'success'};
  if(v.status==='terminal') return {label:'Terminal', cls:'terminal'};
  if(v.status==='agendada') return {label:'Agendada', cls:'info'};
  if(v.status==='adiada') return {label:'Adiada', cls:'warning'};
  if(v.status==='cancelada') return {label:'Cancelada', cls:'danger'};
  return {label:'Em curso', cls:'warning'};
}
function desviosCombustivel(){
  return state.viagens.map(v=>({viagem:v,c:combustivelCalculado(v)})).filter(x=>x.c&&x.c.desvio).sort((a,b)=>new Date(b.viagem.dataInicio)-new Date(a.viagem.dataInicio));
}

const TABS=[
  {id:'dashboard',label:'Painel'},{id:'viagens',label:'Viagens'},
  {id:'viaturas',label:'Viaturas'},{id:'tripulacao',label:'Tripulação'},
  {id:'rotas',label:'Rotas'},{id:'combustivel',label:'Combustível'},
  {id:'documentos',label:'Documentos'},{id:'financeiro',label:'Financeiro'},
];

function renderNav(){
  document.getElementById('nav').innerHTML=TABS.map(t=>
    `<button class="nav-item${t.id===currentTab&&!currentProfile?' active':''}" onclick="goTab('${t.id}')">
       <span class="nav-dot"></span>${t.label}
     </button>`).join('');
}

function goTab(tab){ currentTab=tab; currentProfile=null; renderNav(); document.getElementById('page-title').textContent=TABS.find(t=>t.id===tab).label; renderContent(); }

function renderContent(){
  const c=document.getElementById('content');
  if(currentProfile){ c.innerHTML=viewProfile(currentProfile); return; }
  if(currentTab==='dashboard') c.innerHTML=viewDashboard();
  else if(currentTab==='viagens') c.innerHTML=viewViagens();
  else if(currentTab==='viaturas') c.innerHTML=viewViaturas();
  else if(currentTab==='tripulacao') c.innerHTML=viewTripulacao();
  else if(currentTab==='rotas') c.innerHTML=viewRotas();
  else if(currentTab==='combustivel') c.innerHTML=viewCombustivel();
  else if(currentTab==='documentos') c.innerHTML=viewDocumentos();
  else if(currentTab==='financeiro') c.innerHTML=viewFinanceiro();
}

function openProfile(tipo, id){
  currentProfile={tipo,id};
  renderNav();
  renderContent();
}

function viewDashboard(){
  const emCurso=viagensEmCurso();
  const agendadas=viagensAgendadas();
  const adiadas=viagensAdiadas();
  const agendadasAtrasadas=[...agendadas,...adiadas].filter(v=>new Date(v.dataPlaneada)<new Date());
  const alertasDoc=alertasDocumentos();
  const desvios=desviosCombustivel();
  const hojeStr=new Date().toISOString().slice(0,10);
  const lucroMes=state.viagens.filter(v=>v.status==='concluida'&&(v.dataFim||'').slice(0,7)===hojeStr.slice(0,7)).reduce((s,v)=>s+financeiroViagem(v).lucro,0);
  const emTerminal=state.viagens.filter(v=>v.status==='terminal');

  const boardRows=emCurso.length ? emCurso.map(v=>{
    const vt=getViatura(v.viaturaId), rota=getRota(v.rotaId);
    const isTerminal=v.status==='terminal';
    const maior=!isTerminal?viagemMaiorAtraso(v):null;
    let statusHtml=`<span class="board-status ontime">No horário</span>`;
    if(isTerminal){
      const mins=Math.round((new Date()-new Date(v.terminalInicio))/60000);
      statusHtml=`<span class="board-status terminal-st">Terminal · ${fmtDuracao(mins)}</span>`;
    } else if(maior && maior.atraso>5){
      statusHtml=`<span class="board-status late">+${maior.atraso} min em "${esc(maior.nome)}"</span>`;
    }
    const avariaBadge=(v.avarias&&v.avarias.length)?` <span class="badge danger" style="font-size:10px;vertical-align:middle;">⚠ Avaria</span>`:'';
    return `<div class="board-row" style="cursor:pointer" onclick="abrirViagem('${v.id}')">
      <div class="board-badge${isTerminal?' terminal-badge':''}">${esc(vt?vt.matricula:'—')}</div>
      <div class="board-main">
        <div class="board-route">${isTerminal?'Na Terminal':esc(rota?rota.nome:'Rota não definida')}${avariaBadge}</div>
        <div class="board-meta">${isTerminal?`Na junta há ${elapsedLabel(v.terminalInicio)}`:`Há ${elapsedLabel(v.dataInicio)} · ${fmtDataHora(v.dataInicio)}`}</div>
      </div>
      ${statusHtml}
    </div>`;
  }).join('') : `<div class="board-empty">Nenhuma viagem em curso.</div>`;

  return `
    <div class="grid grid-stats" style="margin-bottom:18px;">
      <div class="stat-card${agendadasAtrasadas.length?' alert':''}">
        <div class="stat-label">Agendadas</div>
        <div class="stat-value">${agendadas.length+adiadas.length}</div>
        <div class="stat-sub">${agendadasAtrasadas.length ? agendadasAtrasadas.length+' já deviam ter iniciado' : (adiadas.length ? adiadas.length+' adiada(s)' : 'próximas partidas')}</div>
      </div>
      <div class="stat-card${emCurso.filter(v=>v.status==='em_curso').length?' warn':''}">
        <div class="stat-label">Viagens em curso</div>
        <div class="stat-value">${emCurso.filter(v=>v.status==='em_curso').length}</div>
        <div class="stat-sub">veículos fora da garagem</div>
      </div>
      <div class="stat-card${emTerminal.length?' terminal':''}">
        <div class="stat-label">Na terminal</div>
        <div class="stat-value">${emTerminal.length}</div>
        <div class="stat-sub">a carregar passageiros</div>
      </div>
      <div class="stat-card${alertasDoc.length?' alert':''}">
        <div class="stat-label">Alertas de documentos</div>
        <div class="stat-value">${alertasDoc.length}</div>
        <div class="stat-sub">vencidos ou a vencer</div>
      </div>
      <div class="stat-card${lucroMes>=0?' ok':' alert'}">
        <div class="stat-label">Lucro do mês</div>
        <div class="stat-value" style="font-size:18px;">${fmtMT(lucroMes)}</div>
        <div class="stat-sub">viagens concluídas este mês</div>
      </div>
    </div>
    <div class="board" style="margin-bottom:18px;">
      <div class="board-head">Painel de viagens em curso</div>
      ${boardRows}
    </div>
    <div class="grid grid-2">
      <div class="card">
        <p class="section-title">Documentos a vencer
          <button class="btn btn-ghost btn-sm" onclick="goTab('documentos')">Ver todos</button>
        </p>
        ${alertasDoc.length ? `<div class="table-wrap"><table><tbody>${alertasDoc.slice(0,6).map(d=>{
          const ent=d.entidadeTipo==='viatura'?getViatura(d.entidadeId):getPessoa(d.entidadeId);
          const nm=ent?(d.entidadeTipo==='viatura'?ent.matricula:ent.nome):'—';
          return `<tr><td>${esc(d.tipo)}<div class="muted" style="font-size:11.5px;">${esc(nm)}</div></td>
            <td style="text-align:right;"><span class="badge ${d.st.cls}">${d.st.label}</span></td></tr>`;
        }).join('')}</tbody></table></div>`
        : `<div class="empty"><div class="empty-title">Tudo em dia</div></div>`}
      </div>
      <div class="card">
        <p class="section-title">Desvios de combustível
          <button class="btn btn-ghost btn-sm" onclick="goTab('combustivel')">Ver todos</button>
        </p>
        ${desvios.length ? `<div class="table-wrap"><table><tbody>${desvios.slice(0,6).map(x=>{
          const vt=getViatura(x.viagem.viaturaId);
          return `<tr><td>${esc(vt?vt.matricula:'—')}<div class="muted" style="font-size:11.5px;">${fmtData(x.viagem.dataInicio)}</div></td>
            <td style="text-align:right;" class="num">+${fmtNum(x.c.diffPct,0)}%</td></tr>`;
        }).join('')}</tbody></table></div>`
        : `<div class="empty"><div class="empty-title">Sem alertas</div></div>`}
      </div>
    </div>`;
}

/* ============================== VIATURAS ============================== */
function statusViaturaAtual(vt){
  const viagem=state.viagens.find(v=>v.viaturaId===vt.id&&(v.status==='em_curso'||v.status==='terminal'));
  if(viagem){
    if(viagem.status==='terminal') return {label:'Na terminal',cls:'terminal'};
    const rota=getRota(viagem.rotaId);
    return {label:`Em viagem · ${rota?rota.nome:'rota'}`,cls:'warning'};
  }
  if(vt.estadoManual==='manutencao') return {label:'Em manutenção',cls:'danger'};
  if(vt.estadoManual==='parado') return {label:'Parado',cls:'neutral'};
  return {label:'Disponível',cls:'success'};
}

  if(!state.viaturas.length) return `<div class="card"><div class="empty"><div class="empty-title">Sem viaturas</div><div style="margin-top:16px;"><button class="btn btn-primary" onclick="formViatura()">+ Adicionar viatura</button></div></div></div>`;
  return `
    <div class="flex-between" style="margin-bottom:14px;"><div></div>
      <button class="btn btn-primary" onclick="formViatura()">+ Adicionar viatura</button>
    </div>
    <div class="card">
      <div class="table-wrap"><table>
        <thead><tr><th>Matrícula</th><th>Modelo</th><th>Lugares</th><th>Consumo esp.</th><th>Estado</th><th></th></tr></thead>
        <tbody>${state.viaturas.map(v=>{
          const st=statusViaturaAtual(v);
          return `<tr>
            <td><strong>${esc(v.matricula)}</strong></td>
            <td>${esc(v.modelo)}</td>
            <td class="num">${esc(v.capacidade)||'—'}</td>
            <td class="num">${v.consumoEsperado?fmtNum(v.consumoEsperado,1)+' km/l':'—'}</td>
            <td><span class="badge ${st.cls}">${st.label}</span></td>
            <td class="tbl-actions">
              <button class="btn btn-ghost btn-sm" onclick="openProfile('viatura','${v.id}')">Ver ficha</button>
              <button class="btn btn-ghost btn-sm" onclick="formViatura('${v.id}')">Editar</button>
              <button class="btn btn-danger-ghost btn-sm" onclick="apagarViatura('${v.id}')">Apagar</button>

    <div class="form-cols2">
      <div class="form-row"><label>Matrícula</label><input id="f-matricula" value="${esc(v?v.matricula:'')}" placeholder="Ex: MZ-12-AB-34"></div>
      <div class="form-row"><label>Modelo</label><input id="f-modelo" value="${esc(v?v.modelo:'')}" placeholder="Ex: Toyota Coaster"></div>
    </div>
    <div class="form-cols3">
      <div class="form-row"><label>Lugares</label><input id="f-capacidade" type="number" min="1" value="${v?v.capacidade:''}"></div>
      <div class="form-row"><label>Consumo esp. (km/l)</label><input id="f-consumo" type="number" min="0" step="0.1" value="${v?v.consumoEsperado:''}"></div>
      <div class="form-row"><label>Ano</label><input id="f-ano" type="number" min="1990" max="2030" value="${v?v.ano:''}"></div>
    </div>
    <div class="form-cols2">
      <div class="form-row"><label>Chassis / Nº de série</label><input id="f-chassis" value="${esc(v?v.chassis:'')}"></div>
      <div class="form-row"><label>Cor</label><input id="f-cor" value="${esc(v?v.cor:'')}" placeholder="Ex: Branco"></div>
    </div>
    <div class="form-row"><label>Observações</label><textarea id="f-obs" rows="2">${esc(v?v.obs:'')}</textarea></div>
    <div class="form-row"><label>Estado manual (quando não está em viagem)</label>
      <select id="f-estado">
        <option value="disponivel" ${v&&v.estadoManual==='disponivel'?'selected':''}>Disponível</option>
        <option value="manutencao" ${v&&v.estadoManual==='manutencao'?'selected':''}>Em manutenção</option>
        <option value="parado" ${v&&v.estadoManual==='parado'?'selected':''}>Parado</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarViatura('${v?v.id:''}')">Guardar</button>
    </div>`);
}

function salvarViatura(id){
  const matricula=document.getElementById('f-matricula').value.trim();
  if(!matricula){ showToast('Indique a matrícula.','error'); return; }
  const dados={
    matricula, modelo:document.getElementById('f-modelo').value.trim(),
    capacidade:Number(document.getElementById('f-capacidade').value)||0,
    consumoEsperado:Number(document.getElementById('f-consumo').value)||0,
    ano:document.getElementById('f-ano').value.trim(),
    chassis:document.getElementById('f-chassis').value.trim(),
    cor:document.getElementById('f-cor').value.trim(),
    obs:document.getElementById('f-obs').value.trim(),
    estadoManual:document.getElementById('f-estado').value,
  };
  if(id){ Object.assign(getViatura(id),dados); }
  else{ state.viaturas.push(Object.assign({id:uid('vt')},dados)); }
  saveState(); closeModal(); renderContent();
  showToast('Viatura guardada.','success');
}

function apagarViatura(id){
  confirmAction('Apagar esta viatura?',()=>{
    state.viaturas=state.viaturas.filter(v=>v.id!==id);
    saveState(); renderContent();
    showToast('Viatura apagada.','success');
  });
}

function salvarRota(id){
  const nome=document.getElementById('f-rota-nome').value.trim();
  if(!nome){ showToast('Indique o nome da rota.','error'); return; }
  const nomes=[...document.querySelectorAll('[data-troco-nome]')].map(e=>e.value.trim());
  const mins=[...document.querySelectorAll('[data-troco-min]')].map(e=>Number(e.value)||0);
  const trocos=nomes.map((n,i)=>({nome:n||('Troço '+(i+1)),duracaoEsperadaMin:mins[i]})).filter(t=>t.nome);
  if(id){ const r=getRota(id); r.nome=nome; r.trocos=trocos; }
  else{ state.rotas.push({id:uid('rt'),nome,trocos}); }
  saveState(); closeModal(); renderContent();
  showToast('Rota guardada.','success');
}

}

/* ============================== FINANCEIRO ============================== */
let financeiroFiltro='mes';

function viagensNoPeriodo(filtro){
  const hoje=new Date();
  return state.viagens.filter(v=>{
    if(v.status!=='concluida'||!v.dataFim) return false;
    const d=new Date(v.dataFim);
    if(filtro==='hoje') return d.toDateString()===hoje.toDateString();
    if(filtro==='semana'){ const df=(hoje-d)/86400000; return df>=0&&df<=7; }
    if(filtro==='mes') return d.getFullYear()===hoje.getFullYear()&&d.getMonth()===hoje.getMonth();
    return true;
  });
}

function estadoCaixaLabel(v){
  const ec=v.estadoCaixa||'cobrador';
  if(ec==='cobrador') return {label:'Com o cobrador',cls:'warning'};
  if(ec==='parcial') return {label:'Entrega parcial',cls:'info'};
  return {label:'No caixa',cls:'success'};
}

function viewFinanceiro(){
  const viagens=viagensNoPeriodo(financeiroFiltro);
  const totais=viagens.reduce((acc,v)=>{ const f=financeiroViagem(v); acc.receitas+=f.receitas; acc.custos+=f.custos; acc.lucro+=f.lucro; return acc; },{receitas:0,custos:0,lucro:0});
  const saldoTotal=viagens.reduce((s,v)=>s+financeiroViagem(v).saldoCobrador,0);

  const porViatura={};
  viagens.forEach(v=>{ const f=financeiroViagem(v); const k=v.viaturaId||'sem'; porViatura[k]=(porViatura[k]||0)+f.lucro; });
  const ranking=Object.entries(porViatura).map(([id,lucro])=>({viatura:getViatura(id),lucro})).sort((a,b)=>b.lucro-a.lucro);

  return `
    <div class="tabs-pill">
      ${[['hoje','Hoje'],['semana','7 dias'],['mes','Este mês'],['todos','Tudo']].map(([k,l])=>
        `<button class="${financeiroFiltro===k?'active':''}" onclick="financeiroFiltro='${k}'; renderContent();">${l}</button>`).join('')}
    </div>
    <div class="grid grid-stats" style="margin-bottom:16px;">
      <div class="stat-card"><div class="stat-label">Receitas</div><div class="stat-value" style="font-size:18px;">${fmtMT(totais.receitas)}</div></div>
      <div class="stat-card"><div class="stat-label">Custos</div><div class="stat-value" style="font-size:18px;">${fmtMT(totais.custos)}</div></div>
      <div class="stat-card ${totais.lucro>=0?'ok':'alert'}"><div class="stat-label">Lucro</div><div class="stat-value" style="font-size:18px;">${fmtMT(totais.lucro)}</div></div>
      <div class="stat-card ${saldoTotal>0?'warn':'ok'}"><div class="stat-label">Saldo em cobradores</div><div class="stat-value" style="font-size:18px;">${fmtMT(saldoTotal)}</div><div class="stat-sub">valor ainda não entregue ao caixa</div></div>
    </div>
    <div class="grid grid-2">
      <div class="card">
        <p class="section-title">Lucro por viatura</p>
        ${ranking.length?`<div class="table-wrap"><table><tbody>${ranking.map(r=>`<tr>
          <td>${esc(r.viatura?r.viatura.matricula:'—')}</td>
          <td style="text-align:right;" class="num">${fmtMT(r.lucro)}</td>
        </tr>`).join('')}</tbody></table></div>`:`<div class="empty">Sem viagens.</div>`}
      </div>
      <div class="card">
        <p class="section-title">Situação das receitas por viagem</p>
        ${viagens.length?`<div class="table-wrap"><table>
          <thead><tr><th>Data</th><th>Viatura</th><th>Receita</th><th>Saldo cobrador</th><th>Estado</th><th></th></tr></thead>
          <tbody>${viagens.sort((a,b)=>new Date(b.dataFim)-new Date(a.dataFim)).slice(0,12).map(v=>{
            const f=financeiroViagem(v); const vt=getViatura(v.viaturaId); const ec=estadoCaixaLabel(v);
            return `<tr>
              <td>${fmtData(v.dataFim)}</td>
              <td>${esc(vt?vt.matricula:'—')}</td>
              <td class="num">${fmtMT(f.receitas)}</td>
              <td class="num" style="color:${f.saldoCobrador>0?'var(--warning)':'var(--success)'}">${fmtMT(f.saldoCobrador)}</td>
              <td><span class="badge ${ec.cls}">${ec.label}</span></td>
              <td><button class="btn btn-ghost btn-sm" onclick="atualizarEstadoCaixa('${v.id}')">Atualizar</button></td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>`:`<div class="empty">Sem viagens neste período.</div>`}
      </div>
    </div>`;
}

function atualizarEstadoCaixa(id){

/* ============================== VIAGENS ============================== */
let viagensFiltro='em_curso';

function viewViagens(){
  const agendadas=viagensAgendadas();
  const emCurso=viagensEmCurso();
  const concluidas=state.viagens.filter(v=>v.status==='concluida').sort((a,b)=>new Date(b.dataFim)-new Date(a.dataFim));
  const adiadas=viagensAdiadas();
  const canceladas=viagensCanceladas();
  return `
    <div class="flex-between" style="margin-bottom:14px;">
      <div class="tabs-pill" style="margin-bottom:0;flex-wrap:wrap;">
        <button class="${viagensFiltro==='agendadas'?'active':''}" onclick="viagensFiltro='agendadas'; renderContent();">Agendadas (${agendadas.length})</button>
        <button class="${viagensFiltro==='em_curso'?'active':''}" onclick="viagensFiltro='em_curso'; renderContent();">Em curso (${emCurso.length})</button>
        <button class="${viagensFiltro==='concluidas'?'active':''}" onclick="viagensFiltro='concluidas'; renderContent();">Concluídas (${concluidas.length})</button>
        <button class="${viagensFiltro==='adiadas'?'active':''}" onclick="viagensFiltro='adiadas'; renderContent();">Adiadas (${adiadas.length})</button>
        <button class="${viagensFiltro==='canceladas'?'active':''}" onclick="viagensFiltro='canceladas'; renderContent();">Canceladas (${canceladas.length})</button>
      </div>
      <button class="btn btn-primary" onclick="formViagem()">+ Nova viagem</button>
    </div>
    ${viagensFiltro==='agendadas' ? renderListaAgendadas(agendadas)
      : viagensFiltro==='em_curso' ? renderListaEmCurso(emCurso)
      : viagensFiltro==='adiadas' ? renderListaAgendadas(adiadas, true)
      : viagensFiltro==='canceladas' ? renderListaCanceladas(canceladas)
      : renderListaConcluidas(concluidas)}`;
}

function renderListaAgendadas(lista, isAdiadas){
  if(!lista.length) return `<div class="card"><div class="empty"><div class="empty-title">${isAdiadas?'Nenhuma viagem adiada':'Nenhuma viagem agendada'}</div>${isAdiadas?'Viagens agendadas que forem adiadas aparecem aqui.':'Quando criar uma viagem com data/hora futura, ela fica aqui até registar o início real, ser adiada ou cancelada.'}</div></div>`;
  const agora=new Date();
  return lista.map(v=>{
    const vt=getViatura(v.viaturaId), rota=getRota(v.rotaId), motNomes=nomesEquipa(getMotoristas(v)), cobNomes=nomesEquipa(getCobradores(v));
    const atrasada=new Date(v.dataPlaneada)<agora;
    return `<div class="card" style="margin-bottom:12px;">
      <div class="flex-between">
        <div>
          <strong style="font-size:15px;">${esc(vt?vt.matricula:'—')} · ${esc(rota?rota.nome:'Rota não definida')}</strong>
          <div class="muted" style="font-size:12.5px;margin-top:3px;">
            ${motNomes||'sem motorista'} · ${cobNomes||'sem cobrador'} · prevista para ${fmtDataHora(v.dataPlaneada)}
            ${v.vezesAdiada?` · adiada ${v.vezesAdiada}×`:''}
          </div>
          <div style="margin-top:6px;">${atrasada
            ? `<span class="badge warning">Devia ter iniciado — confirme com o motorista</span>`
            : `<span class="badge ${isAdiadas?'warning':'info'}">${isAdiadas?'Adiada':'Agendada'}</span>`}</div>
        </div>
        <div class="tbl-actions" style="flex-wrap:wrap;justify-content:flex-end;">
          <button class="btn btn-amber btn-sm" onclick="formRegistrarInicioReal('${v.id}')">Registar início real</button>
          <button class="btn btn-ghost btn-sm" onclick="formAdiarViagem('${v.id}')">Adiar</button>
          <button class="btn btn-danger-ghost btn-sm" onclick="formCancelarViagem('${v.id}')">Cancelar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderListaCanceladas(lista){
  if(!lista.length) return `<div class="card"><div class="empty"><div class="empty-title">Sem viagens canceladas</div></div></div>`;
  return `<div class="card"><div class="table-wrap"><table>
    <thead><tr><th>Estava prevista para</th><th>Viatura</th><th>Rota</th><th>Motivo</th><th>Cancelada em</th></tr></thead>
    <tbody>${lista.map(v=>{
      const vt=getViatura(v.viaturaId), rota=getRota(v.rotaId);
      return `<tr>
        <td>${fmtDataHora(v.dataPlaneada)}</td>
        <td>${esc(vt?vt.matricula:'—')}</td>
        <td>${esc(rota?rota.nome:'—')}</td>
        <td>${esc(v.motivoCancelamento)||'—'}</td>
        <td>${fmtDataHora(v.dataCancelamento)}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div></div>`;
}

function renderListaEmCurso(lista){
  if(!lista.length) return `<div class="card"><div class="empty"><div class="empty-title">Nenhuma viagem em curso</div></div></div>`;
  return lista.map(v=>{
    const vt=getViatura(v.viaturaId), rota=getRota(v.rotaId), motNomes=nomesEquipa(getMotoristas(v)), cobNomes=nomesEquipa(getCobradores(v));
    const isTerminal=v.status==='terminal';
    const maior=!isTerminal?viagemMaiorAtraso(v):null;
    const termBadge=isTerminal?`<span class="badge terminal" style="margin-left:8px;">Na Terminal</span>`:'';
    return `<div class="card" style="margin-bottom:12px;">
      <div class="flex-between">
        <div>
          <strong style="font-size:15px;">${esc(vt?vt.matricula:'—')} · ${esc(rota?rota.nome:'Rota não definida')}</strong>${termBadge}${(v.avarias&&v.avarias.length)?` <span class="badge danger">⚠ Avaria registada</span>`:''}
          <div class="muted" style="font-size:12.5px;margin-top:3px;">${motNomes||'sem motorista'} · ${cobNomes||'sem cobrador'} · iniciada ${fmtDataHora(v.dataInicio)}${isTerminal?` · na terminal há ${elapsedLabel(v.terminalInicio)}`:''}</div>
          ${maior&&maior.atraso>5?`<div style="margin-top:6px;"><span class="badge warning">Atraso de ${maior.atraso} min em "${esc(maior.nome)}"</span></div>`:''}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${!isTerminal?`<button class="btn btn-terminal btn-sm" onclick="irParaTerminal('${v.id}')">→ Terminal</button>`:`<button class="btn btn-amber btn-sm" onclick="sairDaTerminal('${v.id}')">Saiu da terminal</button>`}
          <button class="btn btn-amber" onclick="abrirViagem('${v.id}')">Atualizar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderListaConcluidas(lista){

        <td><span class="badge ${v.tipoViagem==='volta'?'info':'neutral'}">${v.tipoViagem==='volta'?'Volta':'Ida'}</span></td>

function criarViagem(){
  const rotaId=document.getElementById('nf-rota').value;
  const viaturaId=document.getElementById('nf-viatura').value;
  const motoristaIds=[...document.querySelectorAll('.nf-motorista-chk:checked')].map(el=>el.value);
  const cobradorIds=[...document.querySelectorAll('.nf-cobrador-chk:checked')].map(el=>el.value);
  const dataPrevista=document.getElementById('nf-inicio').value;
  const tipoViagem=document.getElementById('f-tipo').value;
  if(!viaturaId||!dataPrevista){ showToast('Selecione a viatura e a data prevista de início.','error'); return; }
  const rota=getRota(rotaId);
  const trocos=rota?rota.trocos.map(t=>({nome:t.nome,duracaoEsperadaMin:t.duracaoEsperadaMin,horaInicioReal:null,horaFimReal:null})):[];
  const dataPrevistaISO=new Date(dataPrevista).toISOString();
  const ehFutura=new Date(dataPrevistaISO)>new Date();
  state.viagens.push({
    id:uid('vg'), rotaId:rotaId||null, viaturaId, motoristaId:motoristaIds[0]||null, cobradorId:cobradorIds[0]||null,
    motoristaIds, cobradorIds,
    dataPlaneada:dataPrevistaISO, dataPlaneadaOriginal:null, vezesAdiada:0,
    dataInicio:ehFutura?null:dataPrevistaISO, dataFim:null, status:ehFutura?'agendada':'em_curso', tipoViagem,
    trocos, kmInicio:null, kmFim:null, litrosAbastecidos:null, custoCombustivel:null,
    receitaBilhetes:null, receitaBagagem:null, receitaOutrosPassageiros:null,
    custosOutros:[], outrasEntradas:[], outrasSaidas:[],
    estadoCaixa:'cobrador', valorEntregueAoCaixa:0,
    // campos volta (só relevantes quando tipoViagem==='volta')
    voltaReceitaBilhetes:null, voltaReceitaBagagem:null, voltaReceitaOutros:null,
    voltaOutrasEntradas:[], voltaCustoCombustivel:null, voltaCustosOutros:[], voltaOutrasSaidas:[],
    terminalInicio:null,
    motivoCancelamento:null, dataCancelamento:null,
  });
  saveState(); closeModal();
  viagensFiltro=ehFutura?'agendadas':'em_curso';
  goTab('viagens');
  showToast(ehFutura?'Viagem agendada.':'Viagem iniciada.','success');
}

function formRegistrarInicioReal(id){
  const v=getViagem(id); if(!v) return;
  openModal(`
    <p class="modal-title">Registar início real</p>
    <p class="modal-sub">Estava prevista para ${fmtDataHora(v.dataPlaneada)}. Indique quando a viagem realmente começou — passa para "Em curso".</p>
    <div class="form-row"><label>Data/hora real de início</label><input id="ri-inicio" type="datetime-local" value="${nowLocalInput()}"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarInicioReal('${v.id}')">Confirmar início</button>
    </div>`);
}

function confirmarInicioReal(id){
  const v=getViagem(id);
  const val=document.getElementById('ri-inicio').value;
  if(!val){ showToast('Indique a data/hora real de início.','error'); return; }
  v.dataInicio=new Date(val).toISOString();
  v.status='em_curso';
  saveState(); closeModal();
  viagensFiltro='em_curso';
  renderContent();
  showToast('Viagem iniciada.','success');
}

function formAdiarViagem(id){
  const v=getViagem(id); if(!v) return;
  openModal(`
    <p class="modal-title">Adiar viagem</p>
    <p class="modal-sub">Atualmente prevista para ${fmtDataHora(v.dataPlaneada)}.</p>
    <div class="form-row"><label>Nova data/hora prevista</label><input id="ad-data" type="datetime-local" value="${toDatetimeLocal(v.dataPlaneada)}"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarAdiamento('${v.id}')">Guardar nova data</button>
    </div>`);
}

function confirmarAdiamento(id){
  const v=getViagem(id);
  const val=document.getElementById('ad-data').value;
  if(!val){ showToast('Indique a nova data/hora.','error'); return; }
  if(!v.dataPlaneadaOriginal) v.dataPlaneadaOriginal=v.dataPlaneada;
  v.dataPlaneada=new Date(val).toISOString();
  v.vezesAdiada=(v.vezesAdiada||0)+1;
  v.status='adiada';
  saveState(); closeModal();
  viagensFiltro='adiadas';
  renderContent();
  showToast('Viagem adiada.','success');
}

function formCancelarViagem(id){
  const v=getViagem(id); if(!v) return;
  openModal(`
    <p class="modal-title">Cancelar viagem</p>
    <p class="modal-sub">A viagem passa a "Cancelada" e sai das listas ativas, mas fica guardada no histórico.</p>

    </div>`);
}

function confirmarCancelamento(id){
  const v=getViagem(id);
  v.status='cancelada';
  v.motivoCancelamento=document.getElementById('cv-motivo').value.trim();
  v.dataCancelamento=new Date().toISOString();
  saveState(); closeModal();
  viagensFiltro='canceladas';
  renderContent();
  showToast('Viagem cancelada.','success');
}

/* Terminal */
function irParaTerminal(id){
  const v=getViagem(id); if(!v) return;
  confirmAction('Registar que este autocarro foi para a terminal (junta)?',()=>{
    v.status='terminal';
    v.terminalInicio=new Date().toISOString();
    saveState(); renderContent();
    showToast('Autocarro registado na terminal.','success');
  });
}

function sairDaTerminal(id){
  const v=getViagem(id); if(!v) return;
  v.status='em_curso';
  v.terminalFim=new Date().toISOString();
  saveState(); renderContent();
  showToast('Autocarro saiu da terminal.','success');
}

function abrirViagem(id){
  const v=getViagem(id); if(!v) return;
  const vt=getViatura(v.viaturaId), rota=getRota(v.rotaId);
  const segs=segmentosCalculados(v);
  const fin=financeiroViagem(v);
  const isVolta=v.tipoViagem==='volta';

  const segsHtml=segs.length?segs.map(t=>`
    <div class="seg-row">
      <div class="seg-name">${esc(t.nome)}<div class="muted" style="font-size:11px;">padrão: ${fmtDuracao(t.duracaoEsperadaMin)}</div></div>
      <div class="form-row" style="margin-bottom:0;"><label>Início real</label><input type="datetime-local" data-seg-ini value="${toDatetimeLocal(t.horaInicioReal)}"></div>
      <div class="form-row" style="margin-bottom:0;"><label>Fim real</label><input type="datetime-local" data-seg-fim value="${toDatetimeLocal(t.horaFimReal)}"></div>
      <div>${t.atraso==null?'<span class="badge neutral">—</span>':t.atraso>5?`<span class="badge warning">+${t.atraso} min</span>`:`<span class="badge success">No horário</span>`}</div>
    </div>`).join(''):`<p class="muted" style="font-size:12.5px;">Sem rota com troços.</p>`;

  openModal(`
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px;">
      <p class="modal-title" style="margin:0;">${esc(vt?vt.matricula:'Viagem')} · ${esc(rota?rota.nome:'Sem rota')} ${isVolta?'<span class="badge info" style="vertical-align:middle;">Volta</span>':'<span class="badge neutral" style="vertical-align:middle;">Ida</span>'}</p>
    </div>
    <p class="modal-sub">Iniciada ${fmtDataHora(v.dataInicio)} ${v.status==='em_curso'?`· há ${elapsedLabel(v.dataInicio)}`:v.status==='terminal'?`· na terminal há ${elapsedLabel(v.terminalInicio)}`:`· concluída ${fmtDataHora(v.dataFim)}`}</p>

    <p class="section-title" style="margin-top:0;">Troços da rota</p>
    ${segsHtml}

    ${secaoFinanceira('ida', v, false)}
    ${isVolta?secaoFinanceira('volta', v, true):''}

    <div class="section-divider">Avarias / Incidentes</div>
    <div id="dv-avarias-container">${(v.avarias||[]).map(a=>avariaRowHtml(a)).join('')}</div>
    <button class="btn btn-ghost btn-sm" onclick="addAvariaRow()">+ Registar avaria</button>
    <p class="form-hint">Registe qualquer avaria, pane ou incidente ocorrido durante a viagem (ex: pneu furado, sobreaquecimento, acidente leve), com o custo da reparação se aplicável.</p>

    <div class="section-divider">Notas da viagem</div>
    <div class="form-row"><textarea id="dv-notas" rows="3" placeholder="Qualquer observação relevante sobre esta viagem...">${esc(v.notas||'')}</textarea></div>

    <div class="card" style="margin-top:16px;background:var(--bg);">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:var(--text-muted);margin-bottom:8px;">Resumo financeiro</div>
      ${isVolta?`
        <div class="flex-between"><span class="muted">Receitas ida</span><span class="num">${fmtMT(fin.receitasIda)}</span></div>
        <div class="flex-between"><span class="muted">Receitas volta</span><span class="num">${fmtMT(fin.receitasVolta)}</span></div>
        <div class="flex-between"><span class="muted">Custos ida</span><span class="num">${fmtMT(fin.custosIda)}</span></div>
        <div class="flex-between"><span class="muted">Custos volta</span><span class="num">${fmtMT(fin.custosVolta)}</span></div>
        <hr style="border:none;border-top:1px solid var(--border);margin:8px 0;">
      `:''}
      ${fin.custAvarias?`<div class="flex-between"><span class="muted">Custos com avarias</span><span class="num" style="color:var(--danger);">${fmtMT(fin.custAvarias)}</span></div>`:''}
      <div class="flex-between"><span class="muted">Total receitas</span><strong class="num">${fmtMT(fin.receitas)}</strong></div>
      <div class="flex-between"><span class="muted">Total custos</span><strong class="num">${fmtMT(fin.custos)}</strong></div>
      <div class="flex-between"><span class="muted">Lucro</span><strong class="num" style="color:${fin.lucro>=0?'var(--success)':'var(--danger)'}">${fmtMT(fin.lucro)}</strong></div>
      <hr style="border:none;border-top:1px solid var(--border);margin:8px 0;">
      <div class="flex-between"><span class="muted">Estado do caixa</span><span class="badge ${ecLabel.cls}">${ecLabel.label}</span></div>
      <div class="flex-between"><span class="muted">Entregue ao caixa</span><span class="num">${fmtMT(fin.recebidoCaixa)}</span></div>
      <div class="flex-between"><span class="muted">Saldo com cobrador</span><strong class="num" style="color:${fin.saldoCobrador>0?'var(--warning)':'var(--success)'}">${fmtMT(fin.saldoCobrador)}</strong></div>
    </div>

      <div class="form-row" style="margin-top:14px;"><label>Data/hora de fim (ao concluir)</label><input id="dv-fim" type="datetime-local" value="${nowLocalInput()}"></div>

    </div>
    ${renderAnexosSection('viagem', v.id, 'Viagens/'+fmtData(v.dataInicio)+(vt?' · '+vt.matricula:''))}
    `, true);
}

function coletarSecaoFinanceira(prefix, isVolta){
  const getV=(id,fallback=null)=>{ const el=document.getElementById(id); return el&&el.value!==''?(isNaN(Number(el.value))?null:Number(el.value)):fallback; };
  const descsEnt=[...document.querySelectorAll(`#${prefix}-entradas-container [data-entrada-desc]`)].map(e=>e.value.trim());
  const valsEnt=[...document.querySelectorAll(`#${prefix}-entradas-container [data-entrada-valor]`)].map(e=>Number(e.value)||0);
  const entradas=descsEnt.map((d,i)=>({descricao:d,valor:valsEnt[i]})).filter(e=>e.descricao||e.valor);
  const descsSai=[...document.querySelectorAll(`#${prefix}-saidas-container [data-saida-desc]`)].map(e=>e.value.trim());
  const valsSai=[...document.querySelectorAll(`#${prefix}-saidas-container [data-saida-valor]`)].map(e=>Number(e.value)||0);
  const saidas=descsSai.map((d,i)=>({descricao:d,valor:valsSai[i]})).filter(s=>s.descricao||s.valor);
  const descsCust=[...document.querySelectorAll(`#${prefix}-custos-container [data-custo-desc]`)].map(e=>e.value.trim());
  const valsCust=[...document.querySelectorAll(`#${prefix}-custos-container [data-custo-valor]`)].map(e=>Number(e.value)||0);
  const custos=descsCust.map((d,i)=>({descricao:d,valor:valsCust[i]})).filter(c=>c.descricao||c.valor);
  if(isVolta){
    return {
      voltaKmInicio:getV(`${prefix}-km-ini`), voltaKmFim:getV(`${prefix}-km-fim`),
      voltaLitros:getV(`${prefix}-litros`), voltaCustoCombustivel:getV(`${prefix}-custo-comb`),
      voltaReceitaBilhetes:getV(`${prefix}-rec-bil`), voltaReceitaBagagem:getV(`${prefix}-rec-bag`), voltaReceitaOutros:getV(`${prefix}-rec-out`),
      voltaOutrasEntradas:entradas, voltaCustosOutros:custos, voltaOutrasSaidas:saidas,
    };
  }
  return {
    kmInicio:getV(`${prefix}-km-ini`), kmFim:getV(`${prefix}-km-fim`),
    litrosAbastecidos:getV(`${prefix}-litros`), custoCombustivel:getV(`${prefix}-custo-comb`),
    receitaBilhetes:getV(`${prefix}-rec-bil`), receitaBagagem:getV(`${prefix}-rec-bag`), receitaOutrosPassageiros:getV(`${prefix}-rec-out`),
    outrasEntradas:entradas, custosOutros:custos, outrasSaidas:saidas,
  };
}

function salvarViagem(id, concluir){
  const v=getViagem(id);
  const inis=[...document.querySelectorAll('[data-seg-ini]')].map(e=>e.value);
  const fins=[...document.querySelectorAll('[data-seg-fim]')].map(e=>e.value);
  v.trocos=v.trocos.map((t,i)=>Object.assign({},t,{
    horaInicioReal:inis[i]?new Date(inis[i]).toISOString():null,
    horaFimReal:fins[i]?new Date(fins[i]).toISOString():null,
  }));
  Object.assign(v, coletarSecaoFinanceira('ida', false));
  if(v.tipoViagem==='volta') Object.assign(v, coletarSecaoFinanceira('volta', true));
  const avDatas=[...document.querySelectorAll('[data-avaria-data]')].map(e=>e.value);
  const avDescs=[...document.querySelectorAll('[data-avaria-desc]')].map(e=>e.value.trim());
  const avCustos=[...document.querySelectorAll('[data-avaria-custo]')].map(e=>e.value);
  v.avarias=avDescs.map((d,i)=>({
    dataHora: avDatas[i]?new Date(avDatas[i]).toISOString():new Date().toISOString(),
    descricao: d,
    custo: avCustos[i]!==''&&!isNaN(Number(avCustos[i]))?Number(avCustos[i]):null,
  })).filter(a=>a.descricao||a.custo);
  v.notas=document.getElementById('dv-notas').value.trim();
  if(concluir){
    const fimEl=document.getElementById('dv-fim');
    v.dataFim=fimEl?new Date(fimEl.value).toISOString():new Date().toISOString();
    v.status='concluida';
  }
  saveState(); closeModal(); renderContent();
  showToast(concluir?'Viagem concluída.':'Viagem atualizada.','success');
}

function apagarViagem(id){
  confirmAction('Apagar esta viagem? Ação irreversível.',()=>{
    state.viagens=state.viagens.filter(v=>v.id!==id);
    saveState(); closeModal(); renderContent();
    showToast('Viagem apagada.','success');
  });
}

  if(tipo==='viatura') return viewProfileViatura(id);
  if(tipo==='pessoa') return viewProfilePessoa(id);
  if(tipo==='rota') return viewProfileRota(id);
  return '';
}

      <div class="stat-card"><div class="stat-label">Litros abastecidos</div><div class="stat-value" style="font-size:20px;">${fmtNum(totalLitros,1)}</div></div>
      <div class="stat-card ${totalLucro>=0?'ok':'alert'}"><div class="stat-label">Lucro total</div><div class="stat-value" style="font-size:18px;">${fmtMT(totalLucro)}</div></div>

      <div class="card">

        </div>
        ${vt.obs?`<p class="muted" style="font-size:12.5px;">${esc(vt.obs)}</p>`:''}
        <button class="btn btn-ghost btn-sm" style="margin-top:8px;" onclick="formViatura('${id}')">Editar dados</button>
      </div>
      <div class="card">
        <p class="section-title">Motoristas que já conduziram</p>

        ${avariasViatura.map(a=>`<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="abrirViagem('${a.viagemId}')">

function viewProfilePessoa(id){

  const concluidas=viagens.filter(v=>v.status==='concluida');

  const docs=state.documentos.filter(d=>d.entidadeTipo==='pessoa'&&d.entidadeId===id).map(d=>Object.assign({},d,{st:statusDocumento(d.dataValidade)}));
  const iniciais=(p.nome||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();

const GDRIVE_CLIENT_ID = '712692872398-8fkb5e1591aquaubk2efq57k4voc37u1.apps.googleusercontent.com';
const GDRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const GDRIVE_FOLDER_NAME = 'Gestão de Frota · Ndolene';

let gdriveToken = null;
let gdriveFolderId = null;
let gdriveTokenExpiry = null;

function gdriveIsReady(){
  return !!gdriveToken && (!gdriveTokenExpiry || Date.now() < gdriveTokenExpiry);
}

// Tenta recuperar token da sessão (após redirect OAuth)
function gdriveRestoreToken(){
  // Verifica hash da URL (#access_token=...&expires_in=...)
  const hash = window.location.hash;
  if(hash && hash.includes('access_token=')){
    const params = new URLSearchParams(hash.replace('#',''));
    const token = params.get('access_token');
    const expiresIn = Number(params.get('expires_in'))||3600;
    if(token){
      gdriveToken = token;
      gdriveTokenExpiry = Date.now() + (expiresIn - 60) * 1000;
      sessionStorage.setItem('gdrive_token', token);
      sessionStorage.setItem('gdrive_expiry', String(gdriveTokenExpiry));
      // Limpa o hash da URL sem recarregar
      history.replaceState(null, '', window.location.pathname + window.location.search);
      return true;
    }
  }
  // Tenta recuperar da sessionStorage
  const saved = sessionStorage.getItem('gdrive_token');
  const expiry = Number(sessionStorage.getItem('gdrive_expiry'))||0;
  if(saved && Date.now() < expiry){
    gdriveToken = saved;
    gdriveTokenExpiry = expiry;
    return true;
  }
  return false;
}

function gdriveLogin(){
  // Guarda estado para restaurar depois do redirect
  sessionStorage.setItem('gdrive_pending_upload', '1');
  const redirectUri = window.location.origin + window.location.pathname;
  const params = new URLSearchParams({
    client_id: GDRIVE_CLIENT_ID,
    redirect_uri: redirectUri,
    response_type: 'token',
    scope: GDRIVE_SCOPE,
    prompt: 'consent',
  });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

async function gdriveAuthIfNeeded(){
  if(gdriveIsReady()) return true;
  // Mostra modal de confirmação antes de redirecionar
  return new Promise(resolve=>{
    openModal(`
      <p class="modal-title">Ligar ao Google Drive</p>
      <p class="modal-sub">Para enviar anexos, precisa de autorizar o acesso ao Google Drive. Será redirecionado para o Google e voltará automaticamente.</p>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:0;">⚠️ Os dados do sistema <strong>não são apagados</strong> — estão guardados no Supabase.</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal(); resolve && resolve(false)">Cancelar</button>
        <button class="btn btn-primary" onclick="closeModal(); gdriveLogin()">Autorizar com Google</button>
      </div>`);
    // fallback: se fechar o modal sem clicar
    setTimeout(()=> resolve(false), 60000);
  });
}

async function gdriveFetch(url, opts={}){
  const res = await fetch(url, {
    ...opts,
    headers: { 'Authorization': 'Bearer '+gdriveToken, ...(opts.headers||{}) }
  });
  if(res.status===401){
    gdriveToken=null;
    sessionStorage.removeItem('gdrive_token');
    throw new Error('Token expirado');
  }
  return res;
}

async function gdriveGetOrCreateFolder(){
  // Procura pasta existente
  const q = encodeURIComponent(`name='${GDRIVE_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const res = await gdriveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
  const data = await res.json();
  if(data.files && data.files.length>0){
    gdriveFolderId = data.files[0].id;
    return;
  }
  // Cria pasta
  const createRes = await gdriveFetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ name: GDRIVE_FOLDER_NAME, mimeType:'application/vnd.google-apps.folder' })
  });
  const folder = await createRes.json();
  gdriveFolderId = folder.id;
}

async function gdriveUploadFile(file, subpasta){
  if(!gdriveIsReady()) await gdriveGetOrCreateFolder();
  // Cria subpasta se necessário
  let parentId = gdriveFolderId;
  if(subpasta){
    const q = encodeURIComponent(`name='${subpasta}' and '${gdriveFolderId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    const res = await gdriveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`);
    const data = await res.json();
    if(data.files && data.files.length>0){
      parentId = data.files[0].id;
    } else {
      const cr = await gdriveFetch('https://www.googleapis.com/drive/v3/files',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name:subpasta, mimeType:'application/vnd.google-apps.folder', parents:[gdriveFolderId] })
      });
      const folder = await cr.json();
      parentId = folder.id;
    }
  }
  // Upload multipart
  const metadata = { name: file.name, parents: [parentId] };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)],{type:'application/json'}));
  form.append('file', file);
  const uploadRes = await gdriveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,size,webViewLink,mimeType',{
    method:'POST', body: form
  });
  return await uploadRes.json();
}

async function gdriveDeleteFile(fileId){
  await gdriveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}`,{ method:'DELETE' });
}

// ── Helpers de Anexos no State ──
function getAnexos(entidade, entidadeId){
  if(!state.anexos) state.anexos = {};
  const key = entidade+'_'+entidadeId;
  if(!state.anexos[key]) state.anexos[key] = [];
  return state.anexos[key];
}

function fileIcon(mime){
  if(!mime) return '📎';
  if(mime.startsWith('image/')) return '🖼️';
  if(mime.includes('pdf')) return '📄';
  if(mime.includes('spreadsheet')||mime.includes('excel')) return '📊';
  if(mime.includes('word')||mime.includes('document')) return '📝';
  if(mime.includes('video')) return '🎥';
  return '📎';
}

function fmtBytes(b){
  if(!b) return '';
  const n=Number(b);
  if(n<1024) return n+'B';
  if(n<1048576) return (n/1024).toFixed(1)+'KB';
  return (n/1048576).toFixed(1)+'MB';
}

// ── Render da secção de Anexos ──
function renderAnexosSection(entidade, entidadeId, subpasta){
  const anexos = getAnexos(entidade, entidadeId);
  const key = entidade+'_'+entidadeId;
  const listaHtml = anexos.length ? anexos.map((a,i)=>`
    <div class="anexo-item">
      <div class="anexo-icon">${fileIcon(a.mimeType)}</div>
      <div class="anexo-info">
        <div class="anexo-nome" title="${esc(a.nome)}">${esc(a.nome)}</div>
        <div class="anexo-meta">${fmtBytes(a.size)} · ${fmtData(a.dataUpload)}</div>
      </div>
      <div class="anexo-actions">
        <a href="${esc(a.webViewLink)}" target="_blank" class="gdrive-btn">Ver</a>
        <button class="btn btn-danger-ghost btn-sm" onclick="apagarAnexo('${key}',${i})">×</button>
      </div>
    </div>`).join('') : '<p class="muted" style="font-size:12.5px;padding:6px 0 0;">Sem anexos ainda.</p>';

  return `
    <div class="anexos-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:var(--text-muted);">Anexos (${anexos.length})</span>
        <label class="gdrive-btn" id="anexo-label-${key}" style="cursor:pointer;">
          📎 Adicionar ficheiro
          <input type="file" multiple style="display:none;" onchange="uploadAnexo(event,'${entidade}','${entidadeId}','${esc(subpasta)}','${key}')">
        </label>
      </div>
      <div id="anexos-lista-${key}">${listaHtml}</div>
      <div id="anexo-status-${key}"></div>
    </div>`;
}

async function uploadAnexo(event, entidade, entidadeId, subpasta, key){
  const files = [...event.target.files];
  if(!files.length) return;
  const label = document.getElementById('anexo-label-'+key);
  const statusEl = document.getElementById('anexo-status-'+key);
  if(label) label.classList.add('uploading');
  // Auth Drive
  const ok = await gdriveAuthIfNeeded();
  if(!ok){ if(label) label.classList.remove('uploading'); return; }
  let erros = 0;
  for(const file of files){
    if(statusEl) statusEl.innerHTML = `<span class="gdrive-status idle">A enviar ${esc(file.name)}…</span>`;
    try{
      const result = await gdriveUploadFile(file, subpasta);
      const anexos = getAnexos(entidade, entidadeId);
      anexos.push({ id:result.id, nome:result.name, size:result.size, mimeType:result.mimeType, webViewLink:result.webViewLink, dataUpload:new Date().toISOString() });
      saveState();
      // Atualiza lista sem fechar modal
      const listaEl = document.getElementById('anexos-lista-'+key);
      if(listaEl) listaEl.innerHTML = getAnexos(entidade, entidadeId).map((a,i)=>`
        <div class="anexo-item">
          <div class="anexo-icon">${fileIcon(a.mimeType)}</div>
          <div class="anexo-info">
            <div class="anexo-nome">${esc(a.nome)}</div>
            <div class="anexo-meta">${fmtBytes(a.size)} · ${fmtData(a.dataUpload)}</div>
          </div>
          <div class="anexo-actions">
            <a href="${esc(a.webViewLink)}" target="_blank" class="gdrive-btn">Ver</a>
            <button class="btn btn-danger-ghost btn-sm" onclick="apagarAnexo('${key}',${i})">×</button>
          </div>
        </div>`).join('');
    }catch(e){ erros++; console.error(e); }
  }
  if(label){ label.classList.remove('uploading'); label.querySelector('input').value=''; }
  if(statusEl) statusEl.innerHTML = erros===0
    ? `<span class="gdrive-status ok">✓ ${files.length} ficheiro(s) enviado(s)</span>`
    : `<span class="gdrive-status err">⚠ ${erros} erro(s) ao enviar</span>`;
  setTimeout(()=>{ if(statusEl) statusEl.innerHTML=''; },3000);
}

async function apagarAnexo(key, index){
  const [entidade, ...restId] = key.split('_');
  const entidadeId = restId.join('_');
  const anexos = getAnexos(entidade, entidadeId);
  const a = anexos[index];
  if(!a) return;
  if(!confirm(`Apagar "${a.nome}" do Google Drive?`)) return;
  // Tenta apagar do Drive
  if(a.id){
    const ok = await gdriveAuthIfNeeded();
    if(ok){ try{ await gdriveDeleteFile(a.id); }catch(e){ console.warn('Erro ao apagar do Drive:',e); } }
  }
  anexos.splice(index,1);
  saveState();
  renderContent();
  showToast('Anexo apagado.','success');
}

async function sha256hex(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function fazerLogin(){
  const pass=document.getElementById('login-pass').value;
  const btn=document.getElementById('login-btn');
  const errEl=document.getElementById('login-error');
  if(!pass){ errEl.textContent='Introduza a senha.'; return; }
  btn.disabled=true; btn.textContent='A verificar...'; errEl.textContent='';
  try{
    const hash=await sha256hex(pass);
    const res=await fetch(`${SUPABASE_URL}/rest/v1/frota_users?id=eq.admin&password_hash=eq.${hash}&select=id`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    const rows=await res.json();
    if(rows&&rows.length>0){
      sessionStorage.setItem('frota_auth','1');
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      await iniciarApp();
    } else {
      errEl.textContent='Senha incorreta. Tente novamente.';
      document.getElementById('login-pass').value='';
      document.getElementById('login-pass').focus();
    }
  }catch(e){ errEl.textContent='Erro de ligação. Verifique a internet.'; }
  btn.disabled=false; btn.textContent='Entrar';
}

/* ============================== INIT ============================== */
async function iniciarApp(){
  await loadState();
  renderNav();
  const hoje=new Date();
  document.getElementById('topbar-date').textContent=hoje.toLocaleDateString('pt-PT',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  goTab('dashboard');
}

(async function init(){
  // Restaura token do Google Drive se voltou de redirect OAuth
  const driveRestored = gdriveRestoreToken();

  // Se voltou do redirect do Google, pode não ter ainda a sessão — restaura-a
  const hasAuth = sessionStorage.getItem('frota_auth');

  if(hasAuth){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    await iniciarApp();
    if(driveRestored){
      setTimeout(()=>{ showToast('Google Drive ligado com sucesso! ✓','success'); },800);
      if(sessionStorage.getItem('gdrive_pending_upload')){
        sessionStorage.removeItem('gdrive_pending_upload');
        setTimeout(()=>{ showToast('Pode agora adicionar o anexo novamente.',''); },2000);
      }
    }
  } else if(driveRestored && window.location.hash==='' && sessionStorage.getItem('gdrive_pending_upload')){
    // Voltou do Google mas sessão expirou — pede login novamente
    document.getElementById('login-pass').focus();
    showToast('Drive autorizado. Faça login para continuar.','success');
  } else {
    document.getElementById('login-pass').focus();
  }
})();
</script>
