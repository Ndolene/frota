/* ============================== GOOGLE DRIVE (ANEXOS) ============================== */
const GDRIVE_CLIENT_ID = '712692872398-8fkb5e1591aquaubk2efq57k4voc37u1.apps.googleusercontent.com';
// Escopo amplo (não só "drive.file"): é o que permite que um utilizador, autenticado com a
// SUA PRÓPRIA conta Google, consiga ler/escrever numa pasta central que foi criada e
// partilhada por outra conta (ex: a conta da empresa). Com "drive.file" isto não seria
// possível para pastas que o utilizador não criou/abriu através da app.
const GDRIVE_SCOPE = 'https://www.googleapis.com/auth/drive';
const GDRIVE_FOLDER_NAME = 'Gestão de Frota · Ndolene';

let gdriveToken = null;
let gdriveFolderId = null;
let gdriveTokenExpiry = null;

function gdriveIsReady(){
  return !!gdriveToken && (!gdriveTokenExpiry || Date.now() < gdriveTokenExpiry);
}

// Tenta recuperar token da sessão (após redirect OAuth)
function gdriveRestoreToken(){
  // Verifica hash da URL (#access_token=...&expires_in=...)
  const hash = window.location.hash;
  if(hash && hash.includes('access_token=')){
    const params = new URLSearchParams(hash.replace('#',''));
    const token = params.get('access_token');
    const expiresIn = Number(params.get('expires_in'))||3600;
    if(token){
      gdriveToken = token;
      gdriveTokenExpiry = Date.now() + (expiresIn - 60) * 1000;
      sessionStorage.setItem('gdrive_token', token);
      sessionStorage.setItem('gdrive_expiry', String(gdriveTokenExpiry));
      // Limpa o hash da URL sem recarregar
      history.replaceState(null, '', window.location.pathname + window.location.search);
      return true;
    }
  }
  // Tenta recuperar da sessionStorage
  const saved = sessionStorage.getItem('gdrive_token');
  const expiry = Number(sessionStorage.getItem('gdrive_expiry'))||0;
  if(saved && Date.now() < expiry){
    gdriveToken = saved;
    gdriveTokenExpiry = expiry;
    return true;
  }
  return false;
}

function gdriveLogin(){
  // Guarda estado para restaurar depois do redirect
  sessionStorage.setItem('gdrive_pending_upload', '1');
  const redirectUri = window.location.origin + window.location.pathname;
  const params = new URLSearchParams({
    client_id: GDRIVE_CLIENT_ID,
    redirect_uri: redirectUri,
    response_type: 'token',
    scope: GDRIVE_SCOPE,
    prompt: 'consent',
  });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

async function gdriveAuthIfNeeded(){
  if(gdriveIsReady()) return true;
  // Mostra modal de confirmação antes de redirecionar
  return new Promise(resolve=>{
    openModal(`
      <p class="modal-title">Ligar ao Google Drive</p>
      <p class="modal-sub">Para enviar anexos, precisa de autorizar o acesso ao Google Drive. Será redirecionado para o Google e voltará automaticamente.</p>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:0;">⚠️ Os dados do sistema <strong>não são apagados</strong> — estão guardados no Supabase.</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal(); resolve && resolve(false)">Cancelar</button>
        <button class="btn btn-primary" onclick="closeModal(); gdriveLogin()">Autorizar com Google</button>
      </div>`);
    // fallback: se fechar o modal sem clicar
    setTimeout(()=> resolve(false), 60000);
  });
}

async function gdriveFetch(url, opts={}){
  const res = await fetch(url, {
    ...opts,
    headers: { 'Authorization': 'Bearer '+gdriveToken, ...(opts.headers||{}) }
  });
  if(res.status===401){
    gdriveToken=null;
    sessionStorage.removeItem('gdrive_token');
    throw new Error('Token expirado');
  }
  return res;
}

/* ── Pasta central de anexos ──
   Em vez de cada utilizador criar (e ficar "dono de") a sua própria pasta "Gestão de Frota ·
   Ndolene" na sua Drive pessoal, guardamos o ID de UMA pasta central em state.driveFolderId
   (persistido no Supabase, visível a todos). Só um administrador pode criar/definir essa pasta
   pela primeira vez. Depois disso, qualquer utilizador — autenticado com a SUA PRÓPRIA conta
   Google — consegue ler/escrever nela, DESDE QUE o administrador a tenha partilhado com essa
   pessoa no Google Drive (Partilhar → adicionar como Editor). Sem essa partilha, o Google
   devolve 403 e mostramos uma mensagem clara a pedir para contactar o administrador. */
async function gdriveResolveFolder(){
  if(gdriveFolderId) return; // já resolvida nesta sessão
  if(state.driveFolderId){ gdriveFolderId = state.driveFolderId; return; }
  if(!isAdmin()){
    const err = new Error('Pasta central de anexos ainda não configurada');
    err.code = 'SEM_PASTA_CENTRAL';
    throw err;
  }
  // Só chega aqui um administrador, na primeira configuração
  const q = encodeURIComponent(`name='${GDRIVE_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const res = await gdriveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
  const data = await res.json();
  let folderId, folderName;
  if(data.files && data.files.length>0){
    folderId = data.files[0].id; folderName = data.files[0].name;
  } else {
    const createRes = await gdriveFetch('https://www.googleapis.com/drive/v3/files',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name: GDRIVE_FOLDER_NAME, mimeType:'application/vnd.google-apps.folder' })
    });
    const folder = await createRes.json();
    folderId = folder.id; folderName = folder.name;
  }
  gdriveFolderId = folderId;
  state.driveFolderId = folderId;
  state.driveFolderNome = folderName;
  state.driveFolderConfiguradoPor = currentPerfil?.nome || currentUser?.email || '—';
  state.driveFolderConfiguradoEm = new Date().toISOString();
  saveState();
}

async function configurarPastaCentralDrive(){
  if(!isAdmin()){ showToast('Só o administrador pode configurar a pasta central.','error'); return; }
  const ok = await gdriveAuthIfNeeded();
  if(!ok) return;
  try{
    await gdriveResolveFolder();
    showToast('Pasta central definida. Agora partilhe-a com a equipa no Google Drive.','success');
    renderContent();
  }catch(e){
    console.error(e);
    showToast('Erro ao configurar a pasta no Google Drive.','error');
  }
}

function resetarPastaCentralDrive(){
  if(!isAdmin()) return;
  confirmAction('Isto não apaga a pasta no Google Drive, só desliga a app dela. Quer mesmo repor a configuração?',()=>{
    state.driveFolderId=null; state.driveFolderNome=null; state.driveFolderConfiguradoPor=null; state.driveFolderConfiguradoEm=null;
    gdriveFolderId=null;
    saveState(); renderContent();
    showToast('Configuração reposta.','success');
  });
}

async function gdriveUploadFile(file, subpasta){
  await gdriveResolveFolder();
  // Cria subpasta se necessário
  let parentId = gdriveFolderId;
  if(subpasta){
    const q = encodeURIComponent(`name='${subpasta}' and '${gdriveFolderId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    const res = await gdriveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`);
    if(res.status===403||res.status===404){ const err=new Error('Sem acesso à pasta partilhada'); err.code='SEM_ACESSO_PASTA'; throw err; }
    const data = await res.json();
    if(data.files && data.files.length>0){
      parentId = data.files[0].id;
    } else {
      const cr = await gdriveFetch('https://www.googleapis.com/drive/v3/files',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name:subpasta, mimeType:'application/vnd.google-apps.folder', parents:[gdriveFolderId] })
      });
      if(cr.status===403||cr.status===404){ const err=new Error('Sem acesso à pasta partilhada'); err.code='SEM_ACESSO_PASTA'; throw err; }
      const folder = await cr.json();
      parentId = folder.id;
    }
  }
  // Upload multipart
  const metadata = { name: file.name, parents: [parentId] };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)],{type:'application/json'}));
  form.append('file', file);
  const uploadRes = await gdriveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,size,webViewLink,mimeType',{
    method:'POST', body: form
  });
  if(uploadRes.status===403||uploadRes.status===404){ const err=new Error('Sem acesso à pasta partilhada'); err.code='SEM_ACESSO_PASTA'; throw err; }
  return await uploadRes.json();
}

async function gdriveDeleteFile(fileId){
  await gdriveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}`,{ method:'DELETE' });
}

async function gdriveDownloadFile(fileId){
  const res = await gdriveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
  if(!res.ok){ const err=new Error('Falha ao descarregar do Drive (HTTP '+res.status+')'); throw err; }
  return await res.blob();
}

// ── Supabase Storage (anexos) ──
function sanitizePathPart(s){
  return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9_-]+/g,'_').slice(0,80) || 'x';
}
function anexoStoragePath(entidade, entidadeId, subpasta, filename){
  const ext = (filename.match(/\.[^.]+$/)||[''])[0];
  const base = sanitizePathPart(filename.replace(/\.[^.]+$/,''));
  return `${sanitizePathPart(entidade)}/${sanitizePathPart(entidadeId)}/${uid('f')}_${base}${ext}`;
}
async function sbUploadAnexo(file, path){
  const { error } = await _sb.storage.from(SUPABASE_ANEXOS_BUCKET).upload(path, file, { upsert:false, contentType:file.type||undefined });
  if(error) throw error;
}
async function sbDeleteAnexo(path){
  const { error } = await _sb.storage.from(SUPABASE_ANEXOS_BUCKET).remove([path]);
  if(error) throw error;
}
async function sbAnexoSignedUrl(path, segundos){
  const { data, error } = await _sb.storage.from(SUPABASE_ANEXOS_BUCKET).createSignedUrl(path, segundos||300);
  if(error) throw error;
  return data.signedUrl;
}

// ── Helpers de Anexos no State ──
function getAnexos(entidade, entidadeId){
  if(!state.anexos) state.anexos = {};
  const key = entidade+'_'+entidadeId;
  if(!state.anexos[key]) state.anexos[key] = [];
  return state.anexos[key];
}

function fileIcon(mime){
  if(!mime) return '📎';
  if(mime.startsWith('image/')) return '🖼️';
  if(mime.includes('pdf')) return '📄';
  if(mime.includes('spreadsheet')||mime.includes('excel')) return '📊';
  if(mime.includes('word')||mime.includes('document')) return '📝';
  if(mime.includes('video')) return '🎥';
  return '📎';
}

function fmtBytes(b){
  if(!b) return '';
  const n=Number(b);
  if(n<1024) return n+'B';
  if(n<1048576) return (n/1024).toFixed(1)+'KB';
  return (n/1048576).toFixed(1)+'MB';
}

// ── Item de anexo (partilhado entre render inicial e refresh pós-upload) ──
function anexoItemHtml(a, key, i){
  const seguro = a.provider==='supabase' && a.driveBackupId ? ' <span title="Cópia de segurança mantida no Google Drive">🛡️</span>' : '';
  const nomeMostrado = a.nomeExibicao || a.nome;
  const metaBase = [fmtBytes(a.size), fmtData(a.dataUpload)];
  if(a.origem) metaBase.push('Origem: '+esc(a.origem));
  return `
    <div class="anexo-item">
      <div class="anexo-icon">${fileIcon(a.mimeType)}</div>
      <div class="anexo-info">
        <div class="anexo-nome" title="${esc(a.nome)}">${esc(nomeMostrado)}${seguro}</div>
        <div class="anexo-meta">${metaBase.filter(Boolean).join(' · ')}</div>
        ${a.observacao ? `<div class="anexo-meta" style="font-style:italic;">${esc(a.observacao)}</div>` : ''}
      </div>
      <div class="anexo-actions">
        <button type="button" class="btn btn-ghost btn-sm" title="Nomear / indicar origem" onclick="editarAnexoMeta('${key}',${i})">✏️</button>
        <button type="button" class="gdrive-btn" onclick="abrirAnexo('${key}',${i})">Ver</button>
        <button class="btn btn-danger-ghost btn-sm" onclick="apagarAnexo('${key}',${i})">×</button>
      </div>
    </div>`;
}

// ── Editar metadados de um anexo: nome de exibição, origem e observações (opcionais) ──
function editarAnexoMeta(key, index){
  const [entidade, ...restId] = key.split('_');

    <div class="form-row"><label>Origem (opcional)</label><input id="f-anexo-origem" value="${esc(a.origem||'')}" placeholder="Ex: Factura do fornecedor, comprovativo bancário, foto do recibo…"></div>
    <div class="form-row"><label>Observações (opcional)</label><textarea id="f-anexo-obs" rows="3" placeholder="Notas adicionais sobre este anexo">${esc(a.observacao||'')}</textarea></div>
    <div class="modal-actions">

function salvarAnexoMeta(key, index){
  const [entidade, ...restId] = key.split('_');
  const entidadeId = restId.join('_');
  const anexos = getAnexos(entidade, entidadeId);

// ── Render da secção de Anexos ──
function renderAnexosSection(entidade, entidadeId, subpasta){
  const anexos = getAnexos(entidade, entidadeId);
  const key = entidade+'_'+entidadeId;
  const listaHtml = anexos.length ? anexos.map((a,i)=>anexoItemHtml(a,key,i)).join('') : '<p class="muted" style="font-size:12.5px;padding:6px 0 0;">Sem anexos ainda.</p>';

  return `
    <div class="anexos-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">

          📎 Adicionar ficheiro
          <input type="file" multiple style="display:none;" onchange="uploadAnexo(event,'${entidade}','${entidadeId}','${esc(subpasta)}','${key}')">

      </div>
      <div id="anexos-lista-${key}">${listaHtml}</div>
      <div id="anexo-status-${key}"></div>

async function uploadAnexo(event, entidade, entidadeId, subpasta, key){
  const files = [...event.target.files];
  if(!files.length) return;
  const label = document.getElementById('anexo-label-'+key);
  const statusEl = document.getElementById('anexo-status-'+key);
  if(label) label.classList.add('uploading');
  let erros = 0;
  for(const file of files){
    if(statusEl) statusEl.innerHTML = `<span class="gdrive-status idle">A enviar ${esc(file.name)}…</span>`;
    try{
      const path = anexoStoragePath(entidade, entidadeId, subpasta, file.name);
      await sbUploadAnexo(file, path);
      const anexos = getAnexos(entidade, entidadeId);
      anexos.push({ nome:file.name, size:file.size, mimeType:file.type, dataUpload:new Date().toISOString(), provider:'supabase', path });
      saveState();
      // Atualiza lista sem fechar modal
      const listaEl = document.getElementById('anexos-lista-'+key);
      if(listaEl) listaEl.innerHTML = getAnexos(entidade, entidadeId).map((a,i)=>anexoItemHtml(a,key,i)).join('');
    }catch(e){ erros++; console.error(e); }
  }
  if(label){ label.classList.remove('uploading'); label.querySelector('input').value=''; }
  if(statusEl){
    statusEl.innerHTML = erros===0
      ? `<span class="gdrive-status ok">✓ ${files.length} ficheiro(s) enviado(s)</span>`
      : `<span class="gdrive-status err">⚠ ${erros} erro(s) ao enviar. Verifique a ligação e tente novamente.</span>`;
  }
  setTimeout(()=>{ if(statusEl) statusEl.innerHTML=''; },5000);
}

// ── Abrir anexo (link assinado se Supabase, link directo se ainda só no Drive) ──
async function abrirAnexo(key, index){
  const [entidade, ...restId] = key.split('_');
  const entidadeId = restId.join('_');
  const anexos = getAnexos(entidade, entidadeId);
  const a = anexos[index];
  if(!a) return;
  if(a.provider==='supabase' && a.path){
    try{
      const url = await sbAnexoSignedUrl(a.path, 300);
      window.open(url, '_blank');
    }catch(e){ console.error(e); showToast('Erro ao gerar o link do anexo.','error'); }
  } else if(a.webViewLink){
    window.open(a.webViewLink, '_blank');
  } else {
    showToast('Não foi possível localizar este anexo.','error');
  }
}

async function apagarAnexo(key, index){
  const [entidade, ...restId] = key.split('_');
  const entidadeId = restId.join('_');
  const anexos = getAnexos(entidade, entidadeId);
  const a = anexos[index];
  if(!a) return;
  if(!confirm(`Apagar "${a.nome}"?`)) return;
  if(a.provider==='supabase' && a.path){
    try{ await sbDeleteAnexo(a.path); }catch(e){ console.warn('Erro ao apagar do Supabase:',e); }
    // Nota: se este anexo tiver cópia de segurança no Drive (a.driveBackupId), ela NÃO é apagada
    // automaticamente — fica lá como arquivo, conforme decidido na migração.
  } else if(a.id){
    const ok = await gdriveAuthIfNeeded();
    if(ok){ try{ await gdriveDeleteFile(a.id); }catch(e){ console.warn('Erro ao apagar do Drive:',e); } }
  }
  anexos.splice(index,1);
  saveState();
  renderContent();
  showToast('Anexo apagado.','success');
}

// ── Migração de anexos: Google Drive → Supabase Storage ──
// Nunca apaga nada do Drive. Só marca um anexo como migrado depois de confirmar
// que o ficheiro chegou inteiro ao Supabase (tamanho conferido byte a byte).
let migracaoEmCurso = false;
let migracaoProgresso = { total:0, feitos:0, erros:0, log:[] };

function listarAnexosPendentesMigracao(){
  const pendentes = [];
  for(const key in (state.anexos||{})){
    (state.anexos[key]||[]).forEach((a,i)=>{
      if(a.provider!=='supabase' && a.id) pendentes.push({ key, index:i });
    });
  }
  return pendentes;
}

function renderMigracaoModal(){
  const p = migracaoProgresso;
  const processados = p.feitos + p.erros;
  const pct = p.total ? Math.round(processados/p.total*100) : 0;
  openModal(`
    <p class="modal-title">A migrar anexos para o Supabase…</p>
    <p class="modal-sub">Os ficheiros originais são mantidos no Google Drive como cópia de segurança. Não feche esta janela enquanto a migração decorre.</p>
    <div style="background:var(--bg);border-radius:8px;height:10px;overflow:hidden;margin:14px 0;">
      <div style="background:var(--amber-500);height:100%;width:${pct}%;transition:width .2s;"></div>
    </div>
    <p style="font-size:13px;color:var(--text-muted);margin:0 0 10px;">${processados} de ${p.total} processado(s) · ✓ ${p.feitos} migrado(s) · ⚠ ${p.erros} erro(s)</p>
    ${p.log.length ? `<div style="max-height:140px;overflow-y:auto;font-size:12px;color:var(--danger);background:var(--danger-bg);border-radius:6px;padding:8px 10px;">${p.log.map(l=>`<div>${esc(l)}</div>`).join('')}</div>` : ''}
    <div class="modal-actions">
      <button class="btn btn-primary" id="migracao-fechar" onclick="closeModal()" ${migracaoEmCurso?'disabled':''}>${migracaoEmCurso?'A processar…':'Fechar'}</button>
    </div>
  `, true);
}

async function migrarAnexosParaSupabase(){
  if(migracaoEmCurso) return;
  const pendentes = listarAnexosPendentesMigracao();
  if(!pendentes.length){ showToast('Não há anexos pendentes de migração.','success'); return; }
  if(!confirm(`Migrar ${pendentes.length} anexo(s) do Google Drive para o Supabase?\n\nOs ficheiros originais são mantidos no Drive como cópia de segurança — nada é apagado.`)) return;

  const ok = await gdriveAuthIfNeeded();
  if(!ok) return;

  migracaoEmCurso = true;
  migracaoProgresso = { total:pendentes.length, feitos:0, erros:0, log:[] };
  renderMigracaoModal();

  for(const { key, index } of pendentes){
    const [entidade, ...restId] = key.split('_');
    const entidadeId = restId.join('_');
    const anexos = getAnexos(entidade, entidadeId);
    const a = anexos[index];
    if(!a || a.provider==='supabase') continue; // já foi migrado numa passagem anterior
    try{
      const blob = await gdriveDownloadFile(a.id);
      if(a.size && blob.size && Number(blob.size)!==Number(a.size)){
        throw new Error('Tamanho do ficheiro não confere após descarregar');
      }
      const file = new File([blob], a.nome, { type: a.mimeType || blob.type || 'application/octet-stream' });
      const path = anexoStoragePath(entidade, entidadeId, '', a.nome);
      await sbUploadAnexo(file, path);
      // Só depois de confirmado o upload é que o registo é convertido — o id/link do Drive
      // ficam guardados como driveBackup*, nunca apagados.
      a.driveBackupId = a.id;
      a.driveBackupLink = a.webViewLink;
      a.provider = 'supabase';
      a.path = path;
      a.migradoEm = new Date().toISOString();
      migracaoProgresso.feitos++;
      saveState();
    }catch(e){
      migracaoProgresso.erros++;
      migracaoProgresso.log.push(`${a.nome}: ${e.message||e}`);
      console.error('Erro a migrar anexo', a, e);
    }
    renderMigracaoModal();
  }

  migracaoEmCurso = false;
  renderMigracaoModal();
  showToast(`Migração concluída: ${migracaoProgresso.feitos} migrado(s), ${migracaoProgresso.erros} erro(s).`, migracaoProgresso.erros?'error':'success');
  if(currentTab==='sistema') renderContent();
}

async function audit(tipo, entidade, entidadeId, descricao, detalhe){
  try{
    const utilizador = currentPerfil ? (currentPerfil.nome || currentUser?.email || '?') : (currentUser?.email || '?');
    const utilizadorId = currentUser ? currentUser.id : null;
    await sbRestFetch('POST','frota_auditoria','',{
      tipo, entidade,
      entidade_id: entidadeId || null,
      descricao,
      detalhe: detalhe || null,
      utilizador, utilizador_id: utilizadorId,
      criado_em: new Date().toISOString(),
    });
  }catch(e){ console.warn('[auditoria] falha ao registar:', e.message); }
}

function elapsedAudit(iso){
  if(!iso) return '—';
  const ms = Date.now() - new Date(iso).getTime();
  const sec = Math.floor(ms/1000);
  if(sec < 60) return 'há menos de 1 min';
  const min = Math.floor(sec/60);
  if(min < 60) return `há ${min} min`;
  const h = Math.floor(min/60);
  if(h < 24) return `há ${h}h ${min%60}min`;
  const d = Math.floor(h/24);
  if(d < 2) return 'há 1 dia';
  if(d < 30) return `há ${d} dias`;
  const m = Math.floor(d/30);
  if(m < 12) return `há ${m} ${m===1?'mês':'meses'}`;
  return `há ${Math.floor(m/12)} ano(s)`;
}

async function viewAuditoria(filtroEntidade, filtroTipo, filtroBusca){
  filtroEntidade = filtroEntidade || '';
  filtroTipo = filtroTipo || '';
  filtroBusca = (filtroBusca || '').toLowerCase().trim();

  let registos = [];
  let erroMsg = '';
  try{
    let query = '?order=criado_em.desc&limit=300';
    if(filtroEntidade) query += `&entidade=eq.${filtroEntidade}`;
    if(filtroTipo) query += `&tipo=eq.${filtroTipo}`;
    registos = await sbRestFetch('GET','frota_auditoria', query);
    if(!Array.isArray(registos)) registos = [];
  }catch(e){ erroMsg = e.message || 'Erro.'; }

  if(filtroBusca){
    registos = registos.filter(r=>
      (r.descricao||'').toLowerCase().includes(filtroBusca) ||
      (r.utilizador||'').toLowerCase().includes(filtroBusca) ||
      (r.detalhe||'').toLowerCase().includes(filtroBusca));
  }

  const tipoLabel = {create:'Criação',update:'Edição',delete:'Eliminação',action:'Ação'};
  const entidades = ['viatura','pessoa','rota','documento','viagem','utilizador'];

  const filtersHtml = `
    <div class="audit-filter-bar">
      <select onchange="viewAuditoria('${filtroEntidade}',this.value,'${filtroBusca}').then(h=>{document.getElementById('content').innerHTML=h;})">
        <option value="">Todos os tipos</option>
        ${Object.entries(tipoLabel).map(([k,v])=>`<option value="${k}" ${filtroTipo===k?'selected':''}>${v}</option>`).join('')}
      </select>
      <select onchange="viewAuditoria(this.value,'${filtroTipo}','${filtroBusca}').then(h=>{document.getElementById('content').innerHTML=h;})">
        <option value="">Todos os módulos</option>
        ${entidades.map(e=>`<option value="${e}" ${filtroEntidade===e?'selected':''}>${e.charAt(0).toUpperCase()+e.slice(1)}</option>`).join('')}
      </select>
      <input placeholder="Pesquisar (utilizador, descrição...)" value="${esc(filtroBusca)}" style="flex:1;min-width:180px;"
        onkeydown="if(event.key==='Enter') viewAuditoria('${filtroEntidade}','${filtroTipo}',this.value).then(h=>{document.getElementById('content').innerHTML=h;})">
      <button class="btn btn-ghost btn-sm" onclick="viewAuditoria('','','').then(h=>{document.getElementById('content').innerHTML=h;})">Limpar</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('content').innerHTML='<div class=\\'card\\'><p style=\\'color:var(--text-muted)\\'>A atualizar...</p></div>'; viewAuditoria('${filtroEntidade}','${filtroTipo}','${filtroBusca}').then(h=>{document.getElementById('content').innerHTML=h;})">↻ Atualizar</button>
    </div>`;

  const sqlCard = `
    <div class="card" style="margin-top:16px;background:var(--amber-100);border-color:var(--amber-500);">
      <p class="section-title" style="color:var(--navy-800);">Configuração no Supabase (apenas 1 vez)</p>
      <p style="font-size:13px;color:var(--navy-800);margin:0 0 8px;">Execute este SQL no Supabase SQL Editor:</p>
      <pre style="background:var(--navy-900);color:#7EE787;padding:12px;border-radius:6px;font-size:12px;overflow-x:auto;white-space:pre-wrap;">CREATE TABLE IF NOT EXISTS frota_auditoria (
  id BIGSERIAL PRIMARY KEY,
  tipo TEXT NOT NULL CHECK (tipo IN ('create','update','delete','action')),
  entidade TEXT NOT NULL,
  entidade_id TEXT,
  descricao TEXT NOT NULL,
  detalhe TEXT,
  utilizador TEXT,
  utilizador_id UUID,
  criado_em TIMESTAMPTZ DEFAULT now()
);
CREATE INDEX ON frota_auditoria (criado_em DESC);
CREATE INDEX ON frota_auditoria (entidade);
CREATE INDEX ON frota_auditoria (utilizador_id);
ALTER TABLE frota_auditoria ENABLE ROW LEVEL SECURITY;
CREATE POLICY "audit_insert" ON frota_auditoria FOR INSERT TO authenticated WITH CHECK (true);
CREATE POLICY "audit_select" ON frota_auditoria FOR SELECT TO authenticated USING (true);</pre>
    </div>`;

  if(erroMsg){
    const isNotFound = erroMsg.includes('42P01')||erroMsg.includes('does not exist')||erroMsg.includes('relation')||erroMsg.includes('undefined');
    return filtersHtml + `<div class="card"><div class="empty"><div class="empty-title">${isNotFound?'Tabela de auditoria ainda não existe':'Erro ao carregar'}</div><p style="font-size:13px;color:var(--text-muted);">${isNotFound?'Crie a tabela com as instruções abaixo.':esc(erroMsg)}</p></div></div>${sqlCard}`;

  let diaAtual = '';
  const linhas = registos.map((r,i)=>{

  }).join('');

  return filtersHtml + `<div class="card"><div class="flex-between" style="margin-bottom:12px;"><p class="section-title" style="margin:0;">${registos.length} registo(s)${filtroBusca||filtroEntidade||filtroTipo?' (filtrado)':''}</p></div>${linhas}</div>${sqlCard}`;
}

/* ============================== SISTEMA · LATA DE LIXO (admin) ============================== */
const LIXEIRA_RETENCAO_DIAS = 30;

// Mapa dos módulos que alimentam a lata de lixo: onde encontrar (e devolver) a lista viva no state.
const LIXEIRA_MODULOS = {
  viatura:         { label:'Viaturas',                              get:()=>state.viaturas },
  pessoa:          { label:'Tripulação',                            get:()=>state.tripulacao },
  rota:            { label:'Rotas',                                 get:()=>state.rotas },
  documento:       { label:'Documentos',                            get:()=>state.documentos },
  viagem:          { label:'Viagens',                               get:()=>state.viagens },
  relatorioViagem: { label:'Relatórios · Viagens',                   get:()=>state.relatoriosViagens },
  relatorioCaixa:  { label:'Relatórios · Caixa',                     get:()=>state.relatoriosCaixa },
  planoConta:      { label:'Contabilidade · Plano de Contas',         get:()=>state.planoContas },
  lancamento:      { label:'Contabilidade · Diário',                  get:()=>state.lancamentos },
  registoPendenteContabilidade: { label:'Contabilidade · Registos Pendentes', get:()=>state.registosContabilidadePendentes },
  atendimento:     { label:'Atendimento',                            get:()=>state.atendimentos },
};

// Estado dos filtros/agrupamento/ordenação da lata de lixo (só existe em memória, não é gravado)
let lixeiraEstado = { modulo:'', operador:'', periodo:'', busca:'', agrupar:'modulo', ordenar:'data_desc' };

function lixeiraSet(campo, valor){
  lixeiraEstado[campo] = valor;
  const c = document.getElementById('content');
  if(c) c.innerHTML = viewSistema();
}

function lixeiraLimparFiltros(){
  lixeiraEstado = { modulo:'', operador:'', periodo:'', busca:'', agrupar:'modulo', ordenar:'data_desc' };
  document.getElementById('content').innerHTML = viewSistema();
}

function diasRestantesLixeira(expiraEmIso){
  const ms = new Date(expiraEmIso).getTime() - Date.now();
  return Math.max(0, Math.ceil(ms/(24*60*60*1000)));
}

// Move um registo eliminado de qualquer módulo para a lata de lixo, com um "retrato" completo
// dos seus dados (para poder ser restaurado tal como estava) e a validade de 30 dias.
// A entrada na lata de lixo fica sempre registada na auditoria.
function moverParaLixeira(modulo, item, descricao){
  if(!item) return null;
  if(!state.lixeira) state.lixeira=[];
  const operador = currentPerfil ? (currentPerfil.nome || currentUser?.email || '?') : (currentUser?.email || '?');
  const entrada = {
    id: uid('lx'),
    modulo,
    moduloLabel: (LIXEIRA_MODULOS[modulo]||{}).label || modulo,
    itemId: item.id,
    dados: JSON.parse(JSON.stringify(item)),
    descricao,
    operador,
    operadorId: currentUser ? currentUser.id : null,
    apagadoEm: new Date().toISOString(),
    expiraEm: new Date(Date.now() + LIXEIRA_RETENCAO_DIAS*24*60*60*1000).toISOString(),
  };
  state.lixeira.push(entrada);
  audit('delete', modulo, item.id, descricao, `Movido para a lata de lixo · expira em ${LIXEIRA_RETENCAO_DIAS} dias`);
  return entrada;
}

// Remove automaticamente da lata de lixo tudo o que já passou dos 30 dias, registando cada
// eliminação automática na auditoria. Corre sempre que o módulo Sistema é aberto e no arranque.
function limparLixeiraExpirada(){
  if(!state.lixeira || !state.lixeira.length) return;
  const agora = Date.now();
  const expirados = state.lixeira.filter(x=>new Date(x.expiraEm).getTime() <= agora);
  if(!expirados.length) return;
  state.lixeira = state.lixeira.filter(x=>new Date(x.expiraEm).getTime() > agora);
  expirados.forEach(x=>{
    audit('delete', x.modulo, x.itemId, `${x.moduloLabel}: "${x.descricao}" eliminado automaticamente da lata de lixo (prazo de ${LIXEIRA_RETENCAO_DIAS} dias expirado)`);
  });
  saveState();
}

function restaurarDaLixeira(lixeiraId){
  const entrada = (state.lixeira||[]).find(x=>x.id===lixeiraId);
  if(!entrada) return;
  confirmAction(`Restaurar "${entrada.descricao}" para o módulo ${entrada.moduloLabel}?`, ()=>{
    const cfg = LIXEIRA_MODULOS[entrada.modulo];
    if(cfg){
      const arr = cfg.get();
      if(arr && !arr.find(x=>x.id===entrada.dados.id)) arr.push(entrada.dados);
    }
    state.lixeira = state.lixeira.filter(x=>x.id!==lixeiraId);
    audit('action','lixeira',entrada.itemId,`${entrada.moduloLabel}: "${entrada.descricao}" restaurado da lata de lixo`);
    saveState(); renderContent();
    showToast('Item restaurado com sucesso.','success');
  });
}

function apagarPermanenteDaLixeira(lixeiraId){
  if(!isAdmin()){ showToast('Só o administrador pode eliminar definitivamente.','error'); return; }
  const entrada = (state.lixeira||[]).find(x=>x.id===lixeiraId);
  if(!entrada) return;
  confirmAction(`Eliminar definitivamente "${entrada.descricao}"? Esta ação não pode ser desfeita.`, ()=>{
    state.lixeira = state.lixeira.filter(x=>x.id!==lixeiraId);
    audit('delete','lixeira',entrada.itemId,`${entrada.moduloLabel}: "${entrada.descricao}" eliminado definitivamente da lata de lixo`);
    saveState(); renderContent();
    showToast('Eliminado definitivamente.','success');
  });
}

function esvaziarLixeira(){
  if(!isAdmin()){ showToast('Só o administrador pode esvaziar a lata de lixo.','error'); return; }
  const itens = lixeiraFiltrarLista();
  if(!itens.length){ showToast('Não há itens para eliminar.',''); return; }
  confirmAction(`Eliminar definitivamente ${itens.length} item(ns) da lata de lixo? Esta ação não pode ser desfeita.`, ()=>{
    const ids = itens.map(x=>x.id);
    state.lixeira = (state.lixeira||[]).filter(x=>!ids.includes(x.id));
    audit('delete','lixeira',null,`${itens.length} item(ns) eliminados definitivamente da lata de lixo em lote`);
    saveState(); renderContent();
    showToast('Lata de lixo esvaziada.','success');
  });
}

function lixeiraFiltrarLista(){
  let lista = (state.lixeira||[]).slice();
  const { modulo, operador, periodo, busca } = lixeiraEstado;
  if(modulo) lista = lista.filter(x=>x.modulo===modulo);
  if(operador) lista = lista.filter(x=>x.operador===operador);
  if(periodo){
    const limites = {'24h':1, '7d':7, '30d':30};
    const dias = limites[periodo];
    if(dias) lista = lista.filter(x=> (Date.now() - new Date(x.apagadoEm).getTime()) <= dias*24*60*60*1000 );
  }
  if(busca){
    const b = busca.toLowerCase().trim();
    lista = lista.filter(x=>
      (x.descricao||'').toLowerCase().includes(b) ||
      (x.operador||'').toLowerCase().includes(b) ||
      (x.moduloLabel||'').toLowerCase().includes(b));
  }
  return lista;
}

function lixeiraOrdenarLista(lista, ordenar){
  const l = lista.slice();
  if(ordenar==='data_asc') l.sort((a,b)=>new Date(a.apagadoEm)-new Date(b.apagadoEm));
  else if(ordenar==='expira_asc') l.sort((a,b)=>new Date(a.expiraEm)-new Date(b.expiraEm));
  else if(ordenar==='modulo_az') l.sort((a,b)=>(a.moduloLabel||'').localeCompare(b.moduloLabel||''));
  else if(ordenar==='operador_az') l.sort((a,b)=>(a.operador||'').localeCompare(b.operador||''));
  else l.sort((a,b)=>new Date(b.apagadoEm)-new Date(a.apagadoEm)); // data_desc (padrão)
  return l;
}

function lixeiraAgruparLista(lista, agrupar){
  if(agrupar==='none') return [{titulo:null, itens:lista}];
  const mapa = new Map();
  lista.forEach(x=>{
    let chave, titulo;
    if(agrupar==='modulo'){ chave=x.modulo; titulo=x.moduloLabel; }
    else if(agrupar==='operador'){ chave=x.operador||'—'; titulo=x.operador||'Desconhecido'; }
    else { // periodo
      const dias = Math.floor((Date.now()-new Date(x.apagadoEm).getTime())/(24*60*60*1000));
      if(dias<1){ chave='0-hoje'; titulo='Hoje'; }
      else if(dias<7){ chave='1-semana'; titulo='Últimos 7 dias'; }
      else if(dias<30){ chave='2-mes'; titulo='Últimos 30 dias'; }
      else { chave='3-antigo'; titulo='Há mais de 30 dias'; }
    }
    if(!mapa.has(chave)) mapa.set(chave, {titulo, itens:[]});
    mapa.get(chave).itens.push(x);
  });
  return Array.from(mapa.keys()).sort().map(k=>mapa.get(k));
}

-- Política: cada utilizador vê o seu próprio perfil; admins vêem todos

function gerarSenhaTemporaria(){
  // Senha aleatória de uso único — nunca é mostrada nem guardada; a pessoa define a sua própria ao aceitar o convite.
  const arr = new Uint8Array(24);
  (window.crypto||window.msCrypto).getRandomValues(arr);
  return Array.from(arr).map(b=>b.toString(36)).join('').slice(0,32)+'Aa1!';
}

async function convidarUtilizador(){
  const nome     = document.getElementById('nu-nome').value.trim();
  const email    = document.getElementById('nu-email').value.trim();
  const telefone = document.getElementById('nu-telefone').value.trim();
  const funcao   = document.getElementById('nu-funcao').value.trim();
  const role     = document.getElementById('nu-role').value;
  const pessoaId = document.getElementById('nu-pessoa').value;
  const confirmado = document.getElementById('nu-confirmado').checked;
  const errEl    = document.getElementById('nu-err');
  if(!nome)     { errEl.textContent='Introduza o nome.'; return; }
  if(!email)    { errEl.textContent='Introduza o email.'; return; }
  if(!telefone) { errEl.textContent='Introduza o telefone/WhatsApp usado para confirmar a identidade.'; return; }
  if(!confirmado){ errEl.textContent='Tem de confirmar a identidade da pessoa antes de enviar o convite.'; return; }
  if(!appEstaHospedadaPublicamente()){
    errEl.textContent='Esta aplicação está a correr localmente (localhost/ficheiro), não online. O link do convite não vai funcionar no telemóvel da pessoa. Hospede primeiro a app num serviço como Netlify ou Vercel.';
    return;
  }
  errEl.textContent='A enviar convite...';
  try{
    const { data: { session: adminSession } } = await _sb.auth.getSession();
    const adminToken = adminSession?.access_token || SUPABASE_KEY;
    const adminNome = currentPerfil?.nome || currentUser?.email || 'Administrador';

    // Cria a conta no Supabase Auth com uma senha temporária aleatória (ninguém a vê nem a usa)
    const signUpRes = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: gerarSenhaTemporaria() })
    });
    const signUpData = await signUpRes.json();
    const uid = signUpData?.id || signUpData?.user?.id;
    // Sinal do Supabase para "esta conta já existia antes" (identities vazio = não foi criada agora).
    // Isto acontece sempre que a pessoa já tinha sido convidada no passado e depois "Revogada":
    // revogar apaga o perfil (frota_perfis) mas NUNCA a conta de login em si — apagar essa conta
    // exigiria a service_role key do Supabase, que nunca pode viver no código do lado do cliente
    // (qualquer pessoa que veja o código-fonte da página conseguiria usá-la para controlar todas
    // as contas). Por isso, em vez de bloquear com um erro, reactivamos a conta existente abaixo.
    const jaExistia = Array.isArray(signUpData?.identities) && signUpData.identities.length===0;

    if(!uid){
      if(jaExistia || /already registered|already exists|user already/i.test(signUpData?.msg||signUpData?.error_description||signUpData?.message||'')){
        errEl.textContent = 'Este email já tem uma conta de login, mas não foi possível recuperar o identificador automaticamente para a reactivar. Peça à pessoa para usar "Esqueceu a senha?" no ecrã de login com este mesmo email — depois, edite aqui o nível de acesso dela assim que o nome aparecer na lista.';
      } else {
        errEl.textContent = signUpData?.msg || signUpData?.error_description || 'Erro ao criar conta. Tente novamente.';
      }
      return;
    }

    // Inserir/reactivar o perfil com token do admin (merge-duplicates = upsert pelo id)
    const res = await fetch(`${SUPABASE_URL}/rest/v1/frota_perfis`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + adminToken,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify({ id: uid, email, nome, funcao, role, telefone, pessoa_id: pessoaId||null, confirmado_por: adminNome, confirmado_em: new Date().toISOString() })
    });
    if(!res.ok){ const e=await res.text(); throw new Error(e); }

    // Envia o email para a pessoa definir a própria senha. Funciona tanto para uma conta nova
    // (define a primeira senha) como para uma conta reactivada (define uma senha nova; a antiga
    // deixa de servir, porque ela não a escolhe nem a vê aqui).
    await _sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.href.split('?')[0].split('#')[0]
    });

    closeModal();
    if(jaExistia){
      audit('update','utilizador',uid,`Acesso reactivado: ${nome}`,`Email: ${email} · Telefone: ${telefone} · Nível: ${role} · Identidade confirmada por: ${adminNome}`);
      showToast(`Acesso de ${email} reactivado. A pessoa vai receber um email para definir uma nova senha.`,'success');
    } else {
      audit('create','utilizador',uid,`Utilizador convidado: ${nome}`,`Email: ${email} · Telefone: ${telefone} · Nível: ${role} · Identidade confirmada por: ${adminNome}`);
      showToast(`Convite enviado para ${email}. A pessoa vai receber um email para definir a própria senha.`,'success');
    }
    goTab('utilizadores');
  } catch(e){ errEl.textContent='Erro: '+e.message; }
}

async function alterarMinhaSenha(){
  const nova = document.getElementById('ms-nova').value;
  const conf = document.getElementById('ms-conf').value;
  const errEl = document.getElementById('ms-err');
  if(nova.length < 8){ errEl.textContent='A senha deve ter pelo menos 8 caracteres.'; return; }
  if(nova !== conf){ errEl.textContent='As senhas não coincidem.'; return; }
  errEl.textContent='A guardar...';
  const { error } = await _sb.auth.updateUser({ password: nova });
  if(error){ errEl.textContent = traduzirErroAuth(error.message); return; }
  audit('action','utilizador',currentUser?currentUser.id:null,'Senha alterada pelo próprio utilizador (painel de utilizadores)');
  closeModal();
  showToast('Senha alterada com sucesso!','success');

async function revogarAcesso(userId, nome){
  confirmAction(`Revogar o acesso de "${nome}"? A pessoa deixa de conseguir entrar no sistema imediatamente. Se mais tarde quiser voltar a dar-lhe acesso, basta convidá-la de novo com o mesmo email — o sistema reactiva a conta automaticamente.`, async()=>{
    try{
      // Remove só o perfil (frota_perfis). O CASCADE definido na tabela só actua no sentido
      // auth.users -> frota_perfis, não ao contrário — por isso isto NÃO apaga a conta de login.
      // Apagar a conta de login exigiria a service_role key (não pode estar no código do lado do cliente).
      await sbRestFetch('DELETE','frota_perfis',`?id=eq.${userId}`);
      audit('delete','utilizador',userId,`Acesso revogado: ${nome}`);
      showToast(`Acesso de "${nome}" revogado.`,'success');
      goTab('utilizadores');
    } catch(e){ showToast('Erro ao revogar acesso: '+e.message,'error'); }
  });
}

/* ============================== NÍVEIS DE ACESSO (admin) ==============================
   Ecrã de configuração dos perfis de permissões definidos em MODULOS_ACESSO/RELATORIOS_SUB
   (ver bloco "NÍVEIS DE ACESSO" mais acima). Substitui os 6 níveis antigos, fixos no código,
   por níveis totalmente configuráveis aqui — criar, duplicar, editar e apagar. */
function resumoNivelAcesso(n){
  if(n.superAdmin) return 'Acesso total a todos os módulos';
  const modulosVisiveis = MODULOS_ACESSO.filter(m=>n.permissoes?.[m.id]?.ver).map(m=>m.label);
  if(n.permissoes?.relatorios?.ver){
    const subs = RELATORIOS_SUB.filter(s=>n.permissoes.relatorios.sub?.[s.id]?.ver).map(s=>s.label);
    modulosVisiveis.push(subs.length ? `Relatórios (${subs.join(', ')})` : 'Relatórios');
  }
  return modulosVisiveis.length ? modulosVisiveis.join(' · ') : 'Nenhum módulo visível';
}

function formNivelAcesso(id){
  const editando = !!id;
  const existente = editando ? (state.niveisAcesso||[]).find(x=>x.id===id) : null;
  if(editando && !existente) return;
  const n = existente || {id:null,nome:'',fixo:false,superAdmin:false,somenteLeituraGlobal:false,permissoes:permissoesModuloVazias()};
  const bloqueado = !!n.fixo;
  const perm = n.permissoes || permissoesModuloVazias();
  const linhaModulo = (chave,label,indent)=>`<tr>
    <td${indent?' style="padding-left:22px;color:var(--text-muted);font-size:12.5px;"':''}>${indent?'↳ ':''}${label}</td>
    <td><input type="checkbox" data-na-ver="${chave}" ${perm[chave]?.ver?'checked':''} ${(bloqueado||n.superAdmin)?'disabled':''}></td>
    <td><input type="checkbox" data-na-criar="${chave}" ${perm[chave]?.criar?'checked':''} ${(bloqueado||n.superAdmin)?'disabled':''}></td>
    <td><input type="checkbox" data-na-editar="${chave}" ${perm[chave]?.editar?'checked':''} ${(bloqueado||n.superAdmin)?'disabled':''}></td>
    <td><input type="checkbox" data-na-apagar="${chave}" ${perm[chave]?.apagar?'checked':''} ${(bloqueado||n.superAdmin)?'disabled':''}></td>
  </tr>`;
  openModal(`

function salvarNivelAcesso(id){
  const nome = document.getElementById('na-nome').value.trim();
  const errEl = document.getElementById('na-err');
  if(!nome){ errEl.textContent='Dê um nome a este nível de acesso.'; return; }
  const superAdmin = document.getElementById('na-superadmin').checked;
  const somenteLeituraGlobal = document.getElementById('na-somenteleitura').checked;
  const permissoes = permissoesModuloVazias();
  MODULOS_ACESSO.forEach(m=>{
    permissoes[m.id] = {
      ver: !!document.querySelector(`[data-na-ver="${m.id}"]`)?.checked,
      criar: !!document.querySelector(`[data-na-criar="${m.id}"]`)?.checked,
      editar: !!document.querySelector(`[data-na-editar="${m.id}"]`)?.checked,
      apagar: !!document.querySelector(`[data-na-apagar="${m.id}"]`)?.checked,
    };
  });
  permissoes.viagens.apenasProprios = !!document.querySelector(`[data-na-viagens-proprias]`)?.checked;
  const sub = {};
  RELATORIOS_SUB.forEach(s=>{
    sub[s.id] = {
      ver: !!document.querySelector(`[data-na-sub-ver="${s.id}"]`)?.checked,
      apenasProprios: !!document.querySelector(`[data-na-sub-proprios="${s.id}"]`)?.checked,
    };
  });
  permissoes.relatorios = {
    ver: !!document.querySelector(`[data-na-ver="relatorios"]`)?.checked,
    criar: !!document.querySelector(`[data-na-criar="relatorios"]`)?.checked,
    editar: !!document.querySelector(`[data-na-editar="relatorios"]`)?.checked,
    apagar: !!document.querySelector(`[data-na-apagar="relatorios"]`)?.checked,
    sub,
  };

  state.niveisAcesso = state.niveisAcesso || [];
  if(id){
    const alvo = state.niveisAcesso.find(x=>x.id===id);
    if(!alvo || alvo.fixo){ errEl.textContent='Este nível não pode ser editado.'; return; }
    Object.assign(alvo,{nome,superAdmin,somenteLeituraGlobal,permissoes});
    audit('update','nivelAcesso',id,`Nível de acesso editado: ${nome}`);
  } else {
    const novoId = uid('nivel');
    state.niveisAcesso.push({id:novoId,nome,fixo:false,superAdmin,somenteLeituraGlobal,permissoes});
    audit('create','nivelAcesso',novoId,`Nível de acesso criado: ${nome}`);
  }
  saveState();
  closeModal();
  showToast('Nível de acesso guardado.','success');
  goTab('niveisAcesso');
}

function duplicarNivelAcesso(id){
  const n = (state.niveisAcesso||[]).find(x=>x.id===id);
  if(!n) return;
  const copia = JSON.parse(JSON.stringify(n));
  copia.id = uid('nivel');
  copia.fixo = false;
  copia.nome = n.nome + ' (cópia)';
  state.niveisAcesso = state.niveisAcesso || [];
  state.niveisAcesso.push(copia);
  saveState();
  audit('create','nivelAcesso',copia.id,`Nível de acesso duplicado a partir de "${n.nome}": ${copia.nome}`);
  showToast('Nível de acesso duplicado. Já pode editá-lo livremente.','success');
  goTab('niveisAcesso');
}

async function apagarNivelAcesso(id){
  const n = (state.niveisAcesso||[]).find(x=>x.id===id);
  if(!n) return;
  if(n.fixo){ showToast('Este nível de acesso é protegido e não pode ser apagado.','error'); return; }
  let emUso = false;
  try{
    const rows = await sbRestFetch('GET','frota_perfis',`?role=eq.${encodeURIComponent(id)}&select=id&limit=1`);
    emUso = !!(rows && rows.length>0);
  }catch(e){ /* offline — não bloqueia; segue-se só com a confirmação normal abaixo */ }
  if(emUso){
    showToast('Ainda há utilizadores com este nível de acesso atribuído. Mude-os para outro nível em Utilizadores antes de o apagar.','error');
    return;
  }
  confirmAction(`Apagar o nível de acesso "${n.nome}"? Esta acção não pode ser desfeita.`, ()=>{
    state.niveisAcesso = (state.niveisAcesso||[]).filter(x=>x.id!==id);
    saveState();
    audit('delete','nivelAcesso',id,`Nível de acesso apagado: ${n.nome}`);
    showToast('Nível de acesso apagado.','success');
    goTab('niveisAcesso');
  });
}

/* ============================== LOGIN ============================== */
async function fazerLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if(!email){ errEl.textContent='Introduza o email.'; document.getElementById('login-email').focus(); return; }
  if(!pass){  errEl.textContent='Introduza a senha.'; document.getElementById('login-pass').focus(); return; }
  btn.disabled=true; btn.textContent='A verificar...';
  try{
    const { data, error } = await _sb.auth.signInWithPassword({ email, password: pass });
    if(error){
      errEl.textContent = traduzirErroAuth(error.message);
      document.getElementById('login-pass').value='';
      document.getElementById('login-pass').focus();
    } else {
      currentUser = data.user;
      await carregarPerfil();
      audit('action','utilizador',data.user.id,`Entrada no sistema`,`Email: ${data.user.email}`);
      abrirApp();
    }
  } catch(e){ errEl.textContent='Erro de ligação. Verifique a internet.'; }
  btn.disabled=false; btn.textContent='Entrar';
}

async function enviarRecuperacao(){
  const email = document.getElementById('recuperar-email').value.trim();
  const btn   = document.getElementById('recuperar-btn');
  const msgEl = document.getElementById('recuperar-msg');
  msgEl.textContent=''; msgEl.style.color='var(--danger)';
  if(!email){ msgEl.textContent='Introduza o email.'; return; }
  if(!appEstaHospedadaPublicamente()){
    msgEl.textContent='Esta aplicação está a correr localmente, não online. O link de recuperação não vai funcionar noutro dispositivo. Hospede a app num serviço como Netlify ou Vercel.';
    return;
  }
  btn.disabled=true; btn.textContent='A enviar...';
  try{
    const { error } = await _sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.href.split('?')[0].split('#')[0]
    });
    if(error){ msgEl.textContent = traduzirErroAuth(error.message); }
    else {
      msgEl.style.color='var(--success)';
      msgEl.textContent='Link enviado! Verifique o seu email (incluindo a pasta de spam).';
    }
  } catch(e){ msgEl.textContent='Erro de ligação. Tente mais tarde.'; }
  btn.disabled=false; btn.textContent='Enviar link de recuperação';
}

async function definirNovaSenha(){
  const nova  = document.getElementById('nova-senha').value;
  const conf  = document.getElementById('nova-senha-conf').value;
  const btn   = document.getElementById('nova-senha-btn');
  const msgEl = document.getElementById('nova-senha-msg');
  msgEl.textContent=''; msgEl.style.color='var(--danger)';
  if(nova.length < 8){ msgEl.textContent='A senha deve ter pelo menos 8 caracteres.'; return; }
  if(nova !== conf){   msgEl.textContent='As senhas não coincidem.'; return; }
  btn.disabled=true; btn.textContent='A guardar...';
  try{
    const { error } = await _sb.auth.updateUser({ password: nova });
    if(error){ msgEl.textContent = traduzirErroAuth(error.message); }
    else {
      audit('action','utilizador',currentUser?currentUser.id:null,'Senha alterada pelo próprio utilizador');
      msgEl.style.color='var(--success)';
      msgEl.textContent='Senha alterada com sucesso! A entrar...';
      setTimeout(()=>{
        mostrarPainelLogin();
        showToast('Senha actualizada. Pode usar a nova senha.','success');
      }, 1800);
    }
  } catch(e){ msgEl.textContent='Erro. Tente novamente.'; }
  btn.disabled=false; btn.textContent='Definir nova senha';
}

async function fazerLogout(){
  audit('action','utilizador',currentUser?currentUser.id:null,'Saída do sistema');
  await _sb.auth.signOut();
  currentUser = null; currentPerfil = null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-pass').value='';
  document.getElementById('login-error').textContent='';
  mostrarPainelLogin();
  showToast('Sessão terminada.','');
}

function traduzirErroAuth(msg){
  if(!msg) return 'Erro desconhecido.';
  if(msg.includes('Invalid login')) return 'Email ou senha incorrectos.';
  if(msg.includes('Email not confirmed')) return 'Email não confirmado. Verifique a sua caixa de entrada.';
  if(msg.includes('Too many requests')) return 'Demasiadas tentativas. Aguarde alguns minutos.';
  if(msg.includes('User not found')) return 'Utilizador não encontrado.';
  if(msg.includes('Password should be')) return 'A senha deve ter pelo menos 6 caracteres.';
  return msg;
}

/* ============================== PERFIL DO UTILIZADOR ============================== */
async function carregarPerfil(){
  if(!currentUser) return;
  try{
    let rows = await sbRestFetch('GET','frota_perfis',`?id=eq.${currentUser.id}&select=id,nome,funcao,role,pessoa_id`);
    if(!rows || rows.length===0){
      rows = await sbRestFetch('GET','frota_perfis',`?email=eq.${encodeURIComponent(currentUser.email)}&select=id,nome,funcao,role,pessoa_id`);
      if(rows && rows.length>0){
        await sbRestFetch('PATCH','frota_perfis',`?email=eq.${encodeURIComponent(currentUser.email)}`,{ id: currentUser.id });
      }
    }
    currentPerfil = (rows && rows.length>0) ? rows[0] : { nome: currentUser.email, funcao: '', role: 'operador' };
    if(currentPerfil) currentPerfil.pessoaId = currentPerfil.pessoa_id || null;
  } catch(e){
    currentPerfil = { nome: currentUser.email, funcao: '', role: 'operador' };
  }
  const nome = currentPerfil.nome || currentUser.email || '?';
  const iniciais = nome.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase();
  const funcaoLabel = currentPerfil.funcao || getPerfilAcesso().nome || 'Operador';
  const avatarEl = document.getElementById('user-avatar');
  const nomeEl   = document.getElementById('user-nome');
  const funcaoEl = document.getElementById('user-funcao');
  if(avatarEl) avatarEl.textContent = iniciais || '?';
  if(nomeEl)   nomeEl.textContent   = nome;
  if(funcaoEl) funcaoEl.textContent = funcaoLabel;
  // Banner de modo leitura
  const bannerExist = document.getElementById('leitor-banner');
  if(isLeitor() && !bannerExist){
    const banner = document.createElement('div');
    banner.id = 'leitor-banner';
    banner.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;';
    banner.innerHTML = '<span style="display:block;width:28px;height:1.5px;background:#fff;opacity:.6;"></span><span style="display:block;width:28px;height:1.5px;background:#fff;opacity:.6;"></span>';
    document.getElementById('sidebar')?.prepend(banner);
  }
}

function isAdmin(){ return !!(currentPerfil && getPerfilAcesso().superAdmin); }
function isLeitor(){
  // Só leitura global (nível inteiro marcado como "somente leitura"), ou sem nenhuma das três
  // permissões de acção (criar/editar/apagar) dentro do módulo actualmente aberto. Usada hoje
  // só para o aviso "MODO LEITURA" na barra lateral — o bloqueio real dos botões é granular
  // (ver podeNoModulo/naoPodeCriar/naoPodeEditar/naoPodeApagar).
  if(!currentPerfil) return false;
  const perfil = getPerfilAcesso();
  if(perfil.superAdmin) return false;
  if(perfil.somenteLeituraGlobal) return true;
  const pm = permModulo(chaveModuloAtual());
  return !(pm.criar || pm.editar || pm.apagar);
}
function podeEditar(){ return !isLeitor(); }

/* ── Agrupamento opcional de itens por "Sub-grupo" ──
   Quando o utilizador preenche o campo "Sub-grupo" em duas ou mais linhas com o mesmo nome
   (ex: "Portagens"), essas linhas passam a aparecer juntas, com um cabeçalho a mostrar a
   soma do sub-grupo e as linhas individuais indentadas por baixo. Itens sem sub-grupo
   continuam a aparecer normalmente, na posição em que foram inseridos. */
function rvAgruparItens(itens){
  const blocks = [];
  const grupoIndex = {};
  (itens||[]).forEach(item=>{
    const sub = (item.subgrupo||'').trim();
    if(!sub){
      blocks.push({tipo:'item', item});
    } else {
      if(grupoIndex[sub]==null){
        grupoIndex[sub] = blocks.length;
        blocks.push({tipo:'grupo', nome:sub, itens:[item]});
      } else {
        blocks[grupoIndex[sub]].itens.push(item);
      }
    }
  });
  return blocks;
}

}

function rcColetarSiFixos(){
  const valEls=[...document.querySelectorAll('#rc-si-fixos [data-rc-si-fixo-valor]')];
  const obsEls=[...document.querySelectorAll('#rc-si-fixos [data-rc-si-fixo-obs]')];
  return RC_MEIOS_FIXOS.map((meio,i)=>({
    meio,
    valor: valEls[i]&&valEls[i].value!==''?Number(valEls[i].value):0,
    obs: obsEls[i]?obsEls[i].value.trim():''
  }));
}
function rcColetarSiOutros(){
  const c=document.getElementById('rc-si-outros-container'); if(!c) return [];
  const descs=[...c.querySelectorAll('[data-rc-desc]')].map(e=>e.value.trim());
  const vals=[...c.querySelectorAll('[data-rc-valor]')].map(e=>e.value);
  const obss=[...c.querySelectorAll('[data-rc-obs]')].map(e=>e.value.trim());
  return vals.map((v,i)=>({descricao:descs[i], valor:v!==''?Number(v):0, obs:obss[i]})).filter(x=>x.descricao||x.valor||x.obs);
}
function rcColetarGrupo(grupo){
  const c=document.getElementById('rc-'+grupo+'-container'); if(!c) return [];
  return [...c.children].map(row=>{
    const origem = row.querySelector('[data-rc-origem]')?.value.trim() || '';
    const valorRaw = row.querySelector('[data-rc-valor]')?.value ?? '';
    const obs = row.querySelector('[data-rc-obs]')?.value.trim() || '';
    const meioSel = row.querySelector('[data-rc-meio]')?.value || '';
    const meioOutro = row.querySelector('[data-rc-meio-outro]')?.value.trim() || '';
    const meio = meioSel==='__outro__' ? (meioOutro||'Outro') : meioSel;
    return {origem, valor: valorRaw!==''?Number(valorRaw):0, obs, meio};
  }).filter(x=>x.origem||x.valor||x.obs);
}
function rcSomaItens(itens){ return (itens||[]).reduce((s,i)=>s+(Number(i.valor)||0),0); }

/* ── Saldo actual por meio financeiro ──
   Combina o Saldo Inicial (fixos + outros) com as Entradas e Saídas já registadas,
   agrupando por meio (Dinheiro Físico, E-Mola, M-Pesa, M-Kesh, Ponto 24, ou outro meio
   personalizado). Isto permite mostrar, mesmo com o caixa ainda aberto, quanto se espera
   ter em cada meio neste momento — sem depender de uma contagem física. */
function rcSaldosPorMeio(fixosSI, outrosSI, entradas, saidas){
  const map=new Map(); const ordem=[];
  function add(meio, delta){
    const key = (meio||'').trim() || 'Outro';
    if(!map.has(key)){ map.set(key,0); ordem.push(key); }
    map.set(key, map.get(key)+delta);
  }
  RC_MEIOS_FIXOS.forEach(m=>add(m,0));
  (fixosSI||[]).forEach((f,i)=>add(f.meio||RC_MEIOS_FIXOS[i], Number(f.valor)||0));
  (outrosSI||[]).forEach(o=>add(o.descricao||'Outro', Number(o.valor)||0));
  (entradas||[]).forEach(e=>add(e.meio, Number(e.valor)||0));
  (saidas||[]).forEach(s=>add(s.meio, -(Number(s.valor)||0)));
  return ordem.map(m=>({meio:m, saldo:map.get(m)}));
}
function rcSaldosPorMeioRowsHtml(saldos){
  return (saldos||[]).map(s=>`<div class="flex-between"><span class="muted">${esc(s.meio)}</span><span class="num" style="${s.saldo<-0.01?'color:var(--danger);':''}">${fmtMT(s.saldo)}</span></div>`).join('')
    || `<div class="muted" style="font-size:12.5px;">Sem valores.</div>`;
}

function rcTotaisHtml(A,B,C,D,E,F,G,H){
  const okH = Math.abs(H)<0.01;
  return `
    <div class="flex-between"><span class="muted">Sub-total A · Saldo Inicial</span><span class="num">${fmtMT(A)}</span></div>
    <div class="flex-between"><span class="muted">Sub-total B · Entradas</span><span class="num">${fmtMT(B)}</span></div>
    <div class="flex-between"><span class="muted">Sub-total C · Saídas</span><span class="num">${fmtMT(C)}</span></div>
    <div class="flex-between" style="border-top:1px solid var(--border);padding-top:6px;margin-top:4px;"><span class="muted">Total Positivo (D = A+B)</span><span class="num">${fmtMT(D)}</span></div>
    <div class="flex-between"><span class="muted">Total das Saídas (E = C)</span><span class="num">${fmtMT(E)}</span></div>
    <div class="flex-between"><b>Saldo Final (F = D−E)</b><b class="num">${fmtMT(F)}</b></div>
    <div class="flex-between" style="border-top:1px solid var(--border);padding-top:6px;margin-top:4px;"><span class="muted">Saldo Depositado (G)</span><span class="num">${fmtMT(G)}</span></div>
    <div class="flex-between"><b>Remanescente (H = F−G)</b><b class="num" style="color:${okH?'var(--success)':'var(--danger)'};">${fmtMT(H)}</b></div>`;
}

function rcRecalc(){
  const totaisEl = document.getElementById('rc-totais');
  if(!totaisEl) return;
  const fixosSI = rcColetarSiFixos();
  const outrosSI = rcColetarSiOutros();
  const entradas = rcColetarGrupo('entradas');
  const saidas = rcColetarGrupo('saidas');
  const A = rcSomaItens(fixosSI)+rcSomaItens(outrosSI);
  const B = rcSomaItens(entradas);
  const C = rcSomaItens(saidas);
  const D = A+B, E = C, F = D-E;
  const gEl = document.getElementById('rc-depositado');
  const G = gEl && gEl.value!=='' ? Number(gEl.value) : 0;
  const H = F-G;
  totaisEl.innerHTML = rcTotaisHtml(A,B,C,D,E,F,G,H);
  const saldosMeioEl = document.getElementById('rc-saldos-meio');
  if(saldosMeioEl) saldosMeioEl.innerHTML = rcSaldosPorMeioRowsHtml(rcSaldosPorMeio(fixosSI, outrosSI, entradas, saidas));
}

/* ── Continuidade de saldo entre caixas ──
   O saldo inicial de um novo caixa deve corresponder ao Remanescente (H) do último caixa
   fechado pela mesma pessoa (o que ficou por depositar, não o Saldo Final F, que é antes
   do depósito). "Mesma pessoa" é identificada por criadoPor (o utilizador com sessão
   iniciada), a mesma identidade já usada para verificar "já tem um caixa aberto". */
function rcUltimoCaixaFechado(nome){
  if(!nome) return null;
  return (state.relatoriosCaixa||[])
    .filter(r=>!r.viaDe && r.status==='fechado' && r.criadoPor===nome)
    .sort((a,b)=>new Date(b.fechadoEm||b.criadoEm)-new Date(a.fechadoEm||a.criadoEm))[0] || null;
}
function rcSaldoEsperado(ultimo){
  if(!ultimo) return 0;
  return ultimo.remanescenteH!=null ? ultimo.remanescenteH : (ultimo.saldoFinalF||0);
}
function rcPreencherSaldoEsperado(){
  const info = window._rcSaldoEsperadoInfo;
  if(!info) return;
  // Se o caixa anterior tem a contagem de fecho registada por meio (físico, E-Mola, M-Pesa,
  // etc.), preenche cada meio directamente no seu campo. Só recorre ao valor único (lump-sum)
  // em "Outros" para caixas antigos, fechados antes desta funcionalidade existir.
  if(info.fixos && info.fixos.length){
    const valEls=[...document.querySelectorAll('#rc-si-fixos [data-rc-si-fixo-valor]')];
    const obsEls=[...document.querySelectorAll('#rc-si-fixos [data-rc-si-fixo-obs]')];
    info.fixos.forEach((f,i)=>{
      if(valEls[i]) valEls[i].value = (f.valor!=null && f.valor!=='') ? f.valor : 0;
      if(obsEls[i] && !obsEls[i].value) obsEls[i].value = 'Preenchido automaticamente (contagem do caixa anterior)';
    });
    if(info.outros && info.outros.length){
      const container = document.getElementById('rc-si-outros-container');
      info.outros.forEach(o=>{
        container.insertAdjacentHTML('beforeend', rcSiOutroRowHtml({
          descricao: o.descricao || 'Outro meio',
          valor: o.valor,
          obs: 'Preenchido automaticamente (contagem do caixa anterior)'
        }));
      });
    }
    showToast('Saldo inicial preenchido automaticamente, meio a meio, com a contagem de fecho do caixa anterior.','success');
  } else {
    document.getElementById('rc-si-outros-container').insertAdjacentHTML('beforeend',
      rcSiOutroRowHtml({ descricao:'Transportado do caixa anterior ('+info.dataLabel+')', valor:info.valor, obs:'Preenchido automaticamente' }));
    showToast('Saldo inicial preenchido automaticamente.','success');
  }
  rcRecalc();
}

/* ── Contagem física no fecho do caixa ──
   Espelha exactamente os meios do Saldo Inicial (RC_MEIOS_FIXOS + os "outros" meios que o
   caixa tinha registado na abertura), para que o caixa informe quanto tem, agora, em cada
   um deles. O total contado é comparado com o Remanescente (H) esperado; se não bater,
   é obrigatório justificar a diferença antes de poder fechar. */
function rcContagemFixoRowHtml(i, valor, obs){
  return `<div class="rc-row-fixo">

function rcAddContagemOutro(){ document.getElementById('rcc-outros-container').insertAdjacentHTML('beforeend', rcContagemOutroRowHtml({})); }

function rcColetarContagemFixos(){
  const valEls=[...document.querySelectorAll('#rcc-fixos [data-rcc-fixo-valor]')];
  const obsEls=[...document.querySelectorAll('#rcc-fixos [data-rcc-fixo-obs]')];
  return RC_MEIOS_FIXOS.map((meio,i)=>({
    meio,
    valor: valEls[i]&&valEls[i].value!==''?Number(valEls[i].value):0,
    obs: obsEls[i]?obsEls[i].value.trim():''
  }));
}
function rcColetarContagemOutros(){
  const c=document.getElementById('rcc-outros-container'); if(!c) return [];
  const descs=[...c.querySelectorAll('[data-rcc-desc]')].map(e=>e.value.trim());
  const vals=[...c.querySelectorAll('[data-rcc-valor]')].map(e=>e.value);
  const obss=[...c.querySelectorAll('[data-rcc-obs]')].map(e=>e.value.trim());
  return vals.map((v,i)=>({descricao:descs[i], valor:v!==''?Number(v):0, obs:obss[i]})).filter(x=>x.descricao||x.valor||x.obs);
}
function rccRecalc(){
  const totalEl = document.getElementById('rcc-total');
  if(!totalEl) return;
  const total = rcSomaItens(rcColetarContagemFixos())+rcSomaItens(rcColetarContagemOutros());
  const esperado = window._rccEsperado||0;
  const diff = total-esperado;
  const ok = Math.abs(diff)<0.01;
  totalEl.innerHTML = `
    <div class="flex-between"><span class="muted">Total contado agora</span><span class="num">${fmtMT(total)}</span></div>
    <div class="flex-between"><span class="muted">Remanescente esperado (H)</span><span class="num">${fmtMT(esperado)}</span></div>
    <div class="flex-between" style="border-top:1px solid var(--border);padding-top:6px;margin-top:4px;"><b>Diferença</b><b class="num" style="color:${ok?'var(--success)':'var(--danger)'};">${fmtMT(diff)}</b></div>`;
}

/* ── Abertura/fecho de caixa e autorização de edição ──
   Regra: enquanto o relatório está ABERTO, o caixa pode ACRESCENTAR novas entradas/saídas
   livremente, sem pedir autorização (ver rcAdicionarRapido). Mas EDITAR algo já registado
   (mudar um valor, remover uma linha, mexer no saldo inicial, etc.) exige sempre autorização
   do administrador — mesmo com o caixa ainda aberto. Só o administrador edita directamente;
   qualquer outra pessoa tem de pedir autorização, e a edição aprovada não altera o original —
   cria uma "via" nova (2ª via, 3ª via...), guardada lado a lado com as anteriores, para
   poderem ser comparadas. O botão "Fechar caixa" bloqueia novos registos (entradas/saídas);
   para registar outro dia é preciso abrir um novo relatório. */
function podeEditarFolhaCaixaDireto(r){
  return isAdmin();
}
function rcGrupoId(r){ return r.viaDe || r.id; }
function rcVias(grupoId){
  return (state.relatoriosCaixa||[]).filter(r=>rcGrupoId(r)===grupoId).sort((a,b)=>(a.viaNumero||1)-(b.viaNumero||1));
}
function rcCaixaAbertoDoUtilizador(){
  const nome = currentPerfil?.nome || currentUser?.email || '—';
  return (state.relatoriosCaixa||[]).find(r=>!r.viaDe && r.status==='aberto' && r.criadoPor===nome);
}
function rcPodeRegistarRapido(r){
  if(naoPodeCriar('relatorios')) return false;
  if(r.status!=='aberto') return false;
  const nome = currentPerfil?.nome || currentUser?.email || '—';
  return isAdmin() || r.criadoPor===nome;
}

/* ============================== RELATÓRIO DE CAIXA POR PERÍODO (agregação, só leitura) ==============================
   Agrega os relatórios de caixa "originais" (ignora vias de edição, para não duplicar valores)
   dentro de um intervalo de datas. O Saldo Inicial do período é o do primeiro caixa do
   intervalo; o resto telescopa (A_seguinte = Remanescente do anterior), por isso
   Saldo Final do período = A(primeiro) + ΣEntradas − ΣSaídas, e Remanescente do período =
   Saldo Final − ΣDepositado. Isto só é exacto quando não há falhas de continuidade
   (dias sem caixa aberto), o que é assinalado ao utilizador. */
const RC_PERIODOS = [
  {id:'dias',      label:'Dias (Dia X a Dia Y)'},
  {id:'semanal',   label:'Semanal'},
  {id:'mensal',    label:'Mensal'},
  {id:'trimestral',label:'Trimestral'},
  {id:'semestral', label:'Semestral'},
  {id:'anual',     label:'Anual'},
  {id:'2anos',     label:'2 Anos'},
  {id:'5anos',     label:'5 Anos'},
  {id:'10anos',    label:'10 Anos'},
];
function rcHojeISO(){ return new Date().toISOString().slice(0,10); }
function rcSomarDias(iso,n){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function rcCalcularInicio(tipo, fimISO){
  const d = new Date(fimISO+'T00:00:00');
  switch(tipo){
    case 'semanal':    d.setDate(d.getDate()-6); break;
    case 'mensal':     d.setMonth(d.getMonth()-1); d.setDate(d.getDate()+1); break;
    case 'trimestral': d.setMonth(d.getMonth()-3); d.setDate(d.getDate()+1); break;
    case 'semestral':  d.setMonth(d.getMonth()-6); d.setDate(d.getDate()+1); break;
    case 'anual':      d.setFullYear(d.getFullYear()-1); d.setDate(d.getDate()+1); break;
    case '2anos':      d.setFullYear(d.getFullYear()-2); d.setDate(d.getDate()+1); break;
    case '5anos':      d.setFullYear(d.getFullYear()-5); d.setDate(d.getDate()+1); break;
    case '10anos':     d.setFullYear(d.getFullYear()-10); d.setDate(d.getDate()+1); break;
    default: return fimISO;
  }
  return d.toISOString().slice(0,10);
}
window._rcpTipo = window._rcpTipo || 'mensal';
window._rcpFim = window._rcpFim || rcHojeISO();
window._rcpInicioCustom = window._rcpInicioCustom || rcSomarDias(rcHojeISO(),-6);

function rcpIntervaloAtual(){
  const tipo = window._rcpTipo;
  const fim = window._rcpFim || rcHojeISO();
  const inicio = tipo==='dias' ? (window._rcpInicioCustom||fim) : rcCalcularInicio(tipo, fim);
  return {tipo, inicio, fim};
}
function rcpMudarTipo(tipo){ window._rcpTipo = tipo; renderContent(); }
function rcpMudarFim(v){ window._rcpFim = v; renderContent(); }
function rcpMudarInicioCustom(v){ window._rcpInicioCustom = v; renderContent(); }

/* Agrega uma lista (já filtrada e ordenada por data ascendente) de relatórios "originais". */
function rcAgregarPeriodo(lista){
  if(!lista.length) return null;
  const primeiro = lista[0], ultimo = lista[lista.length-1];
  const fixosSI = primeiro.saldoInicial?.fixos||[];
  const outrosSI = primeiro.saldoInicial?.outros||[];
  const todasEntradas = lista.flatMap(r=>r.entradas||[]);
  const todasSaidas = lista.flatMap(r=>r.saidas||[]);
  const A = rcSomaItens(fixosSI)+rcSomaItens(outrosSI);
  const B = lista.reduce((s,r)=>s+(Number(r.subtotalB)||0),0);
  const C = lista.reduce((s,r)=>s+(Number(r.subtotalC)||0),0);
  const G = lista.reduce((s,r)=>s+(Number(r.saldoDepositadoG)||0),0);
  const F = A+B-C;
  const H = F-G;
  // Deteta falhas de continuidade: dia N deveria abrir com o Remanescente do dia N-1.
  let falhaContinuidade = false;
  for(let i=1;i<lista.length;i++){
    const anterior = lista[i-1], atual = lista[i];
    const esperado = anterior.remanescenteH!=null ? anterior.remanescenteH : (anterior.saldoFinalF-(anterior.saldoDepositadoG||0));
    const atualA = Number(atual.subtotalA)||0;
    if(Math.abs(atualA-esperado)>0.01) falhaContinuidade=true;
  }
  return {
    A,B,C,F,G,H, falhaContinuidade,
    numRegistos:lista.length,
    abertos: lista.filter(r=>r.status==='aberto').length,
    fechados: lista.filter(r=>r.status==='fechado').length,
    primeiro, ultimo,
    saldosPorMeio: rcSaldosPorMeio(fixosSI, outrosSI, todasEntradas, todasSaidas)
  };
}
function rcpListaFiltrada(){
  const nomeAtual = currentPerfil?.nome || currentUser?.email || '—';
  const restrito = relatorioApenasProprios('caixaPeriodo');
  const {inicio,fim} = rcpIntervaloAtual();
  return (state.relatoriosCaixa||[])
    .filter(r=>!r.viaDe)
    .filter(r=> !restrito || r.criadoPor===nomeAtual)
    .filter(r=> r.data>=inicio && r.data<=fim)
    .sort((a,b)=> new Date(a.data)-new Date(b.data) || new Date(a.criadoEm)-new Date(b.criadoEm));
}

function imprimirRelatorioCaixaPeriodo(){

  const lista = rcpListaFiltrada();
  const agr = rcAgregarPeriodo(lista);
  const periodoLabel = RC_PERIODOS.find(p=>p.id===tipo)?.label||'';
  if(!agr){
    showToast('Sem relatórios de caixa neste período.','error');
    return;
  }
  const totaisHtml = `
    <div class="ptotais">
      <div class="row"><span>Saldo Inicial do período (A)</span><span class="num">${fmtMT(agr.A)}</span></div>
      <div class="row"><span>Total de Entradas (B)</span><span class="num">${fmtMT(agr.B)}</span></div>
      <div class="row"><span>Total de Saídas (C)</span><span class="num">${fmtMT(agr.C)}</span></div>
      <div class="row strong"><span>Saldo Final do período (F = A+B−C)</span><span class="num">${fmtMT(agr.F)}</span></div>
      <div class="row strong"><span>Total Depositado (G)</span><span class="num">${fmtMT(agr.G)}</span></div>
      <div class="row strong"><span>Remanescente do período (H = F−G)</span><span class="num" style="color:${Math.abs(agr.H)<0.01?'#2F8F6B':'#C0392B'};">${fmtMT(agr.H)}</span></div>
    </div>`;
  const saldosMeioHtml = `
    <div class="psec">Saldo por meio financeiro (acumulado)</div>
    ${printLinhasTable([{label:'Meio'},{label:'Saldo (MT)',num:true}], agr.saldosPorMeio.map(s=>`<tr><td>${esc(s.meio)}</td><td class="num">${fmtMT(s.saldo)}</td></tr>`))}`;
  const listaHtml = `
    <div class="psec">Caixas incluídos (${lista.length})</div>
    ${printLinhasTable(
      [{label:'Data'},{label:'Operador'},{label:'Estado'},{label:'Entradas',num:true},{label:'Saídas',num:true},{label:'Saldo Final',num:true},{label:'Depositado',num:true},{label:'Remanescente',num:true}],

    )}`;
  const html = `
    ${printHeaderHtml('Relatório de Caixa por Período', `${periodoLabel} · ${fmtData(inicio)} a ${fmtData(fim)}`)}
    <div class="pinfo">
      <div><label>Período</label><span>${esc(periodoLabel)}</span></div>
      <div><label>Intervalo</label><span>${fmtData(inicio)} a ${fmtData(fim)}</span></div>
      <div><label>Caixas incluídos</label><span>${agr.numRegistos} (${agr.fechados} fechado(s), ${agr.abertos} aberto(s))</span></div>
    </div>
    ${agr.falhaContinuidade?`<p style="font-size:11px;color:#C0392B;">⚠️ Foram detectadas quebras de continuidade entre caixas neste período; os totais podem não reflectir com exactidão o saldo transportado.</p>`:''}
    <div class="psec">Resumo do Período</div>
    ${totaisHtml}
    ${saldosMeioHtml}
    ${listaHtml}
    ${printFooterHtml()}`;
  printDoc(html);
}

              <button class="btn btn-ghost btn-sm" onclick="verRelatorioCaixa('${r.id}')">Detalhes${(getAnexos('relatorioCaixa',r.id).length)?` (${getAnexos('relatorioCaixa',r.id).length}📎)`:''}</button>
              <button class="btn btn-ghost btn-sm" onclick="imprimirRelatorioCaixa('${r.id}')">🖨️ PDF</button>
              ${rcPodeRegistarRapido(r)?`<button class="btn btn-ghost btn-sm" data-acao="criar" onclick="formRcRegistarDeposito('${r.id}')">💰 Depósito</button>`:''}
              ${podeFechar?`<button class="btn btn-ghost btn-sm" data-acao="editar" onclick="fecharCaixaConfirm('${r.id}')">Fechar caixa</button>`:''}
              ${vias.length>1?`<button class="btn btn-ghost btn-sm" onclick="compararViasCaixa('${grupoId}')">Comparar vias</button>`:''}
            </td>
          </tr>`;}).join('')}</tbody>
      </table></div>`:`<div class="empty">${restrito?'Ainda não criou nenhum caixa.':'Sem relatórios registados.'}</div>`}
    </div>`;
}

function formRelatorioCaixaNovo(){
  if(naoPodeCriar('relatorios')){ showToast('Sem permissão.','error'); return; }
  const aberto = rcCaixaAbertoDoUtilizador();
  if(aberto){
    showToast('Já tem um caixa aberto. Feche-o antes de abrir um novo relatório.','error');
    verRelatorioCaixa(aberto.id);
    return;
  }
  formRelatorioCaixa();
}
