function salvarLancamento(id, pendingId){
  if(id ? naoPodeEditar('financeiro') : naoPodeCriar('financeiro')){ showToast('Sem permissão.','error'); return; }
  const data=document.getElementById('f-lanc-data').value;
  const numero=document.getElementById('f-lanc-numero').value.trim();
  const descricao=document.getElementById('f-lanc-descricao').value.trim();
  if(!data){ showToast('Indique a data do lançamento.','error'); return; }
  if(!descricao){ showToast('Indique a descrição do lançamento.','error'); return; }
  const contaEls=[...document.querySelectorAll('[data-linha-conta]')];
  const debEls=[...document.querySelectorAll('[data-linha-debito]')];
  const credEls=[...document.querySelectorAll('[data-linha-credito]')];
  const linhas=contaEls.map((el,i)=>({contaId:el.value,debito:Number(debEls[i].value)||0,credito:Number(credEls[i].value)||0}))
    .filter(li=>li.contaId && (li.debito>0||li.credito>0));
  if(linhas.length<2){ showToast('Indique pelo menos duas linhas de movimento (débito e crédito).','error'); return; }
  const contaMae = linhas.map(li=>getConta(li.contaId)).find(c=>c && contaTemSubcontas(c.id));
  if(contaMae){ showToast(`A conta "${contaMae.codigo} - ${contaMae.designacao}" tem sub-contas e não pode receber lançamentos directamente. Escolha a sub-conta de último grau correcta.`,'error'); return; }
  const totalDeb=linhas.reduce((s,x)=>s+x.debito,0);
  const totalCred=linhas.reduce((s,x)=>s+x.credito,0);
  if(Math.abs(totalDeb-totalCred)>0.01){ showToast(`O lançamento não está equilibrado: débito ${fmtMT(totalDeb)} ≠ crédito ${fmtMT(totalCred)}.`,'error'); return; }
  if(!state.lancamentos) state.lancamentos=[];
  let lancamentoId=id;
  if(id){
    const l=getLancamento(id); l.data=data; l.numero=numero; l.descricao=descricao; l.linhas=linhas;
    audit('update','lancamento',id,`Lançamento "${numero}" editado`,`Total: ${fmtMT(totalDeb)}`);
  } else {
    const l={id:uid('ld'),data,numero,descricao,linhas,criadoEm:new Date().toISOString()};
    state.lancamentos.push(l);
    lancamentoId=l.id;
    audit('create','lancamento',l.id,`Novo lançamento criado: "${numero}"`,`Total: ${fmtMT(totalDeb)}`);
  }
  if(pendingId){
    const registo=getRegistoPendente(pendingId);
    if(registo){
      registo.status='processado';
      registo.lancamentoId=lancamentoId;
      registo.processadoEm=new Date().toISOString();
      audit('update','registoPendenteContabilidade',registo.id,`Registo pendente processado: "${registo.descricaoSugerida}"`,`Lançamento: ${numero}`);
    }
  }
  saveState(); closeModal(); renderContent();
  showToast('Lançamento guardado.','success');
}

function apagarLancamento(id){
  if(naoPodeApagar('financeiro')){ showToast('Sem permissão.','error'); return; }
  const l=getLancamento(id);
  confirmAction('Apagar este lançamento?',()=>{
    moverParaLixeira('lancamento', l, `Lançamento eliminado: "${l?l.numero:'—'}"`);
    state.lancamentos=state.lancamentos.filter(x=>x.id!==id);
    saveState(); renderContent();
    showToast('Lançamento movido para a lata de lixo.','success');
  });
}

/* ── Registos Pendentes (viagens enviadas à contabilidade) ── */
function getRegistoPendente(id){ return (state.registosContabilidadePendentes||[]).find(r=>r.id===id); }
function registosPendentesOrdenados(){ return (state.registosContabilidadePendentes||[]).filter(r=>r.status==='pendente').sort((a,b)=>new Date(b.criadoEm)-new Date(a.criadoEm)); }

function rejeitarRegistoPendente(id){
  if(naoPodeApagar('financeiro')){ showToast('Sem permissão.','error'); return; }
  const r=getRegistoPendente(id); if(!r) return;
  confirmAction('Remover este registo pendente? A viagem poderá ser enviada novamente à contabilidade.',()=>{
    moverParaLixeira('registoPendenteContabilidade', r, `Registo pendente removido: "${r.descricaoSugerida}"`);
    state.registosContabilidadePendentes=(state.registosContabilidadePendentes||[]).filter(x=>x.id!==id);
    const v=getViagem(r.viagemId);
    if(v) v.enviadoContabilidade=false;
    saveState();
    abrirRegistosPendentes();
    showToast('Registo removido da lista de pendentes.','success');
  });
}

/* ── Balancete de Verificação ── */
let balanceteFiltro = {inicio:'', fim:''};

function calcularBalancete(inicio, fim){
  const porConta = {};
  (state.lancamentos||[]).forEach(l=>{
    if(inicio && l.data<inicio) return;
    if(fim && l.data>fim) return;
    (l.linhas||[]).forEach(li=>{
      if(!porConta[li.contaId]) porConta[li.contaId]={debito:0,credito:0};
      porConta[li.contaId].debito += Number(li.debito||0);
      porConta[li.contaId].credito += Number(li.credito||0);
    });
  });
  const linhas = contasOrdenadas().filter(c=>porConta[c.id]).map(c=>{
    const t=porConta[c.id];
    const saldo=t.debito-t.credito;
    return {conta:c, debito:t.debito, credito:t.credito, saldoDevedor:saldo>0?saldo:0, saldoCredor:saldo<0?-saldo:0};
  });
  const totais=linhas.reduce((acc,l)=>{ acc.debito+=l.debito; acc.credito+=l.credito; acc.saldoDevedor+=l.saldoDevedor; acc.saldoCredor+=l.saldoCredor; return acc; },{debito:0,credito:0,saldoDevedor:0,saldoCredor:0});
  return {linhas, totais};
}

function viewBalancete(){
  const {linhas, totais} = calcularBalancete(balanceteFiltro.inicio, balanceteFiltro.fim);
  const equilibrado = Math.abs(totais.debito-totais.credito)<0.01;
  return `
    <div class="card" style="margin-bottom:14px;">
      <div class="form-cols2">
        <div class="form-row"><label>De</label><input type="date" value="${balanceteFiltro.inicio}" onchange="balanceteFiltro.inicio=this.value;renderContent();"></div>
        <div class="form-row"><label>Até</label><input type="date" value="${balanceteFiltro.fim}" onchange="balanceteFiltro.fim=this.value;renderContent();"></div>
      </div>
    </div>
    <div class="flex-between" style="margin-bottom:14px;">
      <span class="badge ${equilibrado?'success':'danger'}">${equilibrado?'Balancete equilibrado':'Balancete não equilibrado'}</span>
      <button class="btn btn-ghost btn-sm" onclick="imprimirBalancete()">Imprimir</button>

// Objetivo: registar toda a gente que entra em contacto (por telefone, WhatsApp, redes sociais,
// presencialmente, etc.), de onde nos encontrou, o que pretende, e sobretudo a PRÓXIMA DATA DE
// CONTACTO combinada — para nunca mais se dizer "vou ligar no dia X" e esquecer.
const ATENDIMENTO_ORIGENS=['WhatsApp','Chamada telefónica','Facebook','Instagram','Indicação de alguém','Rua / Terminal','Google','Outro'];
const ATENDIMENTO_ESTADOS=[
  {id:'novo',           label:'Novo',                       cls:'info'},
  {id:'em_atendimento', label:'Em atendimento',             cls:'warning'},
  {id:'aguardando',     label:'Aguardando o cliente',        cls:'neutral'},
  {id:'agendado',       label:'Contacto agendado',           cls:'warning'},
  {id:'resolvido',      label:'Resolvido',                   cls:'success'},
  {id:'perdido',        label:'Perdido / sem resposta',      cls:'danger'},
];
function atendimentoEstadoInfo(id){ return ATENDIMENTO_ESTADOS.find(e=>e.id===id) || ATENDIMENTO_ESTADOS[0]; }

// Estado do próximo contacto combinado: atrasado (já passou e continua por resolver), hoje, em breve, ou nenhum.
function statusProximoContacto(a){
  if(!a.proximoContacto || a.estado==='resolvido' || a.estado==='perdido') return null;
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const alvo=new Date(a.proximoContacto+'T00:00:00');
  const dias=Math.round((alvo-hoje)/(24*60*60*1000));
  if(dias<0) return {label:`Atrasado ${Math.abs(dias)}d`, cls:'danger', dias};
  if(dias===0) return {label:'Hoje', cls:'warning', dias};
  if(dias<=2) return {label:`Em ${dias}d`, cls:'warning', dias};
  return {label:fmtData(a.proximoContacto), cls:'neutral', dias};
}

// Usado no Painel: todos os contactos agendados para hoje ou já atrasados, mais urgentes primeiro.
function atendimentosPorAcompanhar(){
  return state.atendimentos
    .map(a=>Object.assign({},a,{st:statusProximoContacto(a)}))
    .filter(a=>a.st && a.st.dias<=0)
    .sort((a,b)=>a.st.dias-b.st.dias);
}

let atendimentoFiltro='ativos';
let atendimentoBusca='';

function viewAtendimento(){
  const filtros={
    ativos:{label:'Ativos', test:a=>a.estado!=='resolvido'&&a.estado!=='perdido'},
    todos:{label:'Todos', test:()=>true},
    novo:{label:'Novos', test:a=>a.estado==='novo'},
    em_atendimento:{label:'Em atendimento', test:a=>a.estado==='em_atendimento'},
    aguardando:{label:'Aguardando', test:a=>a.estado==='aguardando'},
    agendado:{label:'Agendados', test:a=>a.estado==='agendado'},
    resolvido:{label:'Resolvidos', test:a=>a.estado==='resolvido'},
    perdido:{label:'Perdidos', test:a=>a.estado==='perdido'},
  };
  const busca=atendimentoBusca.trim().toLowerCase();
  let lista=state.atendimentos
    .map(a=>Object.assign({},a,{st:statusProximoContacto(a)}))
    .filter(filtros[atendimentoFiltro].test)
    .filter(a=>!busca || (a.nome||'').toLowerCase().includes(busca) || (a.contacto||'').toLowerCase().includes(busca) || (a.assunto||'').toLowerCase().includes(busca));
  // Ordena: primeiro quem tem contacto atrasado/hoje, depois por data de criação mais recente.
  lista.sort((a,b)=>{
    const da=a.st?a.st.dias:9999, db=b.st?b.st.dias:9999;
    if(da!==db) return da-db;
    return new Date(b.criadoEm||0)-new Date(a.criadoEm||0);
  });
  const acompanhar=atendimentosPorAcompanhar();

  if(!state.atendimentos.length){
    return `<div class="card"><div class="empty"><div class="empty-title">Sem atendimentos registados</div>
      <p class="muted" style="margin-top:6px;">Registe aqui todas as pessoas que entram em contacto: quem são, de onde nos acharam, o que pretendem, e quando combinaram voltar a falar consigo.</p>
      <div style="margin-top:16px;"><button class="btn btn-primary" data-acao="criar" onclick="formAtendimento()">+ Novo atendimento</button></div>
    </div></div>`;
  }

  return `
    ${acompanhar.length ? `<div class="card" style="margin-bottom:14px;border-top:3px solid var(--danger);">
      <p class="section-title" style="color:var(--danger);">⚠ Contactos a fazer hoje / em atraso (${acompanhar.length})</p>
      <div class="table-wrap"><table><tbody>${acompanhar.map(a=>`
        <tr style="cursor:pointer" onclick="formAtendimento('${a.id}')">
          <td>${esc(a.nome)}<div class="muted" style="font-size:11.5px;">${esc(a.contacto||'—')}</div></td>
          <td>${esc(a.assunto||'—')}</td>
          <td style="text-align:right;"><span class="badge ${a.st.cls}">${a.st.label}</span></td>
        </tr>`).join('')}</tbody></table></div>
    </div>` : ''}
    <div class="flex-between" style="margin-bottom:14px;gap:10px;flex-wrap:wrap;">
      <div class="tabs-pill" style="margin-bottom:0;">
        ${Object.entries(filtros).map(([k,f])=>`<button class="${atendimentoFiltro===k?'active':''}" onclick="atendimentoFiltro='${k}';renderContent();">${f.label}</button>`).join('')}
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input placeholder="Pesquisar por nome, contacto ou assunto..." value="${esc(atendimentoBusca)}" style="width:220px;" oninput="atendimentoBusca=this.value;renderContent();">
        <button class="btn btn-primary" data-acao="criar" onclick="formAtendimento()">+ Novo atendimento</button>
      </div>
    </div>
    <div class="card">
      <div class="table-wrap"><table>
        <thead><tr><th>Cliente</th><th>Origem</th><th>Deseja</th><th>Estado</th><th>Próximo contacto</th><th>Responsável</th><th></th></tr></thead>
        <tbody>${lista.length ? lista.map(a=>{
          const est=atendimentoEstadoInfo(a.estado);
          return `<tr>
            <td>${esc(a.nome)}<div class="muted" style="font-size:11.5px;">${esc(a.contacto||'—')}</div></td>
            <td>${esc(a.origem||'—')}</td>
            <td style="max-width:220px;">${esc(a.assunto||'—')}</td>
            <td><span class="badge ${est.cls}">${est.label}</span></td>
            <td>${a.st ? `<span class="badge ${a.st.cls}">${a.st.label}</span>` : (a.proximoContacto?fmtData(a.proximoContacto):'<span class="muted">—</span>')}</td>
            <td>${esc(a.responsavel||'—')}</td>
            <td class="tbl-actions">
              <button class="btn btn-ghost btn-sm" onclick="formAtendimento('${a.id}')">Abrir</button>
              <button class="btn btn-danger-ghost btn-sm" data-acao="apagar" onclick="apagarAtendimento('${a.id}')">Apagar</button>

          </tr>`;
        }).join('') : `<tr><td colspan="7"><div class="empty" style="padding:24px 0;"><div class="empty-title">Nada para mostrar neste filtro</div></div></td></tr>`}</tbody>
      </table></div>
    </div>`;
}

function adicionarNotaAtendimento(id){
  if(naoPodeEditar('atendimento')){ showToast('Sem permissão.','error'); return; }
  const a=state.atendimentos.find(x=>x.id===id); if(!a) return;
  const texto=(document.getElementById('f-at-nota-nova').value||'').trim();
  if(!texto){ showToast('Escreva a nota antes de adicionar.','error'); return; }
  if(!a.historico) a.historico=[];
  a.historico.push({data:new Date().toISOString(), texto, autor: currentPerfil ? currentPerfil.nome : (currentUser?.email||'—')});
  saveState();
  audit('update','atendimento',a.id,`Nota adicionada ao atendimento de "${a.nome}"`,texto);
  formAtendimento(id); // reabre o modal já com o histórico atualizado
}

function salvarAtendimento(id){
  if(id ? naoPodeEditar('atendimento') : naoPodeCriar('atendimento')){ showToast('Sem permissão.','error'); return; }
  const nome=document.getElementById('f-at-nome').value.trim();
  if(!nome){ showToast('Indique o nome do cliente.','error'); return; }
  const dados={
    nome,
    contacto:document.getElementById('f-at-contacto').value.trim(),
    origem:document.getElementById('f-at-origem').value,
    estado:document.getElementById('f-at-estado').value,
    assunto:document.getElementById('f-at-assunto').value.trim(),
    proximoContacto:document.getElementById('f-at-proximo').value||null,
    responsavel:document.getElementById('f-at-responsavel').value.trim(),
  };
  if(id){
    const a=state.atendimentos.find(x=>x.id===id);
    Object.assign(a,dados);
    audit('update','atendimento',id,`Atendimento de "${dados.nome}" editado`,`Estado: ${atendimentoEstadoInfo(dados.estado).label}${dados.proximoContacto?' · Próximo contacto: '+fmtData(dados.proximoContacto):''}`);
  }else{
    const novo=Object.assign({id:uid('at'),criadoEm:new Date().toISOString(),historico:[]},dados);
    state.atendimentos.push(novo);
    audit('create','atendimento',novo.id,`Novo atendimento: "${dados.nome}"`,`Origem: ${dados.origem} · ${dados.assunto||''}`);
  }
  saveState(); closeModal(); renderContent();
  showToast('Atendimento guardado.','success');
}

function apagarAtendimento(id){
  if(naoPodeApagar('atendimento')){ showToast('Sem permissão.','error'); return; }
  const a=state.atendimentos.find(x=>x.id===id);
  confirmAction(`Apagar o atendimento de "${a?a.nome:''}"?`,()=>{
    moverParaLixeira('atendimento', a, `Atendimento eliminado: "${a?a.nome:'—'}"`);
    state.atendimentos=state.atendimentos.filter(x=>x.id!==id);
    saveState(); renderContent();
    showToast('Movido para a lata de lixo.','success');
  });
}

        <button class="${viagensFiltro==='agendadas'?'active':''}" onclick="viagensFiltro='agendadas'; renderContent();">Agendadas (${agendadas.length})</button>
        <button class="${viagensFiltro==='em_curso'?'active':''}" onclick="viagensFiltro='em_curso'; renderContent();">Em curso (${emCurso.length})</button>
        <button class="${viagensFiltro==='concluidas'?'active':''}" onclick="viagensFiltro='concluidas'; renderContent();">Concluídas (${concluidas.length})</button>
        <button class="${viagensFiltro==='adiadas'?'active':''}" onclick="viagensFiltro='adiadas'; renderContent();">Adiadas (${adiadas.length})</button>
        <button class="${viagensFiltro==='canceladas'?'active':''}" onclick="viagensFiltro='canceladas'; renderContent();">Canceladas (${canceladas.length})</button>
      </div>
      <button class="btn btn-primary" data-acao="criar" onclick="formViagem()">+ Nova viagem</button>
    </div>
    ${viagensFiltro==='agendadas' ? renderListaAgendadas(agendadas)
      : viagensFiltro==='em_curso' ? renderListaEmCurso(emCurso)
      : viagensFiltro==='adiadas' ? renderListaAgendadas(adiadas, true)
      : viagensFiltro==='canceladas' ? renderListaCanceladas(canceladas)
      : renderListaConcluidas(concluidas)}`;
}

function renderListaAgendadas(lista, isAdiadas){
  if(!lista.length) return `<div class="card"><div class="empty"><div class="empty-title">${isAdiadas?'Nenhuma viagem adiada':'Nenhuma viagem agendada'}</div>${isAdiadas?'Viagens agendadas que forem adiadas aparecem aqui.':'Quando criar uma viagem com data/hora futura, ela fica aqui até registar o início real, ser adiada ou cancelada.'}</div></div>`;
  const agora=new Date();
  return lista.map(v=>{
    const vt=getViatura(v.viaturaId), rota=getRota(v.rotaId), motNomes=nomesEquipa(getMotoristas(v)), cobNomes=nomesEquipa(getCobradores(v));
    const atrasada=new Date(v.dataPlaneada)<agora;
    return `<div class="card" style="margin-bottom:12px;">
      <div class="flex-between">
        <div>
          <strong style="font-size:15px;">${esc(vt?vt.matricula:'—')} · ${esc(rota?rota.nome:'Rota não definida')}</strong>
          <div class="muted" style="font-size:12.5px;margin-top:3px;">
            ${motNomes||'sem motorista'} · ${cobNomes||'sem cobrador'} · prevista para ${fmtDataHora(v.dataPlaneada)}
            ${v.vezesAdiada?` · adiada ${v.vezesAdiada}×`:''}
          </div>
          <div style="margin-top:6px;">${atrasada
            ? `<span class="badge warning">Devia ter iniciado — confirme com o motorista</span>`
            : `<span class="badge ${isAdiadas?'warning':'info'}">${isAdiadas?'Adiada':'Agendada'}</span>`}</div>
        </div>
        <div class="tbl-actions" style="flex-wrap:wrap;justify-content:flex-end;">
          <button class="btn btn-amber btn-sm" data-acao="editar" onclick="formRegistrarInicioReal('${v.id}')">Registar início real</button>
          <button class="btn btn-ghost btn-sm" data-acao="editar" onclick="formAdiarViagem('${v.id}')">Adiar</button>
          <button class="btn btn-danger-ghost btn-sm" data-acao="editar" onclick="formCancelarViagem('${v.id}')">Cancelar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderListaCanceladas(lista){
  if(!lista.length) return `<div class="card"><div class="empty"><div class="empty-title">Sem viagens canceladas</div></div></div>`;
  return `<div class="card"><div class="table-wrap"><table>
    <thead><tr><th>Estava prevista para</th><th>Viatura</th><th>Rota</th><th>Motivo</th><th>Cancelada em</th></tr></thead>
    <tbody>${lista.map(v=>{
      const vt=getViatura(v.viaturaId), rota=getRota(v.rotaId);
      return `<tr>
        <td>${fmtDataHora(v.dataPlaneada)}</td>
        <td>${esc(vt?vt.matricula:'—')}</td>
        <td>${esc(rota?rota.nome:'—')}</td>
        <td>${esc(v.motivoCancelamento)||'—'}</td>
        <td>${fmtDataHora(v.dataCancelamento)}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div></div>`;
}

function renderListaEmCurso(lista){
  if(!lista.length) return `<div class="card"><div class="empty"><div class="empty-title">Nenhuma viagem em curso</div></div></div>`;
  return lista.map(v=>{
    const vt=getViatura(v.viaturaId), rota=getRota(v.rotaId), motNomes=nomesEquipa(getMotoristas(v)), cobNomes=nomesEquipa(getCobradores(v));
    const isTerminal=v.status==='terminal';
    const maior=!isTerminal?viagemMaiorAtraso(v):null;
    const termBadge=isTerminal?`<span class="badge terminal" style="margin-left:8px;">Na Terminal</span>`:'';
    return `<div class="card" style="margin-bottom:12px;">
      <div class="flex-between">
        <div>
          <strong style="font-size:15px;">${esc(vt?vt.matricula:'—')} · ${esc(rota?rota.nome:'Rota não definida')}</strong>${termBadge}${(v.avarias&&v.avarias.length)?` <span class="badge danger">⚠ Avaria registada</span>`:''}${isAdmin()&&v.pedidoEdicao&&v.pedidoEdicao.status==='pendente'?' <span title="Pedido de edição pendente" style="color:var(--warning);">🕓</span>':''}
          <div class="muted" style="font-size:12.5px;margin-top:3px;">${motNomes||'sem motorista'} · ${cobNomes||'sem cobrador'} · iniciada ${fmtDataHora(v.dataInicio)}${isTerminal?` · na terminal há ${elapsedLabel(v.terminalInicio)}`:''}</div>
          ${maior&&maior.atraso>5?`<div style="margin-top:6px;"><span class="badge warning">Atraso de ${maior.atraso} min em "${esc(maior.nome)}"</span></div>`:''}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${!isTerminal?`<button class="btn btn-terminal btn-sm" data-acao="editar" onclick="irParaTerminal('${v.id}')">→ Terminal</button>`:`<button class="btn btn-amber btn-sm" data-acao="editar" onclick="sairDaTerminal('${v.id}')">Saiu da terminal</button>`}
          <button class="btn btn-amber" onclick="verViagem('${v.id}')">Atualizar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderListaConcluidas(lista){
  if(!lista.length) return `<div class="card"><div class="empty"><div class="empty-title">Sem viagens concluídas</div></div></div>`;
  return `<div class="card"><div class="table-wrap"><table>
    <thead><tr><th>Início</th><th>Fim</th><th>Viatura</th><th>Rota</th><th>Trajeto</th><th>Lucro</th><th></th></tr></thead>
    <tbody>${lista.map(v=>{
      const vt=getViatura(v.viaturaId), rota=getRota(v.rotaId), f=financeiroViagem(v);
      return `<tr>
        <td>${fmtData(v.dataInicio)}</td><td>${fmtData(v.dataFim)}</td>
        <td>${esc(vt?vt.matricula:'—')}</td><td>${esc(rota?rota.nome:'—')}${(v.avarias&&v.avarias.length)?` <span class="badge danger" style="font-size:10px;">⚠</span>`:''}${isAdmin()&&v.pedidoEdicao&&v.pedidoEdicao.status==='pendente'?' <span title="Pedido de edição pendente" style="color:var(--warning);">🕓</span>':''}</td>
        <td>${esc(v.localPartida||'—')} → ${esc(v.localDestino||'—')}</td>
        <td class="num" style="color:${f.lucro>=0?'var(--success)':'var(--danger)'}">${fmtMT(f.lucro)}</td>
        <td class="tbl-actions"><button class="btn btn-ghost btn-sm" onclick="verViagem('${v.id}')">Ver</button></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div></div>`;
}

  openModal(`
    <p class="modal-title">Nova viagem</p>
    <div class="form-cols2">
      <div class="form-row"><label>Rota</label><select id="nf-rota">
        <option value="">— Sem rota —</option>
        ${state.rotas.map(r=>`<option value="${r.id}">${esc(r.nome)}</option>`).join('')}
      </select></div>
      <div class="form-row"><label>Viatura</label><select id="nf-viatura">
        ${state.viaturas.map(v=>`<option value="${v.id}">${esc(v.matricula)}${v.modelo?' · '+v.modelo:''}</option>`).join('')}
      </select></div>
    </div>
    <div class="form-cols2">
      <div class="form-row"><label>Motorista(s)</label>
        <div class="checklist" style="border:1px solid var(--border);border-radius:8px;padding:8px;max-height:140px;overflow-y:auto;">
          ${state.tripulacao.filter(p=>p.funcao==='motorista'&&!p.afastado).map(p=>`
            <label style="display:flex;align-items:center;gap:8px;padding:4px 0;font-weight:400;cursor:pointer;">
              <input type="checkbox" class="nf-motorista-chk" value="${p.id}"> ${esc(p.nome)}
            </label>`).join('')||'<span class="muted" style="font-size:12.5px;">Sem motoristas ativos.</span>'}
        </div>
        ${state.tripulacao.some(p=>p.funcao==='motorista'&&p.afastado)?`<p class="form-hint">Motoristas afastados não aparecem na lista.</p>`:''}
      </div>
      <div class="form-row"><label>Cobrador(es)</label>
        <div class="checklist" style="border:1px solid var(--border);border-radius:8px;padding:8px;max-height:140px;overflow-y:auto;">
          ${state.tripulacao.filter(p=>p.funcao==='cobrador'&&!p.afastado).map(p=>`
            <label style="display:flex;align-items:center;gap:8px;padding:4px 0;font-weight:400;cursor:pointer;">
              <input type="checkbox" class="nf-cobrador-chk" value="${p.id}"> ${esc(p.nome)}
            </label>`).join('')||'<span class="muted" style="font-size:12.5px;">Sem cobradores ativos.</span>'}
        </div>
        ${state.tripulacao.some(p=>p.funcao==='cobrador'&&p.afastado)?`<p class="form-hint">Cobradores afastados não aparecem na lista.</p>`:''}
      </div>
    </div>
    <div class="form-row"><label>Data/hora prevista de início</label><input id="nf-inicio" type="datetime-local" value="${nowLocalInput()}"></div>
    <p class="form-hint">Se a data/hora for futura, a viagem fica "agendada" até registar o início real. Se for agora ou já tiver passado, fica logo "em curso".</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" data-acao="criar" onclick="criarViagem()">Iniciar viagem</button>
    </div>`);
}

function criarViagem(){
  if(naoPodeCriar('viagens')){ showToast('Sem permissão.','error'); return; }
  const rotaId=document.getElementById('nf-rota').value;
  const viaturaId=document.getElementById('nf-viatura').value;
  const motoristaIds=[...document.querySelectorAll('.nf-motorista-chk:checked')].map(el=>el.value);
  const cobradorIds=[...document.querySelectorAll('.nf-cobrador-chk:checked')].map(el=>el.value);
  const dataPrevista=document.getElementById('nf-inicio').value;
  if(!viaturaId||!dataPrevista){ showToast('Selecione a viatura e a data prevista de início.','error'); return; }
  const rota=getRota(rotaId);
  const trocos=rota?rota.trocos.map(t=>({nome:t.nome,duracaoEsperadaMin:t.duracaoEsperadaMin,horaInicioReal:null,horaFimReal:null})):[];
  const dataPrevistaISO=new Date(dataPrevista).toISOString();
  const ehFutura=new Date(dataPrevistaISO)>new Date();
  state.viagens.push({
    id:uid('vg'), rotaId:rotaId||null, viaturaId, motoristaId:motoristaIds[0]||null, cobradorId:cobradorIds[0]||null,
    motoristaIds, cobradorIds,
    dataPlaneada:dataPrevistaISO, dataPlaneadaOriginal:null, vezesAdiada:0,
    dataInicio:ehFutura?null:dataPrevistaISO, dataFim:null, status:ehFutura?'agendada':'em_curso',
    trocos, kmInicio:null, kmFim:null, litrosAbastecidos:null, custoCombustivel:null, abastecimentos:[],
    localPartida:'', localDestino:'',
    receitaBilhetes:null, receitaBagagem:null, receitaOutrosPassageiros:null,
    bilheteria:[], bagagemItens:[],
    custosOutros:[], outrasEntradas:[], outrasSaidas:[],
    saldoInicialItens:[], entregasCentral:[],
    estadoCaixa:'cobrador', valorEntregueAoCaixa:0,
    terminalInicio:null,
    motivoCancelamento:null, dataCancelamento:null,
  });
  saveState(); closeModal();
  const vt=getViatura(viaturaId); const rt=getRota(rotaId||'');
  audit('create','viagem',state.viagens[state.viagens.length-1].id,
    `${ehFutura?'Viagem agendada':'Viagem iniciada'}: ${vt?vt.matricula:'?'} · ${rt?rt.nome:'sem rota'}`,
    `Prevista: ${new Date(dataPrevistaISO).toLocaleString('pt-PT')}`);
  viagensFiltro=ehFutura?'agendadas':'em_curso';
  goTab('viagens');
  showToast(ehFutura?'Viagem agendada.':'Viagem iniciada.','success');
}

function formRegistrarInicioReal(id){
  const v=getViagem(id); if(!v) return;
  openModal(`
    <p class="modal-title">Registar início real</p>
    <p class="modal-sub">Estava prevista para ${fmtDataHora(v.dataPlaneada)}. Indique quando a viagem realmente começou — passa para "Em curso".</p>
    <div class="form-row"><label>Data/hora real de início</label><input id="ri-inicio" type="datetime-local" value="${nowLocalInput()}"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" data-acao="editar" onclick="confirmarInicioReal('${v.id}')">Confirmar início</button>
    </div>`);
}

function confirmarInicioReal(id){
  if(naoPodeEditar('viagens')){ showToast('Sem permissão.','error'); return; }
  const v=getViagem(id);
  const val=document.getElementById('ri-inicio').value;
  if(!val){ showToast('Indique a data/hora real de início.','error'); return; }
  v.dataInicio=new Date(val).toISOString();
  v.status='em_curso';
  const vt=getViatura(v.viaturaId); const rt=getRota(v.rotaId);
  audit('action','viagem',v.id,`Início real registado: ${vt?vt.matricula:'?'} · ${rt?rt.nome:'sem rota'}`,`Hora real: ${new Date(val).toLocaleString('pt-PT')} (estava agendada para ${fmtDataHora(v.dataPlaneada)})`);
  saveState(); closeModal();
  viagensFiltro='em_curso';
  renderContent();
  showToast('Viagem iniciada.','success');
}

function formAdiarViagem(id){
  const v=getViagem(id); if(!v) return;
  openModal(`
    <p class="modal-title">Adiar viagem</p>
    <p class="modal-sub">Atualmente prevista para ${fmtDataHora(v.dataPlaneada)}.</p>
    <div class="form-row"><label>Nova data/hora prevista</label><input id="ad-data" type="datetime-local" value="${toDatetimeLocal(v.dataPlaneada)}"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" data-acao="editar" onclick="confirmarAdiamento('${v.id}')">Guardar nova data</button>
    </div>`);
}

function confirmarAdiamento(id){
  if(naoPodeEditar('viagens')){ showToast('Sem permissão.','error'); return; }
  const v=getViagem(id);
  const val=document.getElementById('ad-data').value;
  if(!val){ showToast('Indique a nova data/hora.','error'); return; }
  if(!v.dataPlaneadaOriginal) v.dataPlaneadaOriginal=v.dataPlaneada;
  const dataAnterior=v.dataPlaneada;
  v.dataPlaneada=new Date(val).toISOString();
  v.vezesAdiada=(v.vezesAdiada||0)+1;
  v.status='adiada';
  const vt=getViatura(v.viaturaId); const rt=getRota(v.rotaId);
  audit('action','viagem',v.id,`Viagem adiada: ${vt?vt.matricula:'?'} · ${rt?rt.nome:'sem rota'}`,`De ${fmtDataHora(dataAnterior)} → para ${fmtDataHora(v.dataPlaneada)} (${v.vezesAdiada}ª vez)`);
  saveState(); closeModal();
  viagensFiltro='adiadas';
  renderContent();
  showToast('Viagem adiada.','success');
}

function formCancelarViagem(id){
  const v=getViagem(id); if(!v) return;
  openModal(`
    <p class="modal-title">Cancelar viagem</p>
    <p class="modal-sub">A viagem passa a "Cancelada" e sai das listas ativas, mas fica guardada no histórico.</p>
    <div class="form-row"><label>Motivo (opcional)</label><textarea id="cv-motivo" rows="3" placeholder="Ex: viatura avariada, sem passageiros suficientes..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Voltar</button>
      <button class="btn btn-danger-ghost" data-acao="editar" onclick="confirmarCancelamento('${v.id}')">Confirmar cancelamento</button>
    </div>`);
}

function confirmarCancelamento(id){
  if(naoPodeEditar('viagens')){ showToast('Sem permissão.','error'); return; }
  const v=getViagem(id);
  v.status='cancelada';
  v.motivoCancelamento=document.getElementById('cv-motivo').value.trim();
  v.dataCancelamento=new Date().toISOString();
  const vt=getViatura(v.viaturaId); const rt=getRota(v.rotaId);
  audit('action','viagem',id,`Viagem cancelada: ${vt?vt.matricula:'?'} · ${rt?rt.nome:'sem rota'}`,v.motivoCancelamento||'Sem motivo indicado');
  saveState(); closeModal();
  viagensFiltro='canceladas';
  renderContent();
  showToast('Viagem cancelada.','success');
}

/* Terminal */
function irParaTerminal(id){
  if(naoPodeEditar('viagens')){ showToast('Sem permissão.','error'); return; }
  const v=getViagem(id); if(!v) return;
  const vt=getViatura(v.viaturaId); const rt=getRota(v.rotaId);
  confirmAction('Registar que este autocarro foi para a terminal (junta)?',()=>{
    v.status='terminal';
    v.terminalInicio=new Date().toISOString();
    audit('action','viagem',id,`${vt?vt.matricula:'?'} entrou na terminal`,`Rota: ${rt?rt.nome:'—'} · Hora: ${fmtDataHora(v.terminalInicio)}`);
    saveState(); renderContent();
    showToast('Autocarro registado na terminal.','success');
  });
}

function sairDaTerminal(id){
  if(naoPodeEditar('viagens')){ showToast('Sem permissão.','error'); return; }
  const v=getViagem(id); if(!v) return;
  const vt=getViatura(v.viaturaId); const rt=getRota(v.rotaId);
  v.status='em_curso';
  v.terminalFim=new Date().toISOString();
  audit('action','viagem',id,`${vt?vt.matricula:'?'} saiu da terminal`,`Rota: ${rt?rt.nome:'—'} · Hora: ${fmtDataHora(v.terminalFim)}`);
  saveState(); renderContent();
  showToast('Autocarro saiu da terminal.','success');
}

/* Rows dinâmicos */
function optsContas(selectedId){
  const contas=contasOrdenadas();
  return `<option value="">— Categoria/conta —</option>` + contas.map(c=>{
    const bloqueada = contaTemSubcontas(c.id);
    const recuo = '\u00A0\u00A0'.repeat(Math.max(0, grauDaConta(c.codigo)-1));
    const rotulo = c.codigo+' - '+c.designacao + (bloqueada?' (conta mãe)':'');
    return `<option value="${c.id}" ${selectedId===c.id?'selected':''} ${bloqueada?'disabled':''}>${recuo}${esc(rotulo)}</option>`;
  }).join('');
}
/* Linha "cravada": já foi gravada anteriormente, mostra-se em modo só-leitura,
   sem inputs (por isso os coletores de formulário não a apanham) e sem botão de remover. */
function linhaCravadaHtml(texto, valor){
  return `<div class="flex-between" style="padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;">
    <span class="muted" style="font-size:12.5px;">${texto}</span>
    <span class="num" style="font-size:12.5px;">${fmtMT(valor||0)}</span>
  </div>`;
}
function entradaRowHtml(e, locked){
  if(locked) return linhaCravadaHtml(esc(e.descricao||'—'), e.valor);
  return `<div class="dyn-row-cat">
    <input placeholder="Descrição (ex: subsídio, adiantamento)" value="${esc(e.descricao||'')}" data-entrada-desc>
    <input type="number" min="0" step="0.01" placeholder="Valor (MT)" value="${e.valor||''}" data-entrada-valor>
    <select data-entrada-conta title="Categoria/conta da contabilidade">${optsContas(e.contaId||'')}</select>
    <button class="dyn-row-del" onclick="this.parentElement.remove()">×</button>
  </div>`;
}
function saidaRowHtml(s, locked){
  if(locked) return linhaCravadaHtml(esc(s.descricao||'—')+(s.categoria?` <span class="badge neutral" style="font-size:10px;">${esc(s.categoria)}</span>`:''), s.valor);
  return `<div class="saida-item-wrap" style="border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:8px;">
  <div class="dyn-row-cat" style="margin-bottom:6px;">
    <input placeholder="Descrição (ex: refeição, pedágio)" value="${esc(s.descricao||'')}" data-saida-desc>
    <input type="number" min="0" step="0.01" placeholder="Valor (MT)" value="${s.valor||''}" data-saida-valor>
    <select data-saida-conta title="Categoria/conta da contabilidade">${optsContas(s.contaId||'')}</select>
    <button class="dyn-row-del" onclick="this.closest('.saida-item-wrap').remove()">×</button>
  </div>
  <select data-saida-categoria title="Tipo de despesa (agrupamento do relatório)" style="max-width:220px;">
    <option value="">— Tipo (opcional) —</option>
    ${CATEGORIAS_SAIDA_VIAGEM.map(c=>`<option value="${esc(c)}" ${s.categoria===c?'selected':''}>${esc(c)}</option>`).join('')}
  </select>
  </div>`;
}
function bilheteriaRowHtml(item, placeholder, locked){
  item=item||{};
  if(locked){
    const q=item.quantidade, p=item.precoUnitario;
    const txt=esc(item.troco||'—')+(q?` · ${fmtNum(q,0)} × ${fmtMT(p||0)}`:'')+(item.obs?` <span style="font-style:italic;">(${esc(item.obs)})</span>`:'');
    return linhaCravadaHtml(txt, item.valor);
  }
  const q=item.quantidade??'', p=item.precoUnitario??'', val=item.valor??'';
  return `<div class="dyn-row-bilheteria">
    <input placeholder="${placeholder||'Troço (ex: Maputo - Macaneta)'}" value="${esc(item.troco||'')}" data-bh-troco>
    <input type="number" min="0" step="1" placeholder="Qtd" value="${q}" data-bh-qtd oninput="_recalcBilheteriaRow(this)">
    <input type="number" min="0" step="0.01" placeholder="Preço/un" value="${p}" data-bh-preco oninput="_recalcBilheteriaRow(this)">
    <input type="number" min="0" step="0.01" placeholder="Valor (MT)" value="${val}" data-bh-valor>
    <input placeholder="Obs (opcional)" value="${esc(item.obs||'')}" data-bh-obs>
    <button class="dyn-row-del" onclick="this.parentElement.remove()">×</button>
  </div>`;
}
function _recalcBilheteriaRow(el){
  const row=el.closest('.dyn-row-bilheteria');
  const q=Number(row.querySelector('[data-bh-qtd]').value)||0;
  const p=Number(row.querySelector('[data-bh-preco]').value)||0;
  if(q&&p) row.querySelector('[data-bh-valor]').value=(q*p).toFixed(2);
}
function addBilheteriaRow(prefix, tipo){ document.getElementById(prefix+'-'+tipo+'-container').insertAdjacentHTML('beforeend', bilheteriaRowHtml({}, tipo==='bagagem'?'Bagagem (ex: mala, caixa)':'Troço (ex: Maputo - Macaneta)')); }
function coletarBilheteria(prefix, tipo){
  const cont=`#${prefix}-${tipo}-container`;
  const trocos=[...document.querySelectorAll(`${cont} [data-bh-troco]`)].map(e=>e.value.trim());
  const qtds=[...document.querySelectorAll(`${cont} [data-bh-qtd]`)].map(e=>e.value);
  const precos=[...document.querySelectorAll(`${cont} [data-bh-preco]`)].map(e=>e.value);
  const valores=[...document.querySelectorAll(`${cont} [data-bh-valor]`)].map(e=>e.value);
  const obs=[...document.querySelectorAll(`${cont} [data-bh-obs]`)].map(e=>e.value.trim());
  return trocos.map((t,i)=>({
    troco:t, quantidade:qtds[i]!==''?Number(qtds[i]):null, precoUnitario:precos[i]!==''?Number(precos[i]):null,
    valor:valores[i]!==''?Number(valores[i])||0:0, obs:obs[i]||''
  })).filter(x=>x.troco||x.valor);
}

function addEntregaCentralRow(){ document.getElementById('dv-ec-container').insertAdjacentHTML('beforeend', entregaCentralRowHtml({})); }

function secaoFinanceira(prefix, v){
  const editavel = podeEditarCamposCravados(v);
  const bilheteria = v.bilheteria||[];
  const bagagemItens = v.bagagemItens||[];
  const entradas = v.outrasEntradas||[];
  const saidas   = v.outrasSaidas||[];
  const comb     = combustivelCalculado(v);
  const kmIniLocked = !editavel && temValorCravado(v.kmInicio);
  const kmFimLocked = !editavel && temValorCravado(v.kmFim);
  const abastecimentos = v.abastecimentos||[];

  return `
    <div class="section-divider">Quilometragem</div>
    <div class="form-cols2">
      <div class="form-row"><label>Km início</label><input id="${prefix}-km-ini" type="number" min="0" value="${v.kmInicio??''}" ${kmIniLocked?'disabled style="opacity:.65;"':''}></div>
      <div class="form-row"><label>Km fim</label><input id="${prefix}-km-fim" type="number" min="0" value="${v.kmFim??''}" ${kmFimLocked?'disabled style="opacity:.65;"':''}></div>
    </div>

    <div class="section-divider">Abastecimentos <span class="muted" style="text-transform:none;font-weight:400;">(um registo por cada vez que abasteceu combustível)</span></div>
    <div id="dv-ab-container">${abastecimentos.length?abastecimentos.map(i=>abastecimentoRowHtml(i,!editavel)).join(''):((v.litrosAbastecidos||v.custoCombustivel)?abastecimentoRowHtml({litros:v.litrosAbastecidos,custo:v.custoCombustivel}):'')}</div>
    <button class="btn btn-ghost btn-sm" onclick="addAbastecimentoRow()">+ Adicionar abastecimento</button>
    <p class="form-hint">Cada abastecimento feito durante a viagem (pode haver vários). Os litros e o custo total somam automaticamente ao guardar.</p>
    ${comb?`<p class="form-hint">Distância: ${fmtNum(comb.distancia,0)} km · esperado ${fmtNum(comb.litrosEsperados,1)} L · ${comb.desvio?`<span style="color:var(--danger);font-weight:700;">possível desvio (+${fmtNum(comb.diffPct,0)}%)</span>`:'consumo normal'}</p>`:''}

    <div class="section-divider">Bilheteria — Passageiros</div>
    <p class="form-hint" style="margin-top:-6px;">Um valor por troço/percurso vendido. Preencha Qtd + Preço/un para calcular o valor automaticamente, ou escreva o valor diretamente.</p>
    <div id="${prefix}-bilheteria-container">${bilheteria.length?bilheteria.map(i=>bilheteriaRowHtml(i,null,!editavel)).join(''):bilheteriaRowHtml({})}</div>
    <button class="btn btn-ghost btn-sm" onclick="addBilheteriaRow('${prefix}','bilheteria')">+ Adicionar passageiros</button>

    <div class="section-divider" style="margin-top:16px;">Bilheteria — Bagagem</div>
    <div id="${prefix}-bagagem-container">${bagagemItens.length?bagagemItens.map(i=>bilheteriaRowHtml(i,'Bagagem (ex: mala, caixa)',!editavel)).join(''):''}</div>
    <button class="btn btn-ghost btn-sm" onclick="addBilheteriaRow('${prefix}','bagagem')">+ Adicionar bagagem</button>

    <div class="collapsible-header" onclick="toggleCollapsible('${prefix}-entradas-body')">

      <span class="collapsible-toggle">+</span>
    </div>
    <div id="${prefix}-entradas-body" style="display:none" class="collapsible-body">
      <div id="${prefix}-entradas-container">${entradas.map(e=>entradaRowHtml(e,!editavel)).join('')}</div>

      <span class="collapsible-toggle">+</span>
    </div>
    <div id="${prefix}-saidas-body" style="display:none" class="collapsible-body">
      <div id="${prefix}-saidas-container">${saidas.map(s=>saidaRowHtml(s,!editavel)).join('')}</div>
      <button class="btn btn-ghost btn-sm" onclick="addSaidaRow('${prefix}')">+ Adicionar saída</button>

/* ── Ver viagem (resumo simples, só leitura) ──
   Ponto de entrada normal ao clicar numa viagem — mostra o essencial de forma calma,
   tal como o Relatório de Caixa. A edição só acontece a partir daqui, num passo separado. */
function verViagem(id){
  const v=getViagem(id); if(!v) return;
  if(viagensRestritasAoProprio()){
    const pid=minhaPessoaId();
    if(!pid || !equipaInViagem(v,pid)){ showToast('Sem permissão para ver esta viagem.','error'); return; }
  }
  const vt=getViatura(v.viaturaId), rota=getRota(v.rotaId);
  const fin=financeiroViagem(v);
  const ecLabel=estadoCaixaLabel(v);
  const motNomes=nomesEquipa(getMotoristas(v)), cobNomes=nomesEquipa(getCobradores(v));

  let pedidoPainelHtml='';
  if(isAdmin() && v.pedidoEdicao && v.pedidoEdicao.status==='pendente'){
    pedidoPainelHtml=`<div class="card" style="background:var(--warning-bg);border-color:var(--warning);margin:12px 0;padding:12px;">
      <p style="font-size:12.5px;color:var(--navy-800);margin:0 0 8px;font-weight:700;">🕓 ${esc(v.pedidoEdicao.solicitadoPor)} pediu autorização para editar esta viagem.</p>
      <p style="font-size:12px;color:var(--navy-800);margin:0 0 10px;">Motivo: ${esc(v.pedidoEdicao.motivo)}</p>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary btn-sm" onclick="decidirPedidoEdicaoViagem('${v.id}',true)">Aprovar</button>
        <button class="btn btn-danger-ghost btn-sm" onclick="decidirPedidoEdicaoViagem('${v.id}',false)">Recusar</button>
      </div>
    </div>`;
  } else if(v.pedidoEdicao){
    if(v.pedidoEdicao.status==='pendente'){
      pedidoPainelHtml=`<div class="card" style="background:var(--warning-bg);border-color:var(--warning);margin:12px 0;padding:12px;">
        <p style="font-size:12.5px;color:var(--navy-800);margin:0;font-weight:700;">🕓 Pedido de edição enviado — a aguardar decisão do administrador.</p>
      </div>`;
    } else if(v.pedidoEdicao.status==='negado'){
      pedidoPainelHtml=`<div class="card" style="background:var(--danger-bg);border-color:var(--danger);margin:12px 0;padding:12px;">
        <p style="font-size:12.5px;color:var(--navy-800);margin:0;font-weight:700;">Pedido de edição recusado${v.pedidoEdicao.decididoPor?' por '+esc(v.pedidoEdicao.decididoPor):''}.</p>
      </div>`;
    } else if(v.pedidoEdicao.status==='aprovado'){
      pedidoPainelHtml=`<div class="card" style="background:var(--success-bg);border-color:var(--success);margin:12px 0;padding:12px;">
        <p style="font-size:12.5px;color:var(--navy-800);margin:0;font-weight:700;">✓ Edição autorizada por ${esc(v.pedidoEdicao.decididoPor||'—')}.</p>
      </div>`;
    }
  }

  let editarBtnHtml='';
  if(podeEditarViagemDireto(v)){
    editarBtnHtml=`<button class="btn btn-primary" data-acao="editar" onclick="closeModal();formViagemEditar('${v.id}')">${v.status==='em_curso'||v.status==='terminal'?'Atualizar viagem':'Editar'}</button>`;
  } else if(podeNoModulo('viagens','editar')){
    if(v.pedidoEdicao && v.pedidoEdicao.status==='aprovado'){
      editarBtnHtml=`<button class="btn btn-primary" data-acao="editar" onclick="closeModal();formViagemEditar('${v.id}')">Editar (autorizado)</button>`;
    } else if(v.pedidoEdicao && v.pedidoEdicao.status==='pendente'){
      editarBtnHtml=`<button class="btn btn-ghost" disabled title="Aguarda aprovação do administrador" style="opacity:.5;cursor:not-allowed;">Pedido enviado</button>`;
    } else {
      editarBtnHtml=`<button class="btn btn-ghost" data-acao="editar" onclick="closeModal();formPedirEdicaoViagem('${v.id}')">Pedir autorização para editar</button>`;
    }
  }

  openModal(`
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px;">
      <p class="modal-title" style="margin:0;">${esc(vt?vt.matricula:'Viagem')} · ${esc(rota?rota.nome:'Sem rota')}</p>
      ${statusViagemInfo(v)?`<span class="badge ${statusViagemInfo(v).cls}">${statusViagemInfo(v).label}</span>`:''}
    </div>
    <p class="modal-sub">${motNomes||'sem motorista'} · ${cobNomes||'sem cobrador'}<br>Iniciada ${fmtDataHora(v.dataInicio)} ${v.status==='em_curso'?`· há ${elapsedLabel(v.dataInicio)}`:v.status==='terminal'?`· na terminal há ${elapsedLabel(v.terminalInicio)}`:`· concluída ${fmtDataHora(v.dataFim)}`}</p>
    ${pedidoPainelHtml}

    <div class="card" style="background:var(--bg);">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:var(--text-muted);margin-bottom:8px;">Resumo financeiro</div>
      ${fin.custAvarias?`<div class="flex-between"><span class="muted">Custos com avarias</span><span class="num" style="color:var(--danger);">${fmtMT(fin.custAvarias)}</span></div>`:''}
      <div class="flex-between"><span class="muted">Total receitas</span><strong class="num">${fmtMT(fin.receitas)}</strong></div>
      <div class="flex-between"><span class="muted">Total custos</span><strong class="num">${fmtMT(fin.custos)}</strong></div>
      <div class="flex-between"><span class="muted">Lucro</span><strong class="num" style="color:${fin.lucro>=0?'var(--success)':'var(--danger)'}">${fmtMT(fin.lucro)}</strong></div>
      <hr style="border:none;border-top:1px solid var(--border);margin:8px 0;">
      <div class="flex-between"><span class="muted">Saldo Inicial <span class="mono" style="font-size:10.5px;">(A)</span></span><span class="num">${fmtMT(fin.A)}</span></div>
      <div class="flex-between"><span class="muted">Entradas (bilheteria + outras) <span class="mono" style="font-size:10.5px;">(B)</span></span><span class="num">${fmtMT(fin.B)}</span></div>
      <div class="flex-between"><span class="muted">Total positivo (A+B) <span class="mono" style="font-size:10.5px;">(D)</span></span><span class="num">${fmtMT(fin.D)}</span></div>
      <div class="flex-between"><span class="muted">Gasto pago pelo cobrador <span class="mono" style="font-size:10.5px;">(C=E)</span></span><span class="num">${fmtMT(fin.C)}</span></div>
      <div class="flex-between"><span class="muted">Saldo final esperado (D-E) <span class="mono" style="font-size:10.5px;">(F)</span></span><strong class="num">${fmtMT(fin.F)}</strong></div>
      <div class="flex-between"><span class="muted">Estado do caixa</span><span class="badge ${ecLabel.cls}">${ecLabel.label}</span></div>
      <div class="flex-between"><span class="muted">Enviado à central/caixa <span class="mono" style="font-size:10.5px;">(G)</span></span><span class="num">${fmtMT(fin.G)}</span></div>
      <div class="flex-between"><span class="muted">Diferença (F-G) <span class="mono" style="font-size:10.5px;">(H)</span></span><strong class="num" style="color:${fin.H>0?'var(--warning)':fin.H<0?'var(--danger)':'var(--success)'}">${fmtMT(fin.H)}</strong></div>
      <p class="form-hint" style="margin-top:6px;">H &gt; 0: o cobrador ainda tem dinheiro em mãos por entregar. H &lt; 0: foi entregue mais do que o esperado (verificar).</p>
    </div>

    ${detalheFinanceiroViagemHtml(v)}

    ${(v.avarias&&v.avarias.length)?`
    <div class="section-divider">Avarias / Incidentes</div>
    ${v.avarias.map(a=>`<div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--border);">
      <div><div style="font-size:13px;">${esc(a.descricao||'—')}</div><div class="muted" style="font-size:11px;">${fmtDataHora(a.dataHora)}</div></div>
      ${a.custo?`<span class="num" style="color:var(--danger);">${fmtMT(a.custo)}</span>`:''}
    </div>`).join('')}`:''}

    ${v.notas?`<div class="section-divider">Notas</div><p style="font-size:13px;white-space:pre-wrap;">${esc(v.notas)}</p>`:''}

    ${v.status==='concluida'?secaoEnvioContabilidade(v):''}

    <div class="modal-actions">
      ${isAdmin()?`<button class="btn btn-danger-ghost" data-acao="apagar" onclick="apagarViagem('${v.id}')">Apagar</button>`:''}
      <div style="flex:1;"></div>
      <button class="btn btn-ghost" onclick="imprimirViagem('${v.id}')">🖨️ Imprimir / PDF</button>
      <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
      ${editarBtnHtml}
    </div>
    ${renderAnexosSection('viagem', v.id, 'Viagens/'+fmtData(v.dataInicio)+(vt?' · '+vt.matricula:''))}
    `, true);
}

/* ── Detalhe financeiro da viagem (bilheteria, saldo inicial, saídas por categoria, entregas à central) ──
   Espelha o "Relatório de Viagem" em papel preenchido pelo cobrador. Reutilizado tanto na
   visualização em ecrã (verViagem) como na impressão (imprimirViagem). */
function detalheFinanceiroViagemHtml(v){
  const linhaBH=(itens)=>itens.map(i=>`<div class="flex-between" style="padding:3px 0;">
      <span class="muted" style="font-size:12.5px;">${esc(i.troco||'—')}${i.quantidade?` · ${fmtNum(i.quantidade,0)} × ${fmtMT(i.precoUnitario||0)}`:''}${i.obs?` <span style="font-style:italic;">(${esc(i.obs)})</span>`:''}</span>
      <span class="num" style="font-size:12.5px;">${fmtMT(i.valor||0)}</span>
    </div>`).join('');
  const bilheteriaHtml=(()=>{
    const temPass=(v.bilheteria||[]).length, temBag=(v.bagagemItens||[]).length;
    if(!temPass&&!temBag) return '';
    return `<div style="margin-bottom:8px;">
      ${temPass?`<div class="muted" style="font-size:11px;font-weight:600;">Passageiros</div>${linhaBH(v.bilheteria)}`:''}

    </div>`;
  })();

  const saidasAgrupadasHtml=(()=>{
    const blocks=agruparPorCategoria(v.outrasSaidas||[]);
    if(!blocks.length) return '';
    return `<div style="margin-bottom:8px;">
      ${blocks.map(b=>{
        if(b.tipo==='item') return `<div class="flex-between" style="padding:3px 0;"><span class="muted" style="font-size:12.5px;">${esc(b.item.descricao||'—')}</span><span class="num" style="font-size:12.5px;">${fmtMT(b.item.valor||0)}</span></div>`;
        const soma=somaValores(b.itens);
        return `<div class="flex-between" style="padding:3px 0;font-weight:700;"><span style="font-size:12.5px;">${esc(b.nome)}</span><span class="num" style="font-size:12.5px;">${fmtMT(soma)}</span></div>

  })();

  const siHtml=(v.saldoInicialItens||[]).map(i=>`<div class="flex-between" style="padding:3px 0;"><span class="muted" style="font-size:12.5px;">${esc(i.desc||'—')}${i.obs?` <span style="font-style:italic;">(${esc(i.obs)})</span>`:''}</span><span class="num" style="font-size:12.5px;">${fmtMT(i.valor||0)}</span></div>`).join('');

  const abHtml=(v.abastecimentos||[]).map(i=>`<div class="flex-between" style="padding:3px 0;"><span class="muted" style="font-size:12.5px;">${fmtDataHora(i.dataHora)}${i.local?` · ${esc(i.local)}`:''}${i.litros?` · ${fmtNum(i.litros,1)} L`:''}</span><span class="num" style="font-size:12.5px;">${fmtMT(i.custo||0)}</span></div>`).join('');

  const partes=[];
  if((v.localPartida||v.localDestino)) partes.push(`<div class="info-grid"><div class="info-item"><label>Local de partida</label><span>${esc(v.localPartida||'—')}</span></div><div class="info-item"><label>Local de destino</label><span>${esc(v.localDestino||'—')}</span></div></div>`);
  if(siHtml) partes.push(`<div class="section-divider">Saldo Inicial (detalhe)</div>${siHtml}`);
  if(bilheteriaHtml) partes.push(`<div class="section-divider">Bilheteria</div>${bilheteriaHtml}`);
  if(abHtml) partes.push(`<div class="section-divider">Abastecimentos</div>${abHtml}`);
  if(saidasAgrupadasHtml) partes.push(`<div class="section-divider">Saídas por tipo</div>${saidasAgrupadasHtml}`);
  if(ecHtml) partes.push(`<div class="section-divider">Entregas à Central / Caixa</div>${ecHtml}`);
  return partes.join('');
}

    ...(v.bagagemItens||[]).map(i=>`<tr><td>Bagagem — ${esc(i.troco||'—')}${i.quantidade?` (${fmtNum(i.quantidade,0)} × ${fmtMT(i.precoUnitario||0)})`:''}</td><td class="num">${fmtMT(i.valor||0)}</td></tr>`)].join('');

function formPedirEdicaoViagem(id){
  const v=getViagem(id); if(!v) return;
  openModal(`
    <p class="modal-title">Pedir autorização para editar</p>
    <p class="modal-sub">${v.status==='concluida'?'Esta viagem já está concluída.':'Os dados já gravados desta viagem estão cravados.'} O administrador vai rever o pedido — só depois de aprovado poderá alterar diretamente o que já foi gravado.</p>
    <div class="form-row"><label>Motivo do pedido</label><textarea id="pv-motivo" rows="3" placeholder="Explique porque precisa de corrigir esta viagem..."></textarea></div>
    <p id="pv-err" style="color:var(--danger);font-size:12.5px;min-height:16px;margin:4px 0;"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal();verViagem('${id}')">Cancelar</button>
      <button class="btn btn-primary" onclick="enviarPedidoEdicaoViagem('${id}')">Enviar pedido</button>
    </div>`);
}

function enviarPedidoEdicaoViagem(id){
  if(naoPodeEditar('viagens')){ showToast('Sem permissão.','error'); return; }
  const motivo=document.getElementById('pv-motivo').value.trim();
  const errEl=document.getElementById('pv-err');
  if(!motivo){ errEl.textContent='Descreva o motivo do pedido.'; return; }
  const v=getViagem(id); if(!v) return;
  const solicitante=currentPerfil?.nome || currentUser?.email || '—';
  v.pedidoEdicao={ status:'pendente', motivo, solicitadoPor:solicitante, solicitadoEm:new Date().toISOString(), decididoPor:null, decididoEm:null };
  saveState();
  audit('action','viagem',id,'Pedido de edição solicitado',`Por: ${solicitante} · Motivo: ${motivo}`);
  closeModal();
  showToast('Pedido enviado ao administrador.','success');
  verViagem(id);
}

function decidirPedidoEdicaoViagem(id, aprovar){
  if(!isAdmin()) return;
  const v=getViagem(id); if(!v || !v.pedidoEdicao || v.pedidoEdicao.status!=='pendente') return;
  const adminNome=currentPerfil?.nome || currentUser?.email || 'Administrador';
  v.pedidoEdicao=Object.assign({}, v.pedidoEdicao, { status:aprovar?'aprovado':'negado', decididoPor:adminNome, decididoEm:new Date().toISOString() });
  saveState();
  audit('action','viagem',id,`Pedido de edição ${aprovar?'aprovado':'recusado'}`,`Por: ${adminNome}`);
  showToast(aprovar?'Pedido aprovado. A pessoa já pode editar esta viagem.':'Pedido recusado.', aprovar?'success':'');
  verViagem(id);
}

    ${avisoCravadoHtml}

/* Recebe também a viagem (v) e se os campos cravados podem ser editados diretamente
   (editavel). Quando NÃO editável: os campos escalares já preenchidos mantêm o valor
   antigo (os inputs correspondentes estão desativados no formulário, isto é apenas uma
   salvaguarda), e as listas (bilheteria, entradas, saídas) só recebem as linhas NOVAS
   escritas nesta sessão — as linhas já gravadas não aparecem como inputs no DOM (ver
   linhaCravadaHtml) e por isso nunca são "recolhidas" aqui, ficando preservadas tal como
   estavam. Quando editável (admin ou pedido aprovado), o comportamento é o de sempre:
   recolhe tudo o que está no formulário e substitui. */
function coletarSecaoFinanceira(prefix, v, editavel){
  v=v||{}; editavel=!!editavel;
  const getV=(id,fallback=null)=>{ const el=document.getElementById(id); return el&&el.value!==''?(isNaN(Number(el.value))?null:Number(el.value)):fallback; };
  const manterOuNovo=(id,valorAntigo)=>{
    if(!editavel && temValorCravado(valorAntigo)) return valorAntigo;
    return getV(id, null);
  };
  const bilheteriaNovas=coletarBilheteria(prefix,'bilheteria');
  const bagagemNovas=coletarBilheteria(prefix,'bagagem');
  const bilheteria = editavel ? bilheteriaNovas : [...(v.bilheteria||[]), ...bilheteriaNovas];
  const bagagemItens = editavel ? bagagemNovas : [...(v.bagagemItens||[]), ...bagagemNovas];
  const receitaBilhetesCalc=somaValores(bilheteria);
  const receitaBagagemCalc=somaValores(bagagemItens);
  const descsEnt=[...document.querySelectorAll(`#${prefix}-entradas-container [data-entrada-desc]`)].map(e=>e.value.trim());
  const valsEnt=[...document.querySelectorAll(`#${prefix}-entradas-container [data-entrada-valor]`)].map(e=>Number(e.value)||0);
  const contasEnt=[...document.querySelectorAll(`#${prefix}-entradas-container [data-entrada-conta]`)].map(e=>e.value);
  const entradasNovas=descsEnt.map((d,i)=>({descricao:d,valor:valsEnt[i],contaId:contasEnt[i]||''})).filter(e=>e.descricao||e.valor);
  const outrasEntradas = editavel ? entradasNovas : [...(v.outrasEntradas||[]), ...entradasNovas];
  const descsSai=[...document.querySelectorAll(`#${prefix}-saidas-container [data-saida-desc]`)].map(e=>e.value.trim());
  const valsSai=[...document.querySelectorAll(`#${prefix}-saidas-container [data-saida-valor]`)].map(e=>Number(e.value)||0);
  const contasSai=[...document.querySelectorAll(`#${prefix}-saidas-container [data-saida-conta]`)].map(e=>e.value);
  const catsSai=[...document.querySelectorAll(`#${prefix}-saidas-container [data-saida-categoria]`)].map(e=>e.value);
  const saidasNovas=descsSai.map((d,i)=>({descricao:d,valor:valsSai[i],contaId:contasSai[i]||'',categoria:catsSai[i]||''})).filter(s=>s.descricao||s.valor);
  const outrasSaidas = editavel ? saidasNovas : [...(v.outrasSaidas||[]), ...saidasNovas];
  return {
    kmInicio:manterOuNovo(`${prefix}-km-ini`, v.kmInicio), kmFim:manterOuNovo(`${prefix}-km-fim`, v.kmFim),
    bilheteria, bagagemItens,
    receitaBilhetes:receitaBilhetesCalc, receitaBagagem:receitaBagagemCalc, receitaOutrosPassageiros:null,
    outrasEntradas, custosOutros:[], outrasSaidas,
  };
}

function salvarViagem(id, concluir){
  if(naoPodeEditar('viagens')){ showToast('Sem permissão.','error'); return; }
  const v=getViagem(id);
  const editavel=podeEditarCamposCravados(v);
  const fin=coletarSecaoFinanceira('dv', v, editavel);
  const itensSemCategoria=[
    ...(fin.outrasEntradas||[]), ...(fin.outrasSaidas||[]), ...(fin.custosOutros||[]),
  ].some(it=>Number(it.valor)>0 && !it.contaId);
  if(itensSemCategoria){
    showToast('Escolha a categoria/conta da contabilidade em cada "outra entrada", "outra saída" ou "outro custo" com valor indicado.','error');
    return;
  }
  const inis=[...document.querySelectorAll('[data-seg-ini]')].map(e=>e.value);
  const fins=[...document.querySelectorAll('[data-seg-fim]')].map(e=>e.value);
  v.trocos=v.trocos.map((t,i)=>{
    const manterIni = !editavel && temValorCravado(t.horaInicioReal);
    const manterFim = !editavel && temValorCravado(t.horaFimReal);
    return Object.assign({},t,{
      horaInicioReal: manterIni ? t.horaInicioReal : (inis[i]?new Date(inis[i]).toISOString():null),
      horaFimReal: manterFim ? t.horaFimReal : (fins[i]?new Date(fins[i]).toISOString():null),
    });
  });
  Object.assign(v, fin);
  const avDatas=[...document.querySelectorAll('[data-avaria-data]')].map(e=>e.value);
  const avDescs=[...document.querySelectorAll('[data-avaria-desc]')].map(e=>e.value.trim());
  const avCustos=[...document.querySelectorAll('[data-avaria-custo]')].map(e=>e.value);
  const avContas=[...document.querySelectorAll('[data-avaria-conta]')].map(e=>e.value);
  const avariasNovas=avDescs.map((d,i)=>({
    dataHora: avDatas[i]?new Date(avDatas[i]).toISOString():new Date().toISOString(),
    descricao: d,
    custo: avCustos[i]!==''&&!isNaN(Number(avCustos[i]))?Number(avCustos[i]):null,
    contaId: avContas[i]||'',
  })).filter(a=>a.descricao||a.custo);
  v.avarias = editavel ? avariasNovas : [...(v.avarias||[]), ...avariasNovas];
  const locPartidaAntigo=v.localPartida, locDestinoAntigo=v.localDestino;
  v.localPartida = (!editavel && temValorCravado(locPartidaAntigo)) ? locPartidaAntigo : document.getElementById('dv-local-partida').value.trim();
  v.localDestino = (!editavel && temValorCravado(locDestinoAntigo)) ? locDestinoAntigo : document.getElementById('dv-local-destino').value.trim();
  const siNovos=coletarSaldoInicial();
  v.saldoInicialItens = editavel ? siNovos : [...(v.saldoInicialItens||[]), ...siNovos];
  v.fundoAuxilioRecebido=somaValores(v.saldoInicialItens);
  const ecNovas=coletarEntregasCentral();
  v.entregasCentral = editavel ? ecNovas : [...(v.entregasCentral||[]), ...ecNovas];
  v.valorEntregueAoCaixa=somaValores(v.entregasCentral);
  const abNovas=coletarAbastecimentos();
  v.abastecimentos = editavel ? abNovas : [...(v.abastecimentos||[]), ...abNovas];
  v.litrosAbastecidos=v.abastecimentos.reduce((s,i)=>s+(Number(i.litros)||0),0);
  v.custoCombustivel=v.abastecimentos.reduce((s,i)=>s+(Number(i.custo)||0),0);
  v.notas=document.getElementById('dv-notas').value.trim();
  if(concluir){
    const fimEl=document.getElementById('dv-fim');
    v.dataFim=fimEl?new Date(fimEl.value).toISOString():new Date().toISOString();
    v.status='concluida';
  }
  if(!isAdmin() && v.pedidoEdicao && v.pedidoEdicao.status==='aprovado'){
    v.pedidoEdicao=Object.assign({}, v.pedidoEdicao, {status:'usado'});
  }
  saveState(); closeModal(); renderContent();
  const vt2=getViatura(v.viaturaId); const rt2=getRota(v.rotaId); const fin2=financeiroViagem(v);
  if(concluir){
    audit('action','viagem',id,`Viagem concluída: ${vt2?vt2.matricula:'?'} · ${rt2?rt2.nome:'sem rota'}`,`Lucro: ${fmtMT(fin2.lucro)} · Avarias: ${(v.avarias||[]).length}`);
  } else {
    const dp=[]; if(v.avarias&&v.avarias.length) dp.push(`${v.avarias.length} avaria(s)`); if(v.kmFim) dp.push(`km fim: ${v.kmFim}`);
    audit('update','viagem',id,`Viagem atualizada: ${vt2?vt2.matricula:'?'} · ${rt2?rt2.nome:'sem rota'}`,dp.join(' · ')||null);
  }
  showToast(concluir?'Viagem concluída.':'Viagem atualizada.','success');
}

function apagarViagem(id){
  if(!isAdmin()){ showToast('Só o administrador pode apagar viagens.','error'); return; }
  const vg=getViagem(id); const vt=getViatura(vg?vg.viaturaId:null); const rt=getRota(vg?vg.rotaId:null);
  confirmAction('Apagar esta viagem?',()=>{
    moverParaLixeira('viagem', vg, `Viagem eliminada: ${vt?vt.matricula:'?'} · ${rt?rt.nome:'sem rota'} (início: ${fmtDataHora(vg?vg.dataInicio:null)})`);
    state.viagens=state.viagens.filter(v=>v.id!==id);
    saveState(); closeModal(); renderContent();
    showToast('Viagem movida para a lata de lixo.','success');
  });
}

function itensPorConta(itens){
  const porConta={};
  (itens||[]).forEach(it=>{
    const valor=Number(it.valor)||0;
    if(!valor||!it.contaId) return;
    porConta[it.contaId]=(porConta[it.contaId]||0)+valor;
  });
  return Object.entries(porConta).map(([contaId,valor])=>({contaId,valor}));
}

/* Constrói as linhas de débito/crédito do lançamento automático de uma viagem.
   Devolve {linhas, avisos, erro}. As linhas já vêm agregadas (uma por conta). */
function construirLinhasAutomaticasViagem(v){
  const cfg=state.configContabilidade||{};
  if(!cfg.contaCaixa||!cfg.contaVendas||!cfg.contaCombustivel||!cfg.contaSaldoCobrador){
    return {linhas:[], avisos:[], erro:'Faltam contas configuradas em Contabilidade → Contabilidade Geral → Configurações.'};
  }
  const somaDebCred={}; // contaId -> {debito,credito}
  const add=(contaId,debito,credito)=>{
    if(!contaId||(!debito&&!credito)) return;
    if(!somaDebCred[contaId]) somaDebCred[contaId]={debito:0,credito:0};
    somaDebCred[contaId].debito+=debito||0;
    somaDebCred[contaId].credito+=credito||0;
  };
  const recFixas=(Number(v.receitaBilhetes)||0)+(Number(v.receitaBagagem)||0)+(Number(v.receitaOutrosPassageiros)||0);
  const custComb=Number(v.custoCombustivel)||0;
  const itensReceita=itensPorConta(v.outrasEntradas||[]);
  const itensCusto=itensPorConta([...(v.custosOutros||[]),...(v.outrasSaidas||[])]);
  const fundoRecebido=Number(v.fundoAuxilioRecebido)||0;
  const entregueCaixa=Number(v.valorEntregueAoCaixa)||0;

  // 1) Vendas: debita Saldo do cobrador, credita Vendas
  if(recFixas>0){ add(cfg.contaSaldoCobrador,recFixas,0); add(cfg.contaVendas,0,recFixas); }
  // 1b) Outras entradas categorizadas: debita Saldo do cobrador, credita a conta escolhida
  itensReceita.forEach(i=>{ add(cfg.contaSaldoCobrador,i.valor,0); add(i.contaId,0,i.valor); });
  // 2) Fundo de auxílio entregue pelo caixa: debita Saldo do cobrador, credita Caixa
  if(fundoRecebido>0){ add(cfg.contaSaldoCobrador,fundoRecebido,0); add(cfg.contaCaixa,0,fundoRecebido); }
  // 3) Combustível pago com o fundo: debita Combustível, credita Saldo do cobrador
  if(custComb>0){ add(cfg.contaCombustivel,custComb,0); add(cfg.contaSaldoCobrador,0,custComb); }
  // 3b) Outros custos/saídas categorizados: debita a conta escolhida, credita Saldo do cobrador
  itensCusto.forEach(i=>{ add(i.contaId,i.valor,0); add(cfg.contaSaldoCobrador,0,i.valor); });
  // 4) Entregas do cobrador ao caixa (receita + eventual sobra do fundo): debita Caixa, credita Saldo do cobrador
  if(entregueCaixa>0){ add(cfg.contaCaixa,entregueCaixa,0); add(cfg.contaSaldoCobrador,0,entregueCaixa); }

  const avisos=[];
  // Avarias: liquidadas à parte (não passam pelo saldo do cobrador). Só entram se tiverem conta escolhida e houver conta de credores configurada.
  const itensAvaria=itensPorConta((v.avarias||[]).map(a=>({valor:a.custo,contaId:a.contaId})));
  if(itensAvaria.length){
    if(cfg.contaCredoresAvarias){
      itensAvaria.forEach(i=>{ add(i.contaId,i.valor,0); add(cfg.contaCredoresAvarias,0,i.valor); });
    } else {
      avisos.push('Há avarias com categoria escolhida mas não foram incluídas: configure a "Conta de Credores para reparações/avarias" para as lançar automaticamente.');
    }
  }

  const linhas=Object.entries(somaDebCred).map(([contaId,{debito,credito}])=>{
    const liquido=debito-credito;
    return liquido>=0?{contaId,debito:Math.round(liquido*100)/100,credito:0}:{contaId,debito:0,credito:Math.round(-liquido*100)/100};
  }).filter(li=>li.debito>0.004||li.credito>0.004);
  return {linhas, avisos, erro:null};
}

function enviarViagemContabilidade(id){
  if(naoPodeEditar('viagens')){ showToast('Sem permissão.','error'); return; }
  const v=getViagem(id); if(!v) return;
  const vt=getViatura(v.viaturaId), rota=getRota(v.rotaId);
  const fin=financeiroViagem(v);
  const {linhas, avisos, erro}=construirLinhasAutomaticasViagem(v);
  if(erro){ showToast(erro,'error'); return; }
  const totalDeb=linhas.reduce((s,l)=>s+l.debito,0), totalCred=linhas.reduce((s,l)=>s+l.credito,0);
  if(!linhas.length){ showToast('Não há valores para lançar nesta viagem.','error'); return; }
  if(Math.abs(totalDeb-totalCred)>0.01){ showToast(`O lançamento gerado ficou desequilibrado (débito ${fmtMT(totalDeb)} ≠ crédito ${fmtMT(totalCred)}). Reveja os valores da viagem.`,'error'); return; }
  if(!state.lancamentos) state.lancamentos=[];
  if(!state.registosContabilidadePendentes) state.registosContabilidadePendentes=[];
  const numero='JD-'+String(((state.lancamentos||[]).length)+1).padStart(4,'0');
  const lancamento={
    id: uid('lc'),
    numero,
    data: (v.dataFim||v.dataInicio||new Date().toISOString()).slice(0,10),
    descricao: `Viagem ${vt?vt.matricula:'?'} · ${rota?rota.nome:'sem rota'} · ${fmtData(v.dataFim||v.dataInicio)} (gerado automaticamente)`,
    linhas,
    origemViagemId: v.id,
  };
  state.lancamentos.push(lancamento);
  const registo={
    id: uid('rp'), viagemId: v.id, criadoEm: new Date().toISOString(), status: 'processado',
    descricaoSugerida: lancamento.descricao, dataViagem: v.dataFim||v.dataInicio,
    receitas: fin.receitas, custos: fin.custos, lucro: fin.lucro, lancamentoId: lancamento.id,
  };
  state.registosContabilidadePendentes.push(registo);
  v.enviadoContabilidade = true;
  v.lancamentoAutoId = lancamento.id;
  audit('action','viagem',v.id,`Viagem enviada à contabilidade: ${vt?vt.matricula:'?'} · ${rota?rota.nome:'sem rota'}`,`Lançamento ${numero} gerado automaticamente · Débito/Crédito: ${fmtMT(totalDeb)}`);
  saveState(); closeModal(); renderContent();
  avisos.forEach(a=>showToast(a,'warning'));
  showToast(`Viagem enviada à contabilidade. Lançamento ${numero} criado.`,'success');
}
