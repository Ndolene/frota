function formRelatorioCaixaEditar(id){
  const rc=(state.relatoriosCaixa||[]).find(x=>x.id===id);
  if(!rc) return;
  if(!podeEditarFolhaCaixaDireto(rc) && !(rc.pedido && rc.pedido.status==='aprovado')){
    showToast('Não tem autorização para editar este relatório. Peça autorização ao administrador.','error');
    return;
  }
  formRelatorioCaixa(rc);
}

function salvarRelatorioCaixa(rcId){
  if(naoPodeCriar('relatorios') && naoPodeEditar('relatorios')){ showToast('Sem permissão.','error'); return; }
  const data=document.getElementById('rc-data').value;
  if(!data){ showToast('Preencha a data.','error'); return; }
  const operador=document.getElementById('rc-operador').value.trim();
  const local=document.getElementById('rc-local').value.trim();
  const fixos=rcColetarSiFixos();
  const outros=rcColetarSiOutros();
  const entradas=rcColetarGrupo('entradas');
  const saidas=rcColetarGrupo('saidas');
  if(entradas.some(x=>!x.meio) || saidas.some(x=>!x.meio)){
    showToast('Indique o meio (Físico, E-Mola, M-Pesa, M-Kesh, etc.) em todas as entradas e saídas.','error');
    return;
  }
  const A=rcSomaItens(fixos)+rcSomaItens(outros);
  const B=rcSomaItens(entradas);
  const C=rcSomaItens(saidas);
  const D=A+B, E=C, F=D-E;
  const gVal=document.getElementById('rc-depositado').value;
  const G=gVal!==''?Number(gVal):0;
  const H=F-G;
  const idx=state.relatoriosCaixa.findIndex(r=>r.id===rcId);
  const existente = idx>-1 ? state.relatoriosCaixa[idx] : null;
  const camposFolha = {
    data, operador, local,
    saldoInicial:{fixos, outros}, entradas, saidas,
    subtotalA:A, subtotalB:B, subtotalC:C,
    totalPositivoD:D, totalSaidasE:E, saldoFinalF:F,
    saldoDepositadoG:G, remanescenteH:H,
    assinaturaCaixa:document.getElementById('rc-assinatura-caixa').value.trim(),
    assinaturaMonitor:document.getElementById('rc-assinatura-monitor').value.trim(),
    notas:document.getElementById('rc-notas').value.trim(),
  };

  if(existente && !podeEditarFolhaCaixaDireto(existente)){
    // Só se chega aqui com uma autorização válida (verificado de novo, por segurança)
    if(!(existente.pedido && existente.pedido.status==='aprovado')){
      showToast('Não tem autorização para editar este relatório.','error');
      closeModal();
      return;
    }
    const grupoId = rcGrupoId(existente);
    const vias = rcVias(grupoId);
    const proximoNumero = Math.max(...vias.map(v=>v.viaNumero||1)) + 1;
    const nome = currentPerfil?.nome || currentUser?.email || '—';
    const novaVia = Object.assign({id:uid('rc')}, camposFolha, {
      viaDe: grupoId,
      viaNumero: proximoNumero,
      status: existente.status||'fechado',
      fechadoPor: existente.fechadoPor||null,
      fechadoEm: existente.fechadoEm||null,
      criadoPor: existente.criadoPor,
      editadoPor: nome,
      pedido: null,
      criadoEm: new Date().toISOString()
    });
    state.relatoriosCaixa.push(novaVia);
    // Consome a autorização no original — não altera os dados do original, só fecha o pedido
    state.relatoriosCaixa[idx] = Object.assign({}, existente, { pedido: Object.assign({}, existente.pedido, {status:'usado'}) });
    saveState(); closeModal(); relatoriosSubTab='caixa'; renderContent();
    audit('update','relatorioCaixa',novaVia.id,`${proximoNumero}ª via criada (edição autorizada)`,`Relatório original: ${grupoId}`);
    showToast(`Guardado como ${proximoNumero}ª via. O relatório original foi mantido, para comparação.`,'success');
    return;
  }

  if(idx===-1){
    // Abertura de um novo caixa: o saldo inicial (A) deve corresponder ao remanescente (H)
    // do último caixa fechado pela mesma pessoa. Se não bater, não passa em silêncio.
    const nomeAtual = currentPerfil?.nome || currentUser?.email || '—';
    const ultimoFechado = rcUltimoCaixaFechado(nomeAtual);
    if(ultimoFechado){
      const esperado = rcSaldoEsperado(ultimoFechado);
      if(Math.abs(A-esperado) > 0.01){
        window._rcPendingSave = { rcId, camposFolha };
        abrirDivergenciaSaldoModal(esperado, A, ultimoFechado);
        return;
      }
    }
  }

  finalizarSalvarRelatorioCaixa(rcId, idx, existente, camposFolha, null);
}

function abrirDivergenciaSaldoModal(esperado, informado, ultimoFechado){
  const diff = informado - esperado;
  openModal(`
    <p class="modal-title" style="color:var(--danger);">⚠ Saldo inicial não confere</p>
    <p class="modal-sub">O saldo inicial informado (${fmtMT(informado)}) é diferente do remanescente do último caixa fechado por ${esc(ultimoFechado.criadoPor)} em ${fmtData(ultimoFechado.fechadoEm||ultimoFechado.data)} (${fmtMT(esperado)}). Diferença: <b style="color:var(--danger);">${fmtMT(diff)}</b>.</p>
    <p style="font-size:13px;color:var(--navy-800);">Isto pode ser um erro de digitação, dinheiro em falta, ou um ajuste legítimo (ex: reforço de caixa). Antes de continuar, explique o motivo — fica registado na auditoria e visível no histórico deste caixa.</p>
    <div class="form-row"><label>Motivo da diferença</label><textarea id="rcdiv-motivo" rows="3" placeholder="Explique porque o saldo inicial é diferente do esperado..."></textarea></div>
    <p id="rcdiv-err" style="color:var(--danger);font-size:12.5px;min-height:16px;margin:4px 0;"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal(); reabrirRascunhoRelatorioCaixa()">← Voltar e corrigir</button>
      <button class="btn btn-danger-ghost" onclick="confirmarSalvarComDivergencia()">Confirmar mesmo assim</button>
    </div>`);
}

function reabrirRascunhoRelatorioCaixa(){
  const pend = window._rcPendingSave;
  if(!pend){ formRelatorioCaixaNovo(); return; }
  formRelatorioCaixa(Object.assign({ id: pend.rcId }, pend.camposFolha));
}

function confirmarSalvarComDivergencia(){
  const motivo = document.getElementById('rcdiv-motivo').value.trim();
  const errEl = document.getElementById('rcdiv-err');
  if(!motivo){ errEl.textContent='Descreva o motivo da diferença antes de continuar.'; return; }
  const pend = window._rcPendingSave;
  if(!pend) return;
  finalizarSalvarRelatorioCaixa(pend.rcId, -1, null, pend.camposFolha, motivo);
  window._rcPendingSave = null;
}

function finalizarSalvarRelatorioCaixa(rcId, idx, existente, camposFolha, motivoDivergencia){
  if(idx>-1){
    // Caixa aberto (ou administrador a editar directamente): actualiza a via existente sem criar uma nova
    state.relatoriosCaixa[idx] = Object.assign({}, existente, camposFolha);
  } else {
    const novo = Object.assign({id:rcId}, camposFolha, {
      viaDe:null, viaNumero:1, pedido:null,
      status:'aberto', fechadoPor:null, fechadoEm:null,
      criadoPor: currentPerfil?.nome || currentUser?.email || '—',
      criadoEm: new Date().toISOString(),
    }, motivoDivergencia ? { saldoInicialDivergenciaMotivo: motivoDivergencia } : {});
    state.relatoriosCaixa.push(novo);
    if(motivoDivergencia){
      audit('action','relatorioCaixa',novo.id,'Caixa aberto com saldo inicial diferente do esperado', motivoDivergencia);
    }
  }
  saveState(); closeModal(); relatoriosSubTab='caixa'; renderContent();
  showToast('Relatório de caixa guardado.','success');
}

function fecharCaixaConfirm(id){
  const r=(state.relatoriosCaixa||[]).find(x=>x.id===id); if(!r) return;
  if(r.status!=='aberto'){ showToast('Este caixa já está fechado.',''); return; }
  const esperado = r.remanescenteH||0;
  window._rccEsperado = esperado;
  const outrosSI = (r.saldoInicial&&r.saldoInicial.outros)||[];
  openModal(`
    <p class="modal-title">Fechar caixa</p>
    <p class="modal-sub">${fmtData(r.data)} · ${esc(r.operador||'—')}${r.local?' · '+esc(r.local):''}</p>
    <p style="font-size:13px;color:var(--navy-800);">Antes de fechar, conte o dinheiro e o saldo que tem agora em cada meio. O total contado é comparado com o Remanescente (H) esperado — se não bater, terá de justificar a diferença para poder fechar o caixa.</p>
    <div class="section-divider">Contagem de fecho</div>
    <p style="font-size:12px;color:var(--text-muted);margin:-4px 0 8px;">Quanto tem, agora, em cada meio financeiro.</p>
    <div id="rcc-fixos">${RC_MEIOS_FIXOS.map((m,i)=>rcContagemFixoRowHtml(i,'','')).join('')}</div>
    <div id="rcc-outros-container">${outrosSI.map(o=>rcContagemOutroRowHtml({descricao:o.descricao})).join('')}</div>
    <button class="btn btn-ghost btn-sm" onclick="rcAddContagemOutro()">+ Adicionar outro meio contado</button>
    <div class="card" style="background:var(--bg);padding:12px 14px;margin:12px 0 4px;" id="rcc-total"></div>
    <p style="font-size:13px;color:var(--navy-800);margin-top:10px;">Depois de fechado, este relatório fica bloqueado: deixa de poder registar novas entradas/saídas directamente — só o administrador poderá editá-lo, e qualquer outra edição terá de ser pedida e autorizada. Para registar outro dia, terá de abrir um novo relatório.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal();verRelatorioCaixa('${id}')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarContagemFecho('${id}')">Continuar</button>
    </div>`,true);
  rccRecalc();
}

function confirmarContagemFecho(id){
  const r=(state.relatoriosCaixa||[]).find(x=>x.id===id); if(!r) return;
  const fixos = rcColetarContagemFixos();
  const outros = rcColetarContagemOutros();
  const total = rcSomaItens(fixos)+rcSomaItens(outros);
  const esperado = r.remanescenteH||0;
  const diff = total-esperado;
  const contagem = {fixos, outros, total, esperado, diferenca:diff};
  if(Math.abs(diff) < 0.01){
    fecharCaixa(id, contagem, null);
    return;
  }
  window._rccPendingFechar = { id, contagem };
  abrirDivergenciaFechoModal(esperado, total, diff);
}

function abrirDivergenciaFechoModal(esperado, contado, diff){
  const pend = window._rccPendingFechar;
  openModal(`
    <p class="modal-title" style="color:var(--danger);">⚠ Contagem não confere</p>
    <p class="modal-sub">O total contado agora (${fmtMT(contado)}) é diferente do Remanescente esperado (${fmtMT(esperado)}). Diferença: <b style="color:var(--danger);">${fmtMT(diff)}</b>.</p>
    <p style="font-size:13px;color:var(--navy-800);">Isto pode ser um erro de contagem, dinheiro em falta ou a mais, ou uma entrada/saída não registada. Antes de fechar, explique o motivo da diferença — fica registado na auditoria e visível no histórico deste caixa.</p>
    <div class="form-row"><label>Motivo da diferença</label><textarea id="rccdiv-motivo" rows="3" placeholder="Explique porque a contagem é diferente do esperado..."></textarea></div>
    <p id="rccdiv-err" style="color:var(--danger);font-size:12.5px;min-height:16px;margin:4px 0;"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal();fecharCaixaConfirm('${pend.id}')">← Voltar e corrigir contagem</button>
      <button class="btn btn-danger-ghost" onclick="confirmarFecharComDivergencia()">Justificar e fechar mesmo assim</button>
    </div>`);
}

function confirmarFecharComDivergencia(){
  const motivo = document.getElementById('rccdiv-motivo').value.trim();
  const errEl = document.getElementById('rccdiv-err');
  if(!motivo){ errEl.textContent='Descreva o motivo da diferença antes de continuar.'; return; }
  const pend = window._rccPendingFechar;
  if(!pend) return;
  fecharCaixa(pend.id, pend.contagem, motivo);
  window._rccPendingFechar = null;
}

function fecharCaixa(id, contagem, motivoDivergencia){
  if(naoPodeEditar('relatorios')){ showToast('Sem permissão.','error'); return; }
  const idx=(state.relatoriosCaixa||[]).findIndex(x=>x.id===id);
  if(idx===-1) return;
  const r = state.relatoriosCaixa[idx];
  if(r.status!=='aberto'){ showToast('Este caixa já está fechado.',''); return; }
  const nome = currentPerfil?.nome || currentUser?.email || '—';
  const extra = contagem ? {
    contagemFechamento: { fixos:contagem.fixos, outros:contagem.outros },
    totalContagemFechamento: contagem.total,
    diferencaContagemFechamento: contagem.diferenca,
  } : {};
  if(motivoDivergencia) extra.contagemDivergenciaMotivo = motivoDivergencia;
  state.relatoriosCaixa[idx] = Object.assign({}, r, extra, { status:'fechado', fechadoPor:nome, fechadoEm:new Date().toISOString() });
  saveState();
  audit('action','relatorioCaixa',id,'Caixa fechado',`Por: ${nome}${motivoDivergencia?' · Diferença na contagem: '+fmtMT(contagem.diferenca)+' — '+motivoDivergencia:''}`);
  closeModal();
  relatoriosSubTab='caixa'; renderContent();
  showToast('Caixa fechado. Para registar outro dia, abra um novo relatório.','success');
}

/* ── Registo rápido de entradas/saídas (sem autorização, só enquanto o caixa está aberto) ──
   Isto NÃO passa pelo formulário de edição completo: acrescenta uma linha nova directamente
   ao relatório. Não mexe em linhas já existentes, por isso não conta como "editar algo já
   registado" e não precisa de autorização nem cria uma nova via. */
function formRcRegistoRapido(id, tipo){
  const r=(state.relatoriosCaixa||[]).find(x=>x.id===id); if(!r) return;
  if(!rcPodeRegistarRapido(r)){
    if(r.status!=='aberto') showToast('Este caixa está fechado. Não é possível acrescentar novos registos.','error');
    else showToast('Só quem abriu este caixa (ou o administrador) pode registar aqui.','error');
    return;
  }
  const label = tipo==='entradas' ? 'entrada' : 'saída';
  const placeholder = tipo==='entradas' ? 'Origem (ex: Venda de bilhetes)' : 'Origem (ex: Combustível)';
  openModal(`
    <p class="modal-title">Nova ${label}</p>
    <p class="modal-sub">Acrescentado directamente ao caixa aberto — não altera nenhum registo anterior nem precisa de autorização.</p>
    <div class="form-row"><label>${esc(placeholder)}</label><input id="rcq-origem" placeholder="${esc(placeholder)}"></div>
    <div class="form-row"><label>Meio</label>
      <select id="rcq-meio" onchange="document.getElementById('rcq-meio-outro').style.display=this.value==='__outro__'?'block':'none'">
        <option value="" disabled selected>Selecione o meio...</option>
        ${RC_MEIOS_FIXOS.map(m=>`<option value="${esc(m)}">${esc(m)}</option>`).join('')}
        <option value="__outro__">Outro...</option>
      </select>

    </div>
    <div class="form-row"><label>Valor (MT)</label><input id="rcq-valor" type="number" min="0" step="0.01" placeholder="0.00 MT"></div>
    <div class="form-row"><label>Observações (opcional)</label><input id="rcq-obs" placeholder="Observações"></div>

      <button class="btn btn-ghost" onclick="closeModal();verRelatorioCaixa('${id}')">Cancelar</button>
      <button class="btn btn-primary" data-acao="criar" onclick="salvarRcRegistoRapido('${id}','${tipo}')">Guardar</button>
    </div>`);
}

function salvarRcRegistoRapido(id, tipo){
  const idx=(state.relatoriosCaixa||[]).findIndex(x=>x.id===id);
  if(idx===-1) return;
  const r = state.relatoriosCaixa[idx];
  if(!rcPodeRegistarRapido(r)){
    showToast('Sem permissão para registar aqui.','error');
    closeModal();
    return;
  }
  const origem = document.getElementById('rcq-origem').value.trim();
  const valorRaw = document.getElementById('rcq-valor').value;
  const obs = document.getElementById('rcq-obs').value.trim();
  const meioSel = document.getElementById('rcq-meio').value;
  const meioOutro = document.getElementById('rcq-meio-outro').value.trim();
  const meio = meioSel==='__outro__' ? meioOutro : meioSel;
  const errEl = document.getElementById('rcq-err');
  if(!origem || valorRaw===''){ errEl.textContent='Preencha a origem e o valor.'; return; }
  if(!meio){ errEl.textContent='Indique o meio (Físico, E-Mola, M-Pesa, M-Kesh, etc.).'; return; }
  const valor = Number(valorRaw)||0;
  const entradas = (r.entradas||[]).slice();
  const saidas = (r.saidas||[]).slice();
  (tipo==='entradas'?entradas:saidas).push({origem, valor, obs, meio});
  const A = r.subtotalA||0;
  const B = rcSomaItens(entradas);
  const C = rcSomaItens(saidas);
  const D = A+B, E = C, F = D-E, G = r.saldoDepositadoG||0, H = F-G;
  state.relatoriosCaixa[idx] = Object.assign({}, r, {
    entradas, saidas, subtotalB:B, subtotalC:C, totalPositivoD:D, totalSaidasE:E, saldoFinalF:F, remanescenteH:H
  });
  saveState();
  audit('action','relatorioCaixa',id,`Nova ${tipo==='entradas'?'entrada':'saída'} registada`,`${origem} (${meio}): ${fmtMT(valor)}`);
  closeModal();
  showToast(`${tipo==='entradas'?'Entrada':'Saída'} registada.`,'success');
  verRelatorioCaixa(id);
}

/* ── Registo rápido do depósito (sem autorização, só enquanto o caixa está aberto) ──
   Permite ao próprio caixa (ou ao administrador) registar, a partir do telemóvel, o valor
   que foi depositado no banco/agente no fim do dia. Tal como as entradas/saídas rápidas,
   isto não conta como "editar algo já registado" — só actualiza o campo G e recalcula o
   Remanescente (H). O comprovativo (foto tirada no telemóvel) pode ser anexado a seguir,
   na secção "Anexos" do relatório. */
function formRcRegistarDeposito(id){
  const r=(state.relatoriosCaixa||[]).find(x=>x.id===id); if(!r) return;
  if(!rcPodeRegistarRapido(r)){
    if(r.status!=='aberto') showToast('Este caixa está fechado. Peça autorização ao administrador para alterar o depósito.','error');
    else showToast('Só quem abriu este caixa (ou o administrador) pode registar o depósito.','error');
    return;
  }
  openModal(`
    <p class="modal-title">Registar depósito</p>
    <p class="modal-sub">Valor entregue no banco, agente M-Pesa/E-Mola, cofre, etc. Pode ajustar sempre que fizer um novo depósito, enquanto o caixa estiver aberto.</p>
    <div class="form-row"><label>Valor depositado (MT)</label><input id="rcd-valor" type="number" min="0" step="0.01" placeholder="0.00 MT" value="${r.saldoDepositadoG??''}"></div>
    <div class="form-row"><label>Onde/como foi depositado (opcional)</label><input id="rcd-obs" placeholder="Ex: Banco BCI, agência da Baixa · M-Pesa agente 84xxxx" value="${esc(r.depositoObs||'')}"></div>
    <p style="font-size:12px;color:var(--text-muted);margin:0 0 4px;">💡 Depois de guardar, tire uma foto do talão/comprovativo com o telemóvel e anexe-a abaixo em "Anexos".</p>
    <p id="rcd-err" style="color:var(--danger);font-size:12.5px;min-height:16px;margin:4px 0;"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal();verRelatorioCaixa('${id}')">Cancelar</button>
      <button class="btn btn-primary" data-acao="criar" onclick="salvarRcDeposito('${id}')">Guardar depósito</button>
    </div>`);
}

function salvarRcDeposito(id){
  const idx=(state.relatoriosCaixa||[]).findIndex(x=>x.id===id);
  if(idx===-1) return;
  const r = state.relatoriosCaixa[idx];
  if(!rcPodeRegistarRapido(r)){
    showToast('Sem permissão para registar o depósito aqui.','error');
    closeModal();
    return;
  }
  const valorRaw = document.getElementById('rcd-valor').value;
  const obs = document.getElementById('rcd-obs').value.trim();
  const errEl = document.getElementById('rcd-err');
  if(valorRaw===''){ errEl.textContent='Preencha o valor depositado.'; return; }
  const G = Number(valorRaw)||0;
  const F = r.saldoFinalF||0;
  const H = F-G;
  state.relatoriosCaixa[idx] = Object.assign({}, r, { saldoDepositadoG:G, depositoObs:obs, remanescenteH:H });
  saveState();
  audit('action','relatorioCaixa',id,'Depósito registado',`${fmtMT(G)}${obs?' · '+obs:''}`);
  closeModal();
  showToast('Depósito registado. Não se esqueça de anexar o comprovativo.','success');
  verRelatorioCaixa(id);
}

function formPedirEdicaoCaixa(id){
  const r=(state.relatoriosCaixa||[]).find(x=>x.id===id); if(!r) return;
  openModal(`
    <p class="modal-title">Pedir autorização para editar</p>

function enviarPedidoEdicaoCaixa(id){
  if(naoPodeEditar('relatorios')){ showToast('Sem permissão.','error'); return; }
  const motivo = document.getElementById('pc-motivo').value.trim();
  const errEl = document.getElementById('pc-err');
  if(!motivo){ errEl.textContent='Descreva o motivo do pedido.'; return; }
  const idx=(state.relatoriosCaixa||[]).findIndex(x=>x.id===id);
  if(idx===-1) return;
  const solicitante = currentPerfil?.nome || currentUser?.email || '—';
  state.relatoriosCaixa[idx] = Object.assign({}, state.relatoriosCaixa[idx], {
    pedido: { status:'pendente', motivo, solicitadoPor:solicitante, solicitadoEm:new Date().toISOString(), decididoPor:null, decididoEm:null }
  });
  saveState();
  audit('action','relatorioCaixa',id,'Pedido de edição solicitado',`Por: ${solicitante} · Motivo: ${motivo}`);
  closeModal();
  showToast('Pedido enviado ao administrador.','success');
  verRelatorioCaixa(id);
}

function decidirPedidoEdicaoCaixa(id, aprovar){
  if(!isAdmin()) return;
  const idx=(state.relatoriosCaixa||[]).findIndex(x=>x.id===id);
  if(idx===-1) return;
  const r = state.relatoriosCaixa[idx];
  if(!r.pedido || r.pedido.status!=='pendente') return;
  const adminNome = currentPerfil?.nome || currentUser?.email || 'Administrador';
  state.relatoriosCaixa[idx] = Object.assign({}, r, {
    pedido: Object.assign({}, r.pedido, { status: aprovar?'aprovado':'negado', decididoPor:adminNome, decididoEm:new Date().toISOString() })
  });
  saveState();
  audit('action','relatorioCaixa',id,`Pedido de edição ${aprovar?'aprovado':'recusado'}`,`Por: ${adminNome}`);
  showToast(aprovar?'Pedido aprovado. A pessoa já pode editar — ficará registado como uma nova via.':'Pedido recusado.', aprovar?'success':'');
  verRelatorioCaixa(id);
}

  const okH = Math.abs(r.remanescenteH)<0.01;
  const totaisHtml = `
    <div class="ptotais">

      <div class="row"><span>Total das Saídas (E = C)</span><span class="num">${fmtMT(r.totalSaidasE)}</span></div>
      <div class="row strong"><span>Saldo Final (F = D−E)</span><span class="num">${fmtMT(r.saldoFinalF)}</span></div>
      <div class="row strong"><span>Saldo Depositado (G)</span><span class="num">${fmtMT(r.saldoDepositadoG)}</span></div>
      <div class="row strong"><span>Remanescente (H = F−G)</span><span class="num" style="color:${okH?'#2F8F6B':'#C0392B'};">${fmtMT(r.remanescenteH)}</span></div>
      ${r.depositoObs?`<div class="row" style="font-size:10px;color:#666;"><span>Onde/como foi depositado</span><span>${esc(r.depositoObs)}</span></div>`:''}
    </div>`;
  const html = `
    ${printHeaderHtml('Relatório de Caixa', `${fmtData(r.data)} · ${viaLabel}`)}
    <div class="pinfo">
      <div><label>Data</label><span>${fmtData(r.data)}</span></div>
      <div><label>Operador</label><span>${esc(r.operador||'—')}</span></div>
      <div><label>Local</label><span>${esc(r.local||'—')}</span></div>
      <div><label>Estado</label><span>${r.status==='aberto'?'Aberto':'Fechado'}${(r.viaNumero||1)>1?' · '+viaLabel:''}</span></div>
    </div>
    ${secao('Saldo Inicial', r.subtotalA, siLinhas, [{label:'Descrição'},{label:'Valor (MT)',num:true}])}
    ${secao('Entradas', r.subtotalB, linhasHtml(r.entradas))}
    ${secao('Saídas', r.subtotalC, linhasHtml(r.saidas))}
    <div class="psec">Saldos</div>
    ${totaisHtml}
    ${saldosMeioHtml}
    ${(r.assinaturaCaixa||r.assinaturaMonitor)?`<div class="psec">Confirmação</div>
    ${printLinhasTable([{label:'Função'},{label:'Nome'}],[
      `<tr><td>Assinatura do Caixa</td><td>${esc(r.assinaturaCaixa||'—')}</td></tr>`,
      `<tr><td>Assinatura do Monitor</td><td>${esc(r.assinaturaMonitor||'—')}</td></tr>`
    ])}`:''}
    ${r.notas?`<div class="psec">Notas Gerais</div><div class="pnotas">${esc(r.notas)}</div>`:''}
    <div class="passin">
      <div><div class="sname">${esc(r.operador||'')}</div><div class="sline">Assinatura do Caixa</div></div>
      <div><div class="sname"></div><div class="sline">Visto do Superior Hierárquico</div></div>
    </div>
    ${printFooterHtml()}`;
  printDoc(html);
}

function compararViasCaixa(grupoId){
  const vias = rcVias(grupoId);
  if(vias.length<2){ showToast('Este relatório só tem uma via.',''); return; }
  const linhas = [
    ['Data', r=>fmtData(r.data)],
    ['Operador', r=>esc(r.operador||'—')],
    ['Local', r=>esc(r.local||'—')],
    ['Saldo Inicial (A)', r=>fmtMT(r.subtotalA)],
    ['Entradas (B)', r=>fmtMT(r.subtotalB)],
    ['Saídas (C)', r=>fmtMT(r.subtotalC)],
    ['Saldo Final (F)', r=>fmtMT(r.saldoFinalF)],
    ['Depositado (G)', r=>fmtMT(r.saldoDepositadoG)],
    ['Remanescente (H)', r=>fmtMT(r.remanescenteH)],
    ['Nº de entradas', r=>String((r.entradas||[]).length)],
    ['Nº de saídas', r=>String((r.saidas||[]).length)],
    ['Assinatura do Caixa', r=>esc(r.assinaturaCaixa||'—')],
    ['Assinatura do Monitor', r=>esc(r.assinaturaMonitor||'—')],
    ['Notas', r=>esc(r.notas||'—')],
  ];
  const headerHtml = vias.map(v=>`<th>${(v.viaNumero||1)>1?v.viaNumero+'ª Via':'Original'}<br><span style="font-weight:400;color:var(--text-muted);font-size:11px;">${v.criadoPor?esc(v.criadoPor):''}</span></th>`).join('');
  const rowsHtml = linhas.map(([label,fn])=>{
    const valores = vias.map(v=>fn(v));
    const difere = new Set(valores).size>1;
    return `<tr><td style="font-weight:700;">${label}</td>${valores.map(v=>`<td class="num" style="${difere?'background:var(--amber-100);font-weight:700;':''}">${v}</td>`).join('')}</tr>`;
  }).join('');
  openModal(`
    <p class="modal-title">Comparar vias — Relatório de Caixa</p>
    <p class="modal-sub">Diferenças entre as vias realçadas a amarelo.</p>
    <div class="table-wrap"><table>
      <thead><tr><th></th>${headerHtml}</tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table></div>
    <div class="modal-actions"><button class="btn btn-primary" onclick="closeModal()">Fechar</button></div>
  `,true);
}

function apagarRelatorioCaixa(id){
  if(!isAdmin()){ showToast('Só o administrador pode apagar relatórios de caixa.','error'); return; }
  const r=state.relatoriosCaixa.find(x=>x.id===id);
  confirmAction('Apagar este relatório de caixa?',()=>{
    moverParaLixeira('relatorioCaixa', r, `Relatório de caixa eliminado: ${r?fmtData(r.data):'—'}${r&&r.operador?' · '+r.operador:''}`);
    state.relatoriosCaixa=state.relatoriosCaixa.filter(r=>r.id!==id);
    saveState(); closeModal(); renderContent();
    showToast('Relatório de caixa movido para a lata de lixo.','success');
  });
}

(async function init(){
  // Detecta (de forma preliminar) se o link é de recuperação de senha
  // (Supabase envia #access_token=...&type=recovery). Isto é só uma pista inicial:
  // o SDK do Supabase pode processar e limpar este hash da URL antes deste código
  // correr, por isso NÃO confiamos só nisto — ver o listener onAuthStateChange abaixo,
  // que é a fonte de verdade e é registado ANTES de qualquer outra verificação.
  let recuperacaoEmCurso = new URLSearchParams(window.location.hash.replace('#','')).get('type') === 'recovery';

  function forcarEcraNovaSenha(){
    recuperacaoEmCurso = true;
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    mostrarPainelNovaSenha();
  }

  // Regista o listener de mudanças de estado de auth PRIMEIRO, antes de mais nada.
  // Assim nunca perdemos o evento PASSWORD_RECOVERY, mesmo que o SDK do Supabase já
  // tenha processado o link e criado a sessão antes de chegarmos aqui (era essa a
  // falha: a app podia abrir directamente porque a sessão de recuperação já existia
  // e era tratada como um login normal).
  _sb.auth.onAuthStateChange((event, session) => {
    if(event === 'PASSWORD_RECOVERY'){
      // Força sempre o ecrã de nova senha, mesmo que a app já tenha sido aberta.
      forcarEcraNovaSenha();
      return;
    }
    if(event === 'SIGNED_IN' && session && !recuperacaoEmCurso){
      currentUser = session.user;
      // Se o app ainda não está visível (ex: voltou de link de email)
      if(document.getElementById('app').style.display === 'none'){
        abrirApp();
      }
      return;
    }
    if(event === 'SIGNED_OUT'){
      currentUser = null; currentPerfil = null;
      clearInterval(pollingTimer);
      try{ _sb.removeAllChannels(); }catch(e){}
      document.getElementById('app').style.display='none';
      document.getElementById('login-screen').style.display='flex';
      mostrarPainelLogin();
    }
    if(event === 'TOKEN_REFRESHED' && session){
      currentUser = session.user;
    }
  });

  // Restaura token do Google Drive se voltou de redirect OAuth
  const driveRestored = gdriveRestoreToken();

  if(recuperacaoEmCurso){
    forcarEcraNovaSenha();
    return; // onAuthStateChange trata do resto
  }

  // Verifica se já existe sessão activa (token armazenado pelo SDK)
  const { data: { session } } = await _sb.auth.getSession();

  // Verificação de segurança extra: se, entretanto (de forma assíncrona), o evento
  // PASSWORD_RECOVERY já tiver disparado e marcado recuperacaoEmCurso, não abrimos a app.
  if(session && !recuperacaoEmCurso){
    currentUser = session.user;
    abrirApp();
    if(driveRestored){
      setTimeout(()=>{ showToast('Google Drive ligado com sucesso! ✓','success'); },800);
      if(sessionStorage.getItem('gdrive_pending_upload')){
        sessionStorage.removeItem('gdrive_pending_upload');
        setTimeout(()=>{ showToast('Pode agora adicionar o anexo novamente.',''); },2000);
      }
    }
  } else if(!recuperacaoEmCurso){
    document.getElementById('login-email').focus();
    if(driveRestored && sessionStorage.getItem('gdrive_pending_upload')){
      showToast('Drive autorizado. Faça login para continuar.','success');
    }
  }
})();
</script>
